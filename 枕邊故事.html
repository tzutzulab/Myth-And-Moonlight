    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" id="theme-meta" content="#f7f6f2">

    <style>
        :root {
            --bg-color: #f7f6f2;
            --text-color: #4a4238;
            --card-bg: #ffffff;
            --cn-text-color: #9a8d80;
            --accent-color: #4a90e2;
            --border-color: #d1c7bc;
        }

        body.theme-dark {
            --bg-color: #2a2622;
            --text-color: #ede7de;
            --card-bg: #3c362f;
            --cn-text-color: #a39689;
            --border-color: #5a5045;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            transition: all 0.3s ease;
            line-height: 1.8;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 15px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .search-container {
            margin-bottom: 20px;
        }
        #search-input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-color);
            box-sizing: border-box;
            font-size: 1rem;
        }

        .btn {
            padding: 6px 16px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            cursor: pointer;
            background: var(--card-bg);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            gap: 8px;
            transition: all 0.2s;
        }

        .story-list {
            display: grid;
            gap: 10px;
        }

        .story-card {
            background: var(--card-bg);
            padding: 18px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            text-align: center;
            transition: transform 0.1s;
        }
        
        .story-card:active {
            transform: scale(0.98);
        }

        .story-card h3 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 500;
        }

        #reader-view {
            display: none;
        }

        .controls {
            position: sticky;
            top: 0;
            background: var(--bg-color);
            padding: 10px 0;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
            z-index: 10;
        }

        .ctrl-left { flex: 1; display: flex; justify-content: flex-start; }
        .ctrl-center { flex: 2; display: flex; justify-content: center; }
        .ctrl-right { flex: 1; display: flex; justify-content: flex-end; }

        .sentence-block {
            margin-bottom: 28px;
        }

        .en-text {
            font-size: 1.3rem;
            font-weight: 500;
        }

        .en-word {
            cursor: pointer;
            display: inline-block;
            border-bottom: 1px dashed transparent;
        }

        .cn-text {
            display: block;
            color: var(--cn-text-color);
            font-size: 1.1rem;
            margin-top: 10px;
        }

        .hide-cn .cn-text {
            display: none;
        }

        #dict-popup {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 12px 24px;
            border-radius: 25px;
            display: none;
            z-index: 100;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>

<div class="container">

        <div style="text-align: center; font-size: 0.8rem; color: var(--cn-text-color); margin-bottom: 20px; letter-spacing: 3px;">BEDTIME TALES</div>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="搜尋故事標題..." oninput="filterStories()">

        <div class="story-list" id="story-list-container"></div>

    <div id="reader-view">
        <div class="controls">
            <div class="ctrl-left">

    </div>
</div>

    let currentTheme = 'theme-sepia';

    function initList(filteredStories = stories) {
        const container = document.getElementById('story-list-container');
        container.innerHTML = filteredStories.map((s) => {
            const index = stories.indexOf(s);
            return `<div class="story-card" onclick="readStory(${index})"><h3>${s.title}</h3></div>`;
        }).join('');
    }

    function filterStories() {
        const term = document.getElementById('search-input').value.toLowerCase();
        const filtered = stories.filter(s => s.title.toLowerCase().includes(term));
        initList(filtered);
    }

    function readStory(index) {
        const story = stories[index];
        document.getElementById('list-view').style.display = 'none';
        document.getElementById('reader-view').style.display = 'block';
        document.getElementById('story-title').innerText = story.title;
        
        const contentArea = document.getElementById('story-content');
        const lines = story.content.split('\n');
        
        contentArea.innerHTML = lines.map(line => {
            const [en, cn] = line.split('|');
            const wordsHtml = en.trim().split(' ').map(word => {
                const cleanWord = word.replace(/[.,?!"']/g, '').toLowerCase();
                return `<span class="en-word" onclick="lookup('${cleanWord}')">${word}</span>`;
            }).join(' ');
            
            return `<div class="sentence-block"><div class="en-text">${wordsHtml}</div><div class="cn-text">${cn || ''}</div></div>`;
        }).join('');
        window.scrollTo(0,0);
    }

    function showList() {
        document.getElementById('list-view').style.display = 'block';
        document.getElementById('reader-view').style.display = 'none';
    }

    function lookup(word) {
        const popup = document.getElementById('dict-popup');
        const meaning = vocabulary[word];
        if (meaning) {
            popup.innerText = `${word}: ${meaning}`;
            popup.style.display = 'block';
            setTimeout(() => { popup.style.display = 'none'; }, 2000);
        }
    }

    function toggleTranslation() {
        document.body.classList.toggle('hide-cn');
        const isHidden = document.body.classList.contains('hide-cn');
        document.getElementById('trans-status').innerText = isHidden ? '關' : '開';
    }

    function toggleTheme() {
        const body = document.body;
        const listBtn = document.getElementById('theme-toggle-list');
        const readerBtn = document.getElementById('theme-toggle-reader');
        if (currentTheme === 'theme-sepia') {
            body.classList.add('theme-dark');
            currentTheme = 'theme-dark';
            const btnContent = '☀️ Day';
            listBtn.innerHTML = btnContent;
            readerBtn.innerHTML = btnContent;
        } else {
            body.classList.remove('theme-dark');
            currentTheme = 'theme-sepia';
            const btnContent = '🌙 Night';
            listBtn.innerHTML = btnContent;
            readerBtn.innerHTML = btnContent;
        }
    }

    initList();
</script>
