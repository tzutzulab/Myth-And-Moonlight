<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>符文大地故事館 - Runeterra Tales</title>

    <!-- 修改部分：新增狀態列顏色連動標籤 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" id="theme-meta" content="#f7f6f2">

    <style>
        :root {
            --bg-color: #FFFDFB;
            --text-color: #4A443F;
            --card-bg: rgba(255, 255, 255, 0.9);
            --cn-text-color: #8C8279;
            --border-style: 2px solid;
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.region-蒂瑪西亞 { --region-color: #79A3D9; --region-accent: #4A7BB7; --region-bg: #E8F1FF; }
        body.region-諾克薩斯 { --region-color: #E67E7E; --region-accent: #B33F3F; --region-bg: #FFE8E8; }
        body.region-愛歐尼亞 { --region-color: #C08EE6; --region-accent: #8A4EB3; --region-bg: #F4E8FF; }
        body.region-弗雷爾卓德 { --region-color: #80D0D0; --region-accent: #3F9B9B; --region-bg: #E8FFFF; }
        body.region-皮爾托福 { --region-color: #E6B080; --region-accent: #B37D3F; --region-bg: #FFF3E8; }
        body.region-佐恩 { --region-color: #8CC265; --region-accent: #5D8A3B; --region-bg: #F0FFE8; }
        body.region-比爾吉沃特 { --region-color: #D9A066; --region-accent: #A66E3F; --region-bg: #FFF0E0; }
        body.region-闇影島 { --region-color: #4DBBB1; --region-accent: #2D8B82; --region-bg: #E0F7F5; }
        body.region-蘇瑞瑪 { --region-color: #E6C84D; --region-accent: #B3942D; --region-bg: #FFFDE8; }
        body.region-巨石峰 { --region-color: #9380E6; --region-accent: #5F4DBB; --region-bg: #E8E8FF; }
        body.region-班德爾城 { --region-color: #E680B0; --region-accent: #B33F7D; --region-bg: #FFE8F3; }
        body.region-伊克斯塔爾 { --region-color: #4DE680; --region-accent: #2DB35F; --region-bg: #E8FFEF; }
        body.region-虛空 { --region-color: #A64DE6; --region-accent: #7D2DB3; --region-bg: #F4E0FF; }
        body.region-符文大地 { --region-color: #A69186; --region-accent: #5B4636; --region-bg: #F3F1EF; }

        body.theme-dark {
            --text-color: #F0F0E0;
            --card-bg: rgba(255, 255, 255, 0.08);
            --cn-text-color: #C0C0B0;
            --border-style: 1.5px solid;
        }

        body.theme-dark.region-蒂瑪西亞 { --region-bg: #1A2A3A; --region-color: #79A3D9; --region-accent: #A0C4FF; --bg-color: #121E2A; }
        body.theme-dark.region-諾克薩斯 { --region-bg: #3A1A1A; --region-color: #E67E7E; --region-accent: #FFADAD; --bg-color: #2A1212; }
        body.theme-dark.region-愛歐尼亞 { --region-bg: #2A1A3A; --region-color: #C08EE6; --region-accent: #D8B4FF; --bg-color: #1E122A; }
        body.theme-dark.region-弗雷爾卓德 { --region-bg: #1A3A3A; --region-color: #80D0D0; --region-accent: #B0FFFF; --bg-color: #122A2A; }
        body.theme-dark.region-皮爾托福 { --region-bg: #3A2E1A; --region-color: #E6B080; --region-accent: #FFD9B3; --bg-color: #2A2212; }
        body.theme-dark.region-佐恩 { --region-bg: #1A3A1A; --region-color: #8CC265; --region-accent: #B6E6A1; --bg-color: #122A12; }
        body.theme-dark.region-比爾吉沃特 { --region-bg: #3A261A; --region-color: #D9A066; --region-accent: #FFC99E; --bg-color: #2A1D12; }
        body.theme-dark.region-闇影島 { --region-bg: #1A3A33; --region-color: #4DBBB1; --region-accent: #86E3D9; --bg-color: #122A25; }
        body.theme-dark.region-蘇瑞瑪 { --region-bg: #3A351A; --region-color: #E6C84D; --region-accent: #FFEA94; --bg-color: #2A2712; }
        body.theme-dark.region-巨石峰 { --region-bg: #221A3A; --region-color: #9380E6; --region-accent: #BDB2FF; --bg-color: #18122A; }
        body.theme-dark.region-班德爾城 { --region-bg: #3A1A2B; --region-color: #E680B0; --region-accent: #FFB3D9; --bg-color: #2A121E; }
        body.theme-dark.region-伊克斯塔爾 { --region-bg: #1A3A22; --region-color: #4DE680; --region-accent: #94FFB8; --bg-color: #122A18; }
        body.theme-dark.region-虛空 { --region-bg: #2E1A3A; --region-color: #A64DE6; --region-accent: #D494FF; --bg-color: #21122A; }
        body.theme-dark.region-符文大地 { --region-bg: #2D2D2A; --region-color: #A69186; --region-accent: #D2C2B9; --bg-color: #1E1E1C; }

        body {
            font-family: 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            background: radial-gradient(circle at top right, var(--region-bg) 0%, var(--bg-color) 100%);
            background-attachment: fixed;
            color: var(--text-color);
            margin: 0;
            transition: var(--transition);
            line-height: 1.8;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 15px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            padding: 20px 0 20px;
        }

        h1 {
            letter-spacing: 5px;
            font-weight: 700;
            margin: 0 0 5px 0;
            font-size: 1.8rem;
            text-transform: uppercase;
        }

        .region-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding-bottom: 50px;
        }

        .region-card {
            background: var(--card-bg);
            padding: 25px 10px;
            border-radius: 24px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            border: var(--border-style) var(--region-color);
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text-color);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .region-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.1);
            border-color: var(--region-accent);
        }

        .story-card {
            background: var(--card-bg);
            padding: 20px 25px;
            border-radius: 24px;
            cursor: pointer;
            transition: var(--transition);
            border: var(--border-style) transparent;
            border-left: 10px solid var(--region-color);
            margin-bottom: 15px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .story-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 4px; color: var(--region-accent); }

        .reader-content { padding-bottom: 80px; }

        .sentence { margin-bottom: 35px; padding: 10px; border-radius: 15px; }
        .en { display: block; font-family: 'Constantia', 'Georgia', serif; font-size: 1.35rem; margin-bottom: 10px; line-height: 1.5; }
        .cn { font-size: 1.05rem; color: var(--cn-text-color); display: block; font-weight: 300; }
        .hide-cn .cn { display: none; }

        .word { 
            cursor: pointer; 
            border-bottom: 1px solid transparent; 
            transition: 0.2s;
            display: inline-block;
            margin-right: 0.25em;
        }
        .word:hover { border-bottom-color: var(--region-accent); color: var(--region-accent); }

        .controls {
            position: sticky;
            top: 0;
            background: transparent;
            padding: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .controls.home-controls {
            justify-content: flex-end;
            position: relative;
            padding-bottom: 0;
        }

        .btn {
            background: var(--card-bg);
            border: var(--border-style) var(--region-color);
            color: var(--text-color);
            padding: 8px 18px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: var(--transition);
            font-weight: 700;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .btn:hover { background: var(--region-color); color: white; transform: translateY(-2px); }

        #reader-title {
            color: var(--region-accent);
            margin: 30px 0 30px;
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        #dict-popup {
            position: fixed;
            bottom: 40px; left: 50%;
            transform: translateX(-50%);
            background: var(--region-accent);
            color: #121212;
            padding: 15px 30px;
            border-radius: 50px;
            display: none;
            z-index: 1000;
            font-size: 1rem;
            font-weight: 700;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translate(-50%, 20px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        @media (max-width: 480px) {
            .region-grid { grid-template-columns: 1fr; }
            header { padding: 15px 0 10px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body class="region-符文大地">

<div id="region-view" class="container">
    <div class="controls home-controls">
        <button class="btn theme-toggle-btn" onclick="toggleTheme()">🌙 Night</button>
    </div>
    <header>
        <h1>符文大地故事館</h1>
        <p style="opacity: 0.6; letter-spacing: 2px; font-size: 0.8rem; font-weight: 700;">EXPLORE RUNETERRA</p>
    </header>
    <div class="region-grid" id="region-list"></div>
</div>

<div id="list-view" class="container" style="display: none;">
    <div class="controls">
        <button class="btn" onclick="showRegions()">⬅ Back</button>
        <button class="btn theme-toggle-btn" onclick="toggleTheme()">🌙 Night</button>
    </div>
    <header>
        <h1 id="current-region-name" style="font-size: 1.6rem;"></h1>
    </header>
    <div class="story-list" id="story-list"></div>
</div>

<div id="reader-view" class="container" style="display: none;">
    <div class="controls">
        <button class="btn" onclick="showList()">⬅ List</button>
        <div style="display: flex; gap: 8px;">
            <button class="btn" onclick="toggleTranslation()">譯</button>
            <button class="btn theme-toggle-btn" id="theme-toggle-reader" onclick="toggleTheme()">🌙</button>
        </div>
    </div>
    <article class="reader-content">
        <h2 id="reader-title"></h2>
        <div id="reader-body"></div>
    </article>
</div>

<div id="dict-popup"></div>

<script>
    const stories = [
        {
            id: 1,
            region: "蒂瑪西亞",
            title: "Garen: The Might of Demacia",
            titleCn: "蓋倫：蒂瑪西亞之力",
            content: [
                { en: "A paragon of military discipline, Garen embodies the unyielding resolve of the Dauntless Vanguard.", cn: "身為軍事紀律的典範，蓋倫體現了無畏先鋒那不屈不饒的決心。" },
                { en: "He wields a massive broadsword, striking down enemies of the crown with righteous fury.", cn: "他揮舞著巨大的闊劍，以正義的憤怒擊倒王室的敵人。" },
                { en: "However, he harbors a secret internal conflict regarding his sister’s forbidden nature.", cn: "然而，對於妹妹那禁忌的天性，他內心深處隱藏著矛盾與衝突。" },
                { en: "\"To lead is to carry the weight of an entire nation’s expectations,\" he steeled himself.", cn: "「領導即是背負起整個國家期待的分量，」他堅定地自我砥礪。" },
                { en: "His loyalty to the throne is his greatest strength and his most restrictive shackle.", cn: "他對王座的忠誠是他最強大的力量，也是最束縛他的枷鎖。" },
                { en: "True bravery is found in defending one’s ideals, even when they are tested by love.", cn: "真正的勇敢在於捍衛理想，即便這些理想正遭受親情的考驗。" }
            ]
        },
        {
            id: 2,
            region: "蒂瑪西亞",
            title: "Lux: The Lady of Luminosity",
            titleCn: "拉克絲：光之少女",
            content: [
                { en: "Born into a prestigious family, Lux was forced to conceal her innate magical luminosity.", cn: "出身於名門望族，拉克絲被迫隱藏她天生具備的光明魔法。" },
                { en: "She views the world with an optimism that contradicts the kingdom’s grim anti-mage laws.", cn: "她以樂觀的態度觀察世界，這與王國嚴酷的禁魔法律截然相反。" },
                { en: "Her light is not a curse, but a beacon intended to illuminate the darkest corners.", cn: "她的光芒並非詛咒，而是旨在照亮最黑暗角落的燈塔。" },
                { en: "\"Fear is a shadow that vanishes when confronted by a steadfast heart,\" she whispered.", cn: "「恐懼是一道影子，在堅定的心靈面前會消散殆盡，」她低聲說道。" },
                { en: "She seeks to bridge the gap between her heritage and her forbidden gifts.", cn: "她試圖在她承襲的門第與她那禁忌的天賦之間建立橋樑。" },
                { en: "Hope is the radiance that persists even when the world demands silence.", cn: "希望是即便世界要求沈默，卻依然持久綻放的光輝。" }
            ]
        },
        {
            id: 3,
            region: "蒂瑪西亞",
            title: "Jarvan IV: The Exemplar of Demacia",
            titleCn: "嘉文四世：德瑪西亞皇子",
            content: [
                { en: "The heir to the throne, Jarvan IV carries the heavy mantle of a legacy built on stone and blood.", cn: "身為王位繼承人，嘉文四世背負著建立在磐石與鮮血之上的沈重遺產。" },
                { en: "He leads his troops from the front, his dragon-slaying lance piercing the ranks of chaos.", cn: "他身先士卒領導軍隊，他那屠龍長槍刺穿了混亂的陣營。" },
                { en: "Driven by a desire to prove his worth, he often grapples with the shadows of his father’s reign.", cn: "受證明自身價值的慾望驅使，他經常與父親統治下的陰影搏鬥。" },
                { en: "\"A king’s true throne is found in the hearts of his people,\" he proclaimed.", cn: "「國王真正的王座，存在於他子民的心中，」他宣告道。" },
                { en: "His path is a relentless pursuit of greatness amidst the turmoil of a changing world.", cn: "在動盪不安的變遷世界中，他的道路是對卓越的永恆追求。" },
                { en: "Responsibility is a crown that requires both immense power and profound humility.", cn: "責任是一頂皇冠，既需要巨大的力量，也需要深沉的謙卑。" }
            ]
        },
        {
            id: 4,
            region: "蒂瑪西亞",
            title: "Quinn: Demacia’s Wings",
            titleCn: "葵恩：帝瑪西亞之翼",
            content: [
                { en: "Quinn and her legendary eagle, Valor, serve as elite scouts in the remote borderlands.", cn: "葵恩與她的傳奇巨鷹「華洛」，在遙遠的邊境擔任精英偵察兵。" },
                { en: "Their bond transcends words, allowing them to perceive threats hidden from ordinary eyes.", cn: "他們的羈絆超越言語，讓他們能察覺肉眼難以發現的威脅。" },
                { en: "She values the freedom of the wilderness over the suffocating courtly life of the capital.", cn: "比起首都令人窒息的宮廷生活，她更珍惜荒野中的自由。" },
                { en: "\"The sky offers a perspective that no walled city can ever provide,\" she mused.", cn: "「天空提供了一種任何圍城都無法提供的視角，」她沉思著。" },
                { en: "Together, they are a silent tempest, striking swiftly before disappearing into the horizon.", cn: "他們共同化作一場沈默的風暴，在消失於地平線前迅速出擊。" },
                { en: "Vigilance is the price of safety in a world teeming with unseen dangers.", cn: "在一個充滿未知危險的世界裡，警惕是安全的代價。" }
            ]
        },
        {
            id: 5,
            region: "蒂瑪西亞",
            title: "Shyvana: The Half-Dragon",
            titleCn: "希瓦娜：半龍少女",
            content: [
                { en: "A creature of dual heritage, Shyvana struggles to reconcile her human form with her draconic fury.", cn: "身為具備雙重血緣的生物，希瓦娜掙扎於調和她的人類形態與龍之憤怒。" },
                { en: "She found a place of belonging within the Demacian military, thanks to the Prince’s mercy.", cn: "感謝皇子的仁慈，她在德瑪西亞軍隊中找到了一處歸屬之地。" },
                { en: "Her fire is a destructive force that she carefully channels to protect her adopted home.", cn: "她的火焰是一股毀滅性的力量，她小心翼翼地引導它來保護她的第二故鄉。" },
                { en: "\"I am a monster to some, but a shield to those I choose to defend,\" she asserted.", cn: "「對某些人來說我是怪物，但對我選擇守護的人來說，我是護盾，」她斷言道。" },
                { en: "She exists on the periphery, a guardian whose nature is both feared and revered.", cn: "她存在於邊緣，是一位天性既讓人恐懼又受人尊敬的守護者。" },
                { en: "Identity is not dictated by birth, but by the allegiances we forge through fire.", cn: "身分並非由出生決定，而是由我們在戰火中建立的效忠所定義。" }
            ]
        },
        {
            id: 6,
            region: "蒂瑪西亞",
            title: "Xin Zhao: The Seneschal of Demacia",
            titleCn: "趙信：蒂瑪西亞總管",
            content: [
                { en: "Once a gladiator in the pits of Noxus, Xin Zhao found redemption and purpose in Demacia.", cn: "曾是諾克薩斯鬥技場的角鬥士，趙信在德瑪西亞找到了救贖與目標。" },
                { en: "He serves the royal family with an unwavering loyalty that borders on religious devotion.", cn: "他以一種近乎宗教信仰般的堅定忠誠，效命於皇室家族。" },
                { en: "His spear is an extension of his will, a relentless blur of precision and speed.", cn: "他的長槍是他意志的延伸，是精準與速度那永不停歇的身影。" },
                { en: "\"A warrior’s honor is not found in victory, but in the steadfastness of his oath,\" he said.", cn: "「戰士的榮譽不在於勝利，而在於對誓言的堅貞，」他說道。" },
                { en: "He stands as a silent sentinel, guarding the secrets and the lives of the throne.", cn: "他像一位沈默的哨兵，守護著王座的秘密與性命。" },
                { en: "Redemption is a lifelong journey of service and quiet sacrifice.", cn: "救贖是一段奉獻與默默犧牲的終身旅程。" }
            ]
        },
        {
            id: 7,
            region: "蒂瑪西亞",
            title: "Vayne: The Night Hunter",
            titleCn: "薇恩：暗夜獵人",
            content: [
                { en: "After witnessing her family’s slaughter by dark magic, Vayne became a relentless hunter of evil.", cn: "在目睹家人慘遭黑魔法殺戮後，薇恩成了殘酷的邪惡獵手。" },
                { en: "She views magic as an inherent corruption that must be purged from the world.", cn: "她將魔法視為一種固有的腐敗，必須從世界上徹底清除。" },
                { en: "Her movements are a lethal dance in the shadows, her crossbow delivering silver-tipped justice.", cn: "她的行動是陰影中的致命之舞，她的弩弓遞送著銀尖的正義。" },
                { en: "\"Evil is a shadow that cannot survive the piercing gaze of the righteous,\" she declared.", cn: "「邪惡是一道影子，無法在正義那刺穿一切的注視下倖存，」她宣稱。" },
                { en: "She is a solitary figure, detached from the warmth of human connection by her singular obsession.", cn: "她是個孤獨的身影，因其獨特的執念而與人類情感的溫暖隔絕。" },
                { en: "Justice, when fueled by vengeance, can become as cold and sharp as a blade.", cn: "當正義由復仇驅動時，它會變得像刀鋒一樣冰冷且銳利。" }
            ]
        },
        {
            id: 8,
            region: "蒂瑪西亞",
            title: "Fiora: The Grand Duelist",
            titleCn: "菲歐拉：孤高劍客",
            content: [
                { en: "The head of House Laurent, Fiora is a peerless duelist who seeks to restore her family’s tarnished honor.", cn: "作為羅倫特家族的首領，菲歐拉是一位尋求恢復家族受損名譽的絕世決鬥家。" },
                { en: "She possesses an unparalleled mastery of the rapier, finding elegance in the lethal precision of a strike.", cn: "她對細劍的掌握無與倫比，在致命精準的擊刺中尋求優雅。" },
                { en: "She challenges those who dare to insult her lineage, proving her worth through blood and skill.", cn: "她挑戰那些膽敢侮辱她血脈的人，透過鮮血與技巧證明自己的價值。" },
                { en: "\"Perfection is a fleeting moment captured at the tip of a blade,\" she remarked.", cn: "「完美是捕捉在劍尖上那轉瞬即逝的時刻，」她評論道。" },
                { en: "Her life is a constant battle against the societal expectations placed upon her gender and house.", cn: "她的生活是一場與社會對其性別及家族期望持續對抗的戰鬥。" },
                { en: "Pride is a fragile glass that must be tempered by the fire of competence.", cn: "自尊是一面脆弱的玻璃，必須經由能力的火焰來鍛造。" }
            ]
        },
        {
            id: 9,
            region: "蒂瑪西亞",
            title: "Galio: The Colossus",
            titleCn: "加里歐：正義巨像",
            content: [
                { en: "A massive statue made of petricite, Galio only awakens when potent magic is present in the air.", cn: "作為一座由禁魔石製成的巨大雕像，加里歐僅在空氣中存在強大魔法時才會甦醒。" },
                { en: "He is a guardian of Demacia, a sentient shield that absorbs the very energy his people fear.", cn: "他是德瑪西亞的守護者，是一個吸收其子民所恐懼之能量的有意識護盾。" },
                { en: "His movements are thunderous, and his presence offers a sense of safety to the small mortals below.", cn: "他的行動如雷鳴般震撼，他的存在為下方渺小的凡人提供了一種安全感。" },
                { en: "\"I sleep to protect, and I wake to ensure the world remains safe,\" the titan hummed.", cn: "「我沈睡是為了守護，我醒來是為了確保世界平安，」這位巨人哼唱著。" },
                { en: "He cherishes the brief moments of life, finding wonder in the fragile beauty of humanity.", cn: "他珍惜短暫的生命時刻，在人類脆弱的美感中尋找奇蹟。" },
                { en: "Duty is a timeless vigil that transcends the fleeting boundaries of mortal years.", cn: "職責是一場永恆的守望，超越了凡人歲月那轉瞬即逝的邊界。" }
            ]
        },
        {
            id: 10,
            region: "蒂瑪西亞",
            title: "Sona: Maven of the Strings",
            titleCn: "索娜：琴仙",
            content: [
                { en: "A mute virtuoso, Sona communicates through the ethereal melodies of her ancient instrument, the \"etwahl\".", cn: "身為一位失語的音樂大師，索娜透過她那古老樂器「埃瓦爾」所發出的空靈旋律進行交流。" },
                { en: "Her music can soothe the most fractured souls or manifest as a lethal, concussive force.", cn: "她的音樂能撫慰最破碎的靈魂，也能化作致命的衝擊力量。" },
                { en: "Though she found sanctuary in Demacia, her magical resonance makes her a target for the mageseekers.", cn: "雖然她在德瑪西亞找到了庇護所，但她的魔法共鳴使她成為禁魔使者的目標。" },
                { en: "\"Harmony is not the absence of sound, but the perfect alignment of divergent notes,\" her music whispered.", cn: "「和諧並非聲音的缺席，而是分歧音符間的完美契合，」她的音樂低語著。" },
                { en: "She exists as a silent enigma, her presence a testament to the transcendent power of art.", cn: "她以沈默謎團的身分存在，她的存在證明了藝術那超越性的力量。" },
                { en: "Beauty is a language that requires no words to convey the depth of the human spirit.", cn: "美是一種無需語言，便能傳達人類精神深度的語言。" }
            ]
        },
        {
            id: 11,
            region: "蒂瑪西亞",
            title: "Kayle: The Righteous",
            titleCn: "凱爾：正義天使",
            content: [
                { en: "A celestial being driven by an absolute devotion to divine law, Kayle seeks to purge the world of injustice.", cn: "受對神聖法律絕對奉獻所驅使，天界存在凱爾試圖清除世間的不正義。" },
                { en: "She views morality in stark contrasts of black and white, leaving no room for human frailty.", cn: "她以非黑即白的鮮明對比來看待道德，不為人類的脆弱留下任何餘地。" },
                { en: "Her flaming sword descends from the heavens, delivering searing judgment upon the wicked.", cn: "她的烈焰之劍從天而降，向邪惡之人遞送灼熱的審判。" },
                { en: "\"Justice is a fire that consumes the shadows of corruption,\" she proclaimed from the heights.", cn: "「正義是一朵火焰，吞噬著腐敗的陰影，」她在高處宣稱。" },
                { en: "She sacrificed her own humanity to become a perfect instrument of celestial retribution.", cn: "她犧牲了自己的人性，成為天界報應的完美工具。" },
                { en: "Rigid adherence to law can sometimes obscure the mercy necessary for true righteousness.", cn: "僵化地墨守法律，有時會掩蓋了真誠正義所需的慈悲。" }
            ]
        },
        {
            id: 12,
            region: "蒂瑪西亞",
            title: "Morgana: The Fallen",
            titleCn: "魔甘娜：墮落天使",
            content: [
                { en: "The sister of Kayle, Morgana rejected her wings and her divinity to embrace the pain of the mortal world.", cn: "作為凱爾的妹妹，魔甘娜拒絕了她的雙翼與神格，以擁抱凡塵世界的痛苦。" },
                { en: "She believes that empathy and suffering are essential for understanding the true nature of justice.", cn: "她相信共情與苦難，是理解正義真正本質的關鍵要素。" },
                { en: "Her magic is fueled by the dark, heavy emotions that others attempt to suppress or deny.", cn: "她的魔法由那些他人試圖壓制或否認的黑暗、沈重情緒所驅動。" },
                { en: "\"Truth is found in the dirt and the blood, not in the distant brilliance of the stars,\" she asserted.", cn: "「真理存在於塵土與鮮血之中，而非星靈那遙遠的光輝裡，」她斷言道。" },
                { en: "She dwells in the shadows, guarding the marginalized from the cold judgment of her sister.", cn: "她棲身於陰影，守護著邊緣人免受她姊姊那冰冷的審判。" },
                { en: "To understand the light, one must first have the courage to walk through the darkness.", cn: "若要理解光明，一個人必須首先擁有穿行黑暗的勇氣。" }
            ]
        },
        {
            id: 13,
            region: "蒂瑪西亞",
            title: "Lucian: The Purifier",
            titleCn: "路西恩：驅魔聖弩",
            content: [
                { en: "Armed with dual relic pistols, Lucian is a grim sentinel dedicated to eradicating the undead.", cn: "裝備著雙生遺物手槍，路西恩是一位致力於剷除亡靈的冷酷哨兵。" },
                { en: "His mission is fueled by the loss of his wife, Senna, whose soul was stolen by the spectral Thresh.", cn: "他的使命由失去妻子珊娜的痛苦驅動，她的靈魂曾被幽冥的瑟雷西奪走。" },
                { en: "He moves with a relentless velocity, his light-infused shots piercing the gloom of the Shadow Isles.", cn: "他以不懈的速度移動，他那注入光芒的射擊穿透了闇影島的陰霾。" },
                { en: "\"The shadows are many, but the light is singular and unyielding,\" he vowed.", cn: "「影子雖多，但光明是唯一且不屈的，」他誓言道。" },
                { en: "His path is one of solitude and vengeance, yet he remains a bastion against the rising tide of darkness.", cn: "他的道路充滿孤獨與復仇，但他依然是對抗黑暗浪潮興起的堡壘。" },
                { en: "Love can become a lethal weapon when it is forged in the fires of loss and resolve.", cn: "當愛在失去與決心的火焰中鍛造時，它能變成一種致命的武器。" }
            ]
        },
        {
            id: 14,
            region: "闇影島",
            title: "Senna: The Redeemer",
            titleCn: "珊娜：贖罪真子",
            content: [
                { en: "After being imprisoned within Thresh’s lantern for years, Senna emerged with a new understanding of the mist.", cn: "在被囚禁於瑟雷西的燈籠多年後，珊娜帶著對黑霧的新理解重現世間。" },
                { en: "She wields a massive relic cannon, channeling the very darkness that once threatened to consume her.", cn: "她揮舞著巨大的遺物長砲，引導著那曾威脅要吞噬她的黑暗。" },
                { en: "She is a bridge between the living and the dead, a sentinel who battles the light and the shadow alike.", cn: "她是生者與死者間的橋樑，一位既對抗光明也對抗陰影的哨兵。" },
                { en: "\"The mist is a part of me now, and I will use it to set the trapped souls free,\" she declared.", cn: "「黑霧現在是我的一部分，我將用它來解救受困的靈魂，」她宣稱。" },
                { en: "Her return brought a glimmer of hope to Lucian and a profound threat to the Ruined King.", cn: "她的回歸為路西恩帶來了一線希望，也對殞落國王構成了深遠的威脅。" },
                { en: "True redemption involves transforming our greatest traumas into our most potent strengths.", cn: "真正的救贖，涉及將我們最大的創傷轉化為我們最強大的力量。" }
            ]
        },
        {
            id: 15,
            region: "蒂瑪西亞",
            title: "Sylas: The Unshackled",
            titleCn: "賽勒斯：解脫者",
            content: [
                { en: "Born with the ability to see and steal magic, Sylas was betrayed by the mageseekers he once served.", cn: "天生擁有看見與竊取魔法的能力，賽勒斯被他曾效命的禁魔使者所背叛。" },
                { en: "He spent fifteen years in darkness, fueling his rage against the hypocrisy of the Demacian elite.", cn: "他在黑暗中度過了十五年，累積了對德瑪西亞權貴偽善行為的憤怒。" },
                { en: "His chains, now shattered but still worn, serve as conduits for the magic he plunders.", cn: "他的鎖鏈雖已破碎但仍佩戴在身，作為他掠奪魔法的導管。" },
                { en: "\"A kingdom built on lies deserves to be burned to the ground,\" he sneered with cold intent.", cn: "「一個建立在謊言之上的王國，理應被付之一炬，」他帶著冰冷的意圖冷笑道。" },
                { en: "He leads a rebellion of the disenfranchised, seeking to dismantle the stone walls of tradition.", cn: "他領導著被剝奪權利者的反叛，試圖拆除傳統的石牆。" },
                { en: "Justice is a subjective concept that depends entirely on who holds the keys to the cell.", cn: "正義是一個主觀的概念，完全取決於誰握有牢房的鑰匙。" }
            ]
        },
        {
            id: 16,
            region: "諾克薩斯",
            title: "Darius: The Hand of Noxus",
            titleCn: "達瑞斯：諾克薩斯之手",
            content: [
                { en: "Rising from a destitute childhood, Darius became the ultimate symbol of Noxian strength and resolve.", cn: "出身於貧困的童年，達瑞斯成了諾克薩斯力量與決心的終極象徵。" },
                { en: "He disdains the political schemes of the capital, preferring the brutal clarity of the battlefield.", cn: "他蔑視首都的政治陰謀，更偏好戰場上那種殘酷的清晰感。" },
                { en: "With his massive axe, he executes the enemies of the empire, ensuring that only the strong prevail.", cn: "他揮舞著巨大的長斧，處決帝國的敵人，確保唯有強者才能生存。" },
                { en: "\"A leader does not ask for loyalty; he commands it through the weight of his actions,\" he grunted.", cn: "「領導者不祈求忠誠；他透過行動的分量來統馭一切，」他低哼道。" },
                { en: "He is the immovable pillar of the military, a man who views mercy as a fatal weakness.", cn: "他是軍方屹立不搖的支柱，一個將慈悲視為致命弱點的人。" },
                { en: "Power is not granted by bloodlines; it is seized by those with the will to endure the slaughter.", cn: "權力並非由血脈賜予；而是由那些具備忍受屠戮意志的人所奪取。" }
            ]
        },
        {
            id: 17,
            region: "諾克薩斯",
            title: "Swain: The Grand General",
            titleCn: "斯溫：諾克薩斯大元帥",
            content: [
                { en: "After being crippled and discarded, Swain seized control of the empire through cunning and dark pacts.", cn: "在遭遇殘疾並被拋棄後，斯溫透過狡詐與黑暗契約奪取了帝國的控制權。" },
                { en: "He possesses the vision of a demon, allowing him to perceive the hidden truths within his enemies' minds.", cn: "他擁有惡魔的視野，讓他能洞察敵人心中隱藏的真相。" },
                { en: "He reconstructed the government into the \"Trifarix,\" distributing power to ensure the nation's longevity.", cn: "他將政府重組為「三頭同盟」，分散權力以確保國家的長治久安。" },
                { en: "\"I see not what you are, but the countless possibilities of what you could become,\" he mused.", cn: "「我看見的不是現在的你，而是你可能成就的無數可能性，」他沉思著。" },
                { en: "He is a master strategist who sacrifices the few to ensure the survival of the many.", cn: "他是一位大師級的戰略家，為了確保多數人的生存而犧牲少數人。" },
                { en: "Greatness requires the courage to embrace the shadows that others are too fearful to acknowledge.", cn: "卓越需要勇氣去擁抱那些他人因恐懼而不敢承認的陰影。" }
            ]
        },
        {
            id: 18,
            region: "諾克薩斯",
            title: "Katarina: The Sinister Blade",
            titleCn: "卡特蓮娜：不祥之刃",
            content: [
                { en: "The eldest daughter of a legendary general, Katarina is a lethal assassin who thrives in the chaos of combat.", cn: "身為傳奇將軍的長女，卡特蓮娜是一位在戰鬥混亂中如魚得水的致命刺客。" },
                { en: "She values efficiency above all else, her daggers moving with a blurred, predatory grace.", cn: "她將效率置於一切之上，她的短劍以一種模糊且具掠奪性的優雅移動著。" },
                { en: "Though she once faltered in her duty, she reclaimed her honor through a relentless pursuit of excellence.", cn: "儘管她曾在職責中動搖，但透過對卓越的殘酷追求，她奪回了自己的榮譽。" },
                { en: "\"Blood is the ink with which we write the history of our greatness,\" she declared coldly.", cn: "「鮮血是我們用來書寫偉大歷史的墨水，」她冰冷地宣稱。" },
                { en: "She exists on the knife's edge between discipline and the raw instinct to kill.", cn: "她存在於紀律與原始殺戮本能間的刀鋒邊緣。" },
                { en: "A weapon’s value is defined not by its form, but by the unwavering hand that wields it.", cn: "武器的價值並非由其外觀定義，而是由那隻揮舞它的堅定手掌所決定。" }
            ]
        },
        {
            id: 19,
            region: "諾克薩斯",
            title: "Draven: The Glorious Executioner",
            titleCn: "達瑞文：榮耀行刑官",
            content: [
                { en: "In Noxus, where strength is revered, Draven found his calling by turning executions into a public spectacle.", cn: "在崇尚力量的諾克薩斯，達瑞文透過將處刑轉化為大眾奇觀，找到了自己的使命。" },
                { en: "He possesses an insatiable thirst for attention, his spinning axes reflecting the adoration of the crowd.", cn: "他對關注有著永無止境的渴望，他那旋轉的飛斧映照著群眾的崇拜。" },
                { en: "He views the world as a stage, and every opponent is merely a prop in his grand performance.", cn: "他將世界視為舞台，而每一位對手都僅僅是他宏大表演中的道具。" },
                { en: "\"Welcome to the League of Draven, where the spotlight never fades,\" he shouted with a grin.", cn: "「歡迎來到達瑞文聯盟，這裡的聚光燈永不熄滅，」他帶著笑容大喊。" },
                { en: "Beneath his flamboyant exterior lies a lethal skill that few dare to challenge.", cn: "在他華麗的外表下，隱藏著極少有人敢挑戰的致命技巧。" },
                { en: "Confidence is a shield that can deflect the doubts of others and ignite the fires of fame.", cn: "自信是一面護盾，能偏轉他人的質疑並點燃名聲的火焰。" }
            ]
        },
        {
            id: 20,
            region: "諾克薩斯",
            title: "LeBlanc: The Deceiver",
            titleCn: "勒布朗：詭術妖姬",
            content: [
                { en: "As the matron of the Black Rose, LeBlanc has manipulated the fate of Noxus from the shadows for centuries.", cn: "身為黑色玫瑰的女主人，勒布朗數世紀以來一直在陰影中操弄著諾克薩斯的命運。" },
                { en: "She is a master of illusion and subterfuge, her true intentions hidden behind a thousand faces.", cn: "她是幻象與詭計的大師，其真實意圖隱藏在千面偽裝之後。" },
                { en: "She orchestrates the rise and fall of leaders, ensuring that her secret society remains the ultimate power.", cn: "她策劃著領導者的興衰，確保她的秘密組織維持著終極權力。" },
                { en: "\"The world is a tapestry of lies, and I am the one who holds the needle,\" she whispered.", cn: "「世界是一幅由謊言織成的掛毯，而我正是握針的人，」她低聲說道。" },
                { en: "Her existence is a paradox of presence and absence, a ghost that haunts the corridors of authority.", cn: "她的存在是一個關於現身與隱匿的矛盾，一個徘徊在權力走廊的幽靈。" },
                { en: "Truth is a luxury that the powerful utilize only when it serves their hidden agendas.", cn: "真理是一種奢侈品，權勢者僅在符合其隱藏動機時才會利用它。" }
            ]
        },
        {
            id: 21,
            region: "諾克薩斯",
            title: "Cassiopeia: The Serpent’s Embrace",
            titleCn: "卡莎碧雅：蛇之擁抱",
            content: [
                { en: "Once a beautiful noblewoman, Cassiopeia was transformed into a monstrous serpent by a sinister curse.", cn: "曾是一位美麗的貴族女性，卡莎碧雅因一場陰險的詛咒被轉化為恐怖的蛇妖。" },
                { en: "She utilized her new, predatory form to infiltrate the most guarded secrets of Shurima.", cn: "她利用自己全新的掠奪者形態，滲透進蘇瑞瑪最森嚴的秘密之中。" },
                { en: "Her gaze can petrify those who dare to cross her, her venom as lethal as her ambition.", cn: "她的凝視能使與她作對的人石化，她的毒液正如她的野心般致命。" },
                { en: "\"Beauty was a mask; power is my true essence,\" she hissed with a chilling elegance.", cn: "「美麗曾是面具；力量才是我真正的本質，」她帶著令人毛骨悚然的優雅發出嘶嘶聲。" },
                { en: "She exists as a lethal paradox of grace and monstrosity, a predator in a gilded cage.", cn: "她以一種優雅與怪誕的致命矛盾存在著，是一隻處在鍍金籠子裡的掠奪者。" },
                { en: "The loss of one’s humanity can sometimes provide the clarity needed to dominate the world.", cn: "人性的喪失有時能提供統治世界所需的清晰洞察力。" }
            ]
        },
        {
            id: 22,
            region: "諾克薩斯",
            title: "Talon: The Blade’s Shadow",
            titleCn: "塔隆：刀鋒之影",
            content: [
                { en: "Raised in the subterranean tunnels of Noxus, Talon became the premier assassin of the Du Couteau family.", cn: "在諾克薩斯的地下隧道中長大，塔隆成了杜·克托家族的首首席刺客。" },
                { en: "He possesses a lethal proficiency with daggers, his movements as silent as a passing ghost.", cn: "他精通於使用短劍，其行動如路過的幽靈般靜默。" },
                { en: "He values loyalty to his master above all else, his blade a precise instrument of political liquidation.", cn: "他將對主人的忠誠置於一切之上，他的刀刃是政治清算的精確工具。" },
                { en: "\"The shadows are my sanctuary, and the blade is my only truth,\" he muttered.", cn: "「陰影是我的避難所，而刀刃是我唯一的真理，」他喃喃自語。" },
                { en: "He is a solitary figure, detached from the warmth of society by his lethal profession.", cn: "他是一個孤獨的身影，因其致命的職業而與社會的溫暖隔絕。" },
                { en: "Efficiency in silence is the ultimate hallmark of a warrior who thrives in the dark.", cn: "沈默中的高效率，是那些在黑暗中茁壯之戰士的終極標誌。" }
            ]
        },
        {
            id: 23,
            region: "諾克薩斯",
            title: "Vladimir: The Crimson Reaper",
            titleCn: "弗拉迪米爾：血色收割者",
            content: [
                { en: "A master of hemomancy, Vladimir has prolonged his existence for centuries by consuming the essence of others.", cn: "身為血法術的大師，弗拉迪米爾透過消耗他人的本質，延續了數世紀的存在。" },
                { en: "He views the world with a bored, aristocratic detachment, his magic a dark and fluid elegance.", cn: "他以一種無聊、傲慢的超脫感觀察世界，他的魔法展現出黑暗且流動的優雅。" },
                { en: "He is a patron of the arts and a frequent guest in the high circles of Noxian society.", cn: "他是藝術的贊助人，也是諾克薩斯上流社會的常客。" },
                { en: "\"Life is a vintage that must be savored drop by drop,\" he remarked with a faint smile.", cn: "「生命是一支佳釀，必須一滴一滴地細細品味，」他帶著淡笑評論道。" },
                { en: "His power is a testament to the darker side of immortality and the thirst for perpetual youth.", cn: "他的力量證明了長生不死的黑暗面，以及對永恆青春的渴求。" },
                { en: "The essence of being is not found in the soul, but in the crimson tide that flows through the veins.", cn: "存在的本質不在於靈魂，而在於血管中流淌的深紅潮汐。" }
            ]
        },
        {
            id: 24,
            region: "諾克薩斯",
            title: "Sion: The Undead Juggernaut",
            titleCn: "賽恩：亡靈勇士",
            content: [
                { en: "A legendary warrior resurrected as a mindless engine of destruction, Sion embodies the horrific side of Noxian necromancy.", cn: "一位被復活為無意識毀滅引擎的傳奇戰士，賽恩體現了諾克薩斯通靈術恐怖的一面。" },
                { en: "He was once a hero who choked the life out of a king, but now he is a nightmare that cannot die.", cn: "他曾是掐死國王英勇救國的英雄，但現在他是一個無法死去的惡夢。" },
                { en: "He charges into battle with a thunderous roar, his memory a fragmented blur of slaughter and iron.", cn: "他帶著雷鳴般的咆哮衝入戰場，他的記憶是屠戮與鋼鐵交織的破碎影像。" },
                { en: "\"Pain is the only thing that reminds me I was once a man,\" he bellowed in agony.", cn: "「痛苦是唯一提醒我曾身為人類的東西，」他在痛苦中吼叫。" },
                { en: "He is a weapon of mass devastation, a force of nature that knows only the hunger for combat.", cn: "他是一件大規模毀滅性武器，一股僅知戰鬥飢渴的自然力量。" },
                { en: "The cost of victory can sometimes be the total erasure of the warrior’s own identity.", cn: "勝利的代價有時是戰士自我身分的徹底抹除。" }
            ]
        },
        {
            id: 25,
            region: "諾克薩斯",
            title: "Riven: The Exile",
            titleCn: "雷玟：放逐者",
            content: [
                { en: "Once a celebrated commander, Riven shattered her own runeblade and sought exile after witnessing the cruelty of Noxian warfare.", cn: "曾是一位受人愛戴的指揮官，雷玟在見證諾克薩斯戰爭的殘酷後，粉碎了自己的符文劍並尋求放逐。" },
                { en: "She wanders the land seeking atonement, her broken weapon a symbol of her fractured beliefs.", cn: "她在土地上流浪尋求贖罪，她那斷裂的武器象徵著她破碎的信仰。" },
                { en: "She battles not for a nation, but for a personal understanding of honor and redemption.", cn: "她的戰鬥不為國家，而是為了對榮譽與救贖的個人理解。" },
                { en: "\"A broken blade is still sharp enough to carve a path toward truth,\" she whispered.", cn: "「斷劍依然足夠犀利，足以開闢出一條通往真理的道路，」她低聲說道。" },
                { en: "She exists as a bridge between her violent past and a future defined by choice, not command.", cn: "她存在於暴力的過去與一個由選擇而非命令定義的未來之間。" },
                { en: "Redemption is found not in the restoration of a weapon, but in the mending of a shattered spirit.", cn: "救贖不在於武器的修復，而在於對破碎靈魂的補綴。" }
            ]
        },
        {
            id: 26,
            region: "諾克薩斯",
            title: "Kled: The Cantankerous Cavalier",
            titleCn: "克雷德：頑強戰神",
            content: [
                { en: "A legendary yordle warrior, Kled claims every territory he sees as his own private property.", cn: "身為傳奇的約德爾戰士，克雷德將他所見的每一寸領土都視為其私人財產。" },
                { en: "He rides his cowardly drakalops, Skaarl, into battles that defy all strategic logic.", cn: "他騎著膽小的龍蜥「小嘎」，衝入一場場無視所有戰略邏輯的戰鬥。" },
                { en: "To the Noxian soldiers, he is a chaotic folk hero whose courage borders on absolute insanity.", cn: "對諾克薩斯士兵而言，他是一位勇氣近乎徹底瘋狂的混沌民間英雄。" },
                { en: "\"Get off my lawn, or I’ll use your helmet as a soup bowl!\" he shrieked.", cn: "「滾出我的地盤，否則我會拿你的頭盔來當湯碗！」他尖叫著。" },
                { en: "His existence is a testament to the stubborn, unyielding grit required to survive the frontier.", cn: "他的存在證明了在邊境生存所需的那種頑固且不屈的毅力。" },
                { en: "Sanity is a luxury that the bold often discard in favor of glorious, chaotic conquest.", cn: "理智是勇者往往會為了光榮且混亂的征服而拋棄的一種奢侈品。" }
            ]
        },
        {
            id: 27,
            region: "諾克薩斯",
            title: "Samira: The Desert Rose",
            titleCn: "剎蜜拉：沙漠玫瑰",
            content: [
                { en: "A thrill-seeker who found her true home in Noxus, Samira views every mission as a chance to perform.", cn: "一位在諾克薩斯找到真愛的尋求刺激者，剎蜜拉將每個任務視為表演的機會。" },
                { en: "She excels in style and lethality, combining dual pistols with a blade in a whirlwind of motion.", cn: "她在風格與殺傷力上出類拔萃，在旋風般的動作中將雙槍與刀刃結合。" },
                { en: "She accepts the most perilous assignments, finding boredom to be a far greater threat than death.", cn: "她接受最危險的委託，認為無聊是比死亡更巨大的威脅。" },
                { en: "\"Danger is just a spice that makes the victory taste even sweeter,\" she remarked with a wink.", cn: "「危險只是一種香料，讓勝利的滋味變得更加甜美，」她眨著眼評論道。" },
                { en: "Her life is a relentless pursuit of the next grand spectacle, regardless of the cost.", cn: "她的生活是對下一場宏大奇觀的不懈追求，而不計代價。" },
                { en: "Style is not merely an aesthetic choice; it is the manifestation of a soul that refuses to be mundane.", cn: "風格不僅僅是一種審美選擇；它是一個拒絕平凡的靈魂之展現。" }
            ]
        },
        {
            id: 28,
            region: "諾克薩斯",
            title: "Briar: The Restrained Hunger",
            titleCn: "布蕾爾：受控飢渴",
            content: [
                { en: "Created as a living weapon by the Black Rose, Briar was plagued by an insatiable, frenzied hunger.", cn: "作為黑色玫瑰創造的生物武器，布蕾爾曾深受無止盡且瘋狂的飢渴所苦。" },
                { en: "She wears a specially designed pillory that restrains her power and focuses her wandering mind.", cn: "她佩戴著特製的枷鎖，用以束縛她的力量並集中她那遊蕩的心神。" },
                { en: "When she breaks free, she becomes a whirlwind of feral instincts, devouring anything in her path.", cn: "當她掙脫束縛時，她化作一股原始本能的旋風，吞噬路徑上的一切。" },
                { en: "\"I just want to make friends, but everyone looks so delicious,\" she giggled innocently.", cn: "「我只是想交朋友，但每個人看起來都好美味，」她天真地咯咯笑道。" },
                { en: "She struggles to understand the complexities of the world while grappling with her internal beast.", cn: "她在與內心野獸搏鬥的同時，努力理解這個世界的複雜性。" },
                { en: "Self-control is the most difficult battle for those born with a nature designed for destruction.", cn: "對於天生為了毀滅而設計的人來說，自我控制是最艱難的戰鬥。" }
            ]
        },
        {
            id: 29,
            region: "諾克薩斯",
            title: "Rell: The Iron Maiden",
            titleCn: "銳兒：鋼鐵少女",
            content: [
                { en: "A survivor of horrific magical experiments, Rell possesses the rare ability to manipulate metal.", cn: "作為恐怖魔法實驗的倖存者，銳兒擁有操縱金屬的稀有能力。" },
                { en: "She fled the Black Rose academy and now wanders the land, seeking to dismantle the institution that broke her.", cn: "她逃離了黑色玫瑰學院，現在流浪於大地，試圖摧毀那個粉碎了她的機構。" },
                { en: "She fashions her own armor and mount from the weapons of her fallen oppressors.", cn: "她利用墮落壓迫者的武器，為自己打造盔甲與坐騎。" },
                { en: "\"They tried to mold me into a weapon, but they forgot that metal can break its shapers,\" she vowed.", cn: "「他們試圖將我塑造成武器，但他們忘了金屬也能擊碎其塑造者，」她誓言道。" },
                { en: "Her heart is as cold and unyielding as the iron she commands, fueled by righteous fury.", cn: "她的心像她所掌控的鋼鐵一樣冰冷不屈，由正義的憤怒驅動。" },
                { en: "Betrayal is a forge that can either shatter a spirit or temper it into an unbreakable blade.", cn: "背叛是一個熔爐，既能粉碎靈魂，也能將其鍛造成一把不壞之刃。" }
            ]
        },
        {
            id: 30,
            region: "佐恩",
            title: "Urgot: The Dreadnought",
            titleCn: "烏爾加特：戰車霸主",
            content: [
                { en: "Once a high-ranking Noxian executioner, Urgot was betrayed and sent to the lightless mines of Zaun.", cn: "曾是諾克薩斯的高階行刑官，烏爾加特被背叛並被送往佐恩那暗無天日的礦坑。" },
                { en: "He embraced the agony, augmenting his broken body with heavy machinery and chemical filters.", cn: "他擁抱了痛苦，用重型機械與化學過濾器增強了自己殘破的軀體。" },
                { en: "He now preaches a philosophy of strength through suffering, seeking to purge the weak from the world.", cn: "他現在宣揚一種透過苦難獲得力量的哲學，試圖從世界上清除弱者。" },
                { en: "\"Pain is the only teacher that never lies to its students,\" he rasped through his mask.", cn: "「痛苦是唯一從不對學生撒謊的老師，」他透過面具沙啞地說道。" },
                { en: "He views Noxus as a bloated corpse and seeks to bring about a new era of raw, mechanical survival.", cn: "他將諾克薩斯視為一具臃腫的屍體，試圖開啟一個原始機械生存的新時代。" },
                { en: "True strength is forged in the depths of despair where the illusion of hope is finally extinguished.", cn: "真正的強大是在絕望深處鍛造的，在那裡，希望的幻覺最終熄滅。" }
            ]
        },
        {
            id: 31,
            region: "闇影島",
            title: "Elise: The Spider Queen",
            titleCn: "伊莉絲：蜘蛛女王",
            content: [
                { en: "A high-born lady of Noxus, Elise maintains her eternal youth by sacrificing her suitors to a spider-god.", cn: "身為諾克薩斯的名門女士，伊莉絲透過將追求者祭獻給蜘蛛神，維持其永恆的青春。" },
                { en: "She is a mistress of seduction and horror, luring the unwary into her web of deceit.", cn: "她是誘惑與恐怖的女主人，將不留神的人誘入她的欺詐之網。" },
                { en: "Her elegant exterior conceals a predatory nature that reveals itself only when the trap is sprung.", cn: "她優雅的外表隱藏著掠奪者的本性，唯有在陷阱啟動時才會顯露。" },
                { en: "\"Beauty is a trap that most men walk into with a smile on their faces,\" she remarked.", cn: "「美麗是一個陷阱，多數男人帶著微笑踏入其中，」她評論道。" },
                { en: "She serves the Black Rose by harvesting the essence of those who dare to seek her favor.", cn: "她透過收割那些膽敢尋求她青睞的人之精華，來效命於黑色玫瑰。" },
                { en: "Power often requires a price that most are too moral or too fearful to pay.", cn: "權力往往需要付出代價，而多數人不是太道德就是太恐懼，以至於無法支付。" }
            ]
        },
        {
            id: 32,
            region: "符文大地",
            title: "Alistar: The Minotaur",
            titleCn: "亞歷斯塔：牛頭之王",
            content: [
                { en: "A former gladiator in the Noxian pits, Alistar escaped a life of forced brutality to become a defender of the weak.", cn: "曾是諾克薩斯鬥技場的角鬥士，亞歷斯塔逃離了被迫殘暴的生活，成為弱者的守護者。" },
                { en: "His rage is a formidable force, tempered by a deep sense of justice and compassion for the oppressed.", cn: "他的憤怒是一股強大的力量，並由對受壓迫者的深切正義感與同情心所磨練。" },
                { en: "He wanders the world, a colossal shield against the tyranny he once endured.", cn: "他在世界流浪，成為一個對抗他曾忍受過之暴政的巨大盾牌。" },
                { en: "\"I was a beast for their amusement, but now I am a nightmare for their cruelty,\" he bellowed.", cn: "「我曾是供他們消遣的野獸，但現在我是他們殘酷行徑的噩夢。」他吼叫著。" },
                { en: "His strength is a tool for liberation, a testament to the resilience of the captive spirit.", cn: "他的力量是解放的工具，證明了受困心靈的韌性。" },
                { en: "The most powerful chains are those we shatter to protect the freedom of others.", cn: "最強大的鎖鏈，是我們為了保護他人自由而粉碎的那些。" }
            ]
        },
        {
            id: 33,
            region: "諾克薩斯",
            title: "Annie: The Dark Child",
            titleCn: "安妮：黑暗之女",
            content: [
                { en: "Born in the rugged mountains of northern Noxus, Annie possesses a terrifying natural affinity for fire.", cn: "安妮出生於諾克薩斯北部崎嶇的山脈中，天生就擁有令人恐懼的控火天賦。" },
                { en: "She inadvertently caused a tragic fire that claimed her family, leaving her alone with only her teddy bear, Tibbers.", cn: "她曾在不經意間引發了一場悲劇性的火災並奪走了家人的生命，使她身邊只剩下她的泰迪熊「泰貝爾」。" },
                { en: "She bound a powerful fire demon to the toy, which transforms into a hulking, flaming beast at her command.", cn: "她將一個強大的火魔束縛在這個玩具中，只要她一聲令下，泰貝爾就會化身為巨大的火焰猛獸。" },
                { en: "\"Have you seen my bear Tibbers? He loves to play…especially with matches,\" she giggled, her eyes glowing with embers.", cn: "「你有看見我的小熊泰貝爾嗎？他很喜歡玩耍……特別是玩火柴，」她咯咯笑道，雙眼中閃爍著餘燼的光芒。" },
                { en: "She wanders the world with a mixture of childlike innocence and a volatile, destructive power that few can contain.", cn: "她帶著孩童般的純真與一種鮮少有人能遏制的、不穩定且具毀滅性的力量在世間遊蕩。" },
                { en: "Innocence is a fragile mask for a soul that has already embraced the warmth of the inferno.", cn: "對於一個已經擁抱了煉獄溫暖的靈魂來說，純真只是脆弱的面具。" }
            ]
        },
        {
            id: 34,
            region: "諾克薩斯",
            title: "Mordekaiser: The Iron Revenant",
            titleCn: "魔鬥凱薩：鋼鐵霸主",
            content: [
                { en: "Twice slain and thrice born, Mordekaiser is a brutal warlord from a forgotten era who refused to let death be his end.", cn: "兩度被殺、三度降生，魔鬥凱薩是一位來自被遺忘時代的殘暴軍閥，他拒絕讓死亡成為自己的終點。" },
                { en: "Finding the spirit realm to be an empty wasteland, he used his dark sorcery to bind his soul to a massive suit of iron armor, creating his own kingdom of the dead.", cn: "在發現靈界只是一片荒蕪廢墟後，他利用黑魔法將靈魂束縛在一副巨大的鐵甲上，建立起屬於自己的死者王國。" },
                { en: "He views all of Runeterra as his rightful domain, seeking to harvest the souls of the living to build an eternal army that will never falter.", cn: "他將整個符文大地視為其理所應得的領土，企圖收割生者的靈魂，以建立一支永不凋零的永恆大軍。" },
                { en: "\"Death is a gate, and I am its master. Your world will be the foundation of my empire,\" he boomed, his mace \"Nightfall\" heavy with dark energy.", cn: "「死亡是一道門，而我就是它的主人。你們的世界將成為我帝國的基石，」他如雷鳴般說道，手中的冥槌「夜幕」充滿了黑暗能量。" },
                { en: "He represents the terrifying ambition that defies the natural order, proving that even the grave cannot hold a soul fueled by absolute will.", cn: "他代表了挑戰自然法則的恐怖野心，證明了即便墳墓也無法困住一個由絕對意志驅動的靈魂。" },
                { en: "Iron stands eternal, and under his reign, even the afterlife is forged in steel and shadow.", cn: "鋼鐵永恆不滅，而在他的統治下，就連死後的世界也是由鋼鐵與陰影鍛造而成。" }
            ]
        },
        {
            id: 35,
            region: "諾克薩斯",
            title: "Ambessa: The Matriarch of War",
            titleCn: "安比薩：梅德拉達首領",
            content: [
                { en: "A ruthless Noxian general and the head of the Medarda clan, Ambessa values strength, legacy, and the survival of her family.", cn: "一位殘酷的諾克薩斯將軍且是梅德拉達家族的首領，安比薩將力量、遺產與家族的生存視為最高準則。" },
                { en: "She navigated the political minefields of Noxus and Piltover, willing to do whatever it takes to ensure her house remains on top.", cn: "她在諾克薩斯與皮爾托福的政治雷區中穿梭，為了確保家族立於頂點，她願意付出任何代價。" },
                { en: "She is a master tactician who believes that peace is merely a temporary pause between inevitable conflicts.", cn: "她是一位大師級的戰略家，堅信和平僅僅是不可避免的衝突之間短暫的停歇。" },
                { en: "Armed with her twin blades, she is a terrifying force on the battlefield, cutting down anyone who threatens her vision of the future.", cn: "她手持雙刃，是戰場上恐怖的力量，任何威脅到她未來願景的人都會被她斬於馬下。" },
                { en: "\"Victory is the only language I speak, and the world will learn to listen,\" she declared, her presence commanding absolute respect.", cn: "「勝利是我唯一說的語言，而世界將學會傾聽，」她宣告著，其存在感令人肅然起敬。" }
            ]
        },
        {
            id: 36,
            region: "愛歐尼亞",
            title: "Irelia: The Blade Dancer",
            titleCn: "伊瑞莉雅：舞劍靈絲",
            content: [
                { en: "Once a young student of the traditional dances of her people, Irelia was forced to weaponize her art when Noxus invaded.", cn: "曾是族人傳統舞蹈的年輕學徒，當諾克薩斯入侵時，伊瑞莉雅被迫將她的藝術武器化。" },
                { en: "She utilizes the ancient silk-dances of her ancestors to command a flurry of lethal blades.", cn: "她利用祖先古老的絲綢之舞，操控著一陣致命的劍雨。" },
                { en: "She became a symbol of resistance, her every movement a tribute to the fallen land of Ionia.", cn: "她成了反抗的象徵，她的每一個動作都是對愛歐尼亞這片隕落土地的致敬。" },
                { en: "\"I never wanted to lead, but I refuse to let my home be silenced,\" she declared with a heavy heart.", cn: "「我從未想過要領導，但我拒絕讓我的家園歸於沈默，」她沈重地宣稱。" },
                { en: "She balances the burden of leadership with a profound longing for the harmony of the past.", cn: "她在領導的重擔與對過去和諧生活的深切渴望之間掙扎。" },
                { en: "True strength is found when the beauty of tradition is utilized to defend the sanctity of life.", cn: "當傳統之美被用來捍衛生命的聖潔時，便能發現真正的力量。" }
            ]
        },
        {
            id: 37,
            region: "愛歐尼亞",
            title: "Yasuo: The Unforgiven",
            titleCn: "犽宿：不赦之徒",
            content: [
                { en: "An agile swordsman accused of a crime he did not commit, Yasuo wanders the land in search of the true killer.", cn: "一位被指控犯下莫須有罪名的靈巧劍客，犽宿在土地上流浪，尋找真正的兇手。" },
                { en: "He is a master of the wind technique, his blade moving with the unpredictable grace of a tempest.", cn: "他是御風劍術的大師，他的刀刃以風暴般難以捉摸的優雅移動著。" },
                { en: "His path is marked by the sorrow of slaying his own brother, a scar that no victory can heal.", cn: "他的道路刻著親手斬殺兄長的悲痛，這是一道任何勝利都無法癒合的傷痕。" },
                { en: "\"A wanderer has no home, only the fleeting company of the wind,\" he sighed into the night.", cn: "「浪子沒有家，唯有清風轉瞬即逝的陪伴，」他向黑夜嘆息道。" },
                { en: "He seeks atonement in the silence between breaths, a solitary gale in a fractured world.", cn: "他在呼吸間的沈默中尋求贖罪，是破碎世界中一陣孤獨的狂飆。" },
                { en: "The weight of a sword is nothing compared to the gravity of a burdened conscience.", cn: "比起負罪良心的重量，寶劍的分量根本微不足道。" }
            ]
        },
        {
            id: 38,
            region: "愛歐尼亞",
            title: "Yone: The Unforgotten",
            titleCn: "犽凝：不忘者",
            content: [
                { en: "The elder brother of Yasuo, Yone was brought back from the spirit realm to hunt the demons that feed on negative emotions.", cn: "作為犽宿的兄長，犽凝從靈界歸來，獵殺那些以負面情緒為食的惡魔。" },
                { en: "He wears a mask taken from a defeated \"Azakana,\" a manifestation of his own internal struggle.", cn: "他戴著從戰敗「阿薩卡納」身上取下的面具，那是他內心掙扎的具象化。" },
                { en: "He wields two blades: one of steel for the living, and one of spirit for the malevolent.", cn: "他揮舞兩把劍：一把鋼劍對付生者，一把靈劍對付邪惡之靈。" },
                { en: "\"I died to the blade of my brother, only to find a new purpose in the shadows,\" he remarked solemnly.", cn: "「我死於兄弟的劍下，卻只為了在陰影中找到新的目標，」他莊重地評論道。" },
                { en: "He exists as a bridge between life and death, ensuring that the past does not devour the present.", cn: "他以生死之橋的身分存在，確保過去不會吞噬現在。" },
                { en: "To confront the demons outside, one must first master the darkness that resides within.", cn: "若要對抗外在的惡魔，必須首先掌控棲息於內在的黑暗。" }
            ]
        },
        {
            id: 39,
            region: "愛歐尼亞",
            title: "Karma: The Enlightened One",
            titleCn: "卡瑪：啟蒙者",
            content: [
                { en: "Karma is the living embodiment of an ancient Ionian soul, reincarnated through countless generations.", cn: "卡瑪是一個古老愛歐尼亞靈魂的凡間化身，歷經無數世代輪迴重生。" },
                { en: "She possesses immense spiritual power, serving as a beacon of wisdom and moderate resistance.", cn: "她擁有巨大的靈性力量，作為智慧與溫和反抗的燈塔。" },
                { en: "She seeks a path of harmony, yet she is willing to utilize her power to protect her people from annihilation.", cn: "她尋求和諧之路，但也願意利用她的力量保護子民免於覆滅。" },
                { en: "\"Peace is not a passive state, but a dynamic balance that must be defended,\" she proclaimed.", cn: "「和平並非消極的狀態，而是一種必須被捍衛的動態平衡，」她宣稱道。" },
                { en: "She carries the collective memories of the past, a weight that guides her every decision.", cn: "她承載著過去的集體記憶，這份分量指引著她的每一個決定。" },
                { en: "True leadership is the capacity to listen to the whispers of history while acting in the urgency of the now.", cn: "真正的領導力，是在採取當下緊迫行動的同時，聆聽歷史細語的能力。" }
            ]
        },
        {
            id: 40,
            region: "愛歐尼亞",
            title: "Lee Sin: The Blind Monk",
            titleCn: "李星：盲眼武僧",
            content: [
                { en: "In an act of profound sacrifice, Lee Sin blinded himself to save his monastery from a magical inferno.", cn: "在一場深沉的犧牲行動中，李星為了從魔法烈焰中拯救修道院而使自己失明。" },
                { en: "He channeled the essence of the dragon, transforming his internal energy into a formidable martial art.", cn: "他引導了龍之精華，將內在能量轉化為強大無比的武術。" },
                { en: "He moves with a sensory precision that transcends sight, his spirit attuned to the vibrations of the world.", cn: "他以超越視覺的感官精確度移動，他的精神與世界的震動和諧一致。" },
                { en: "\"I do not need eyes to see the path that justice demands me to take,\" he said with calm resolve.", cn: "「我不需要眼睛，也能看見正義要求我踏上的道路，」他帶著平靜的決心說道。" },
                { en: "He is a guardian of the balance, a humble monk whose strength lies in his disciplined spirit.", cn: "他是平衡的守護者，一位強大力量源於紀律精神的謙卑武僧。" },
                { en: "The most profound vision is not found in the eyes, but in the clarity of one's intent.", cn: "最深刻的視野不在眼睛裡，而是在一個人意圖的清晰度中。" }
            ]
        },
        {
            id: 41,
            region: "愛歐尼亞",
            title: "Master Yi: The Wuju Bladesman",
            titleCn: "易大師：無極劍聖",
            content: [
                { en: "The last practitioner of the ancient art of Wuju, Yi seeks to preserve the legacy of his slaughtered village.", cn: "身為古老無極劍術的最後傳人，易大師試圖保護他被屠戮村莊的遺產。" },
                { en: "He moves with a velocity that defies the human eye, his blade a blur of spiritual energy.", cn: "他以無視肉眼的速度移動，他的刀刃是靈性能量的模糊身影。" },
                { en: "He mentors those who seek the path of discipline, finding peace in the rhythmic precision of his strikes.", cn: "他指導那些尋求紀律之路的人，在擊刺那規律的精確感中尋找平靜。" },
                { en: "\"My blade is an extension of my spirit, and my spirit is as vast as the sky,\" he mused.", cn: "「我的劍是我精神的延伸，而我的精神如天空般廣闊，」他沉思著。" },
                { en: "He battles the internal shadows of vengeance, choosing instead to honor his people through mastery.", cn: "他與內心的復仇陰影戰鬥，轉而選擇透過精進技藝來致敬他的族人。" },
                { en: "The greatest victory is not the defeat of an enemy, but the conquest of one's own impulses.", cn: "最偉大的勝利不在於擊敗敵人，而在於征服自己的衝動。" }
            ]
        },
        {
            id: 42,
            region: "愛歐尼亞",
            title: "Akali: The Rogue Assassin",
            titleCn: "阿卡莉：離群之刺",
            content: [
                { en: "Once a member of the Kinkou Order, Akali left the path of balance to pursue a more direct form of justice.", cn: "曾是慎守教團的一員，阿卡莉離開了平衡之路，轉而追求一種更直接的正義形式。" },
                { en: "She operates in the shadows, utilizing smoke and steel to eliminate those who threaten Ionia.", cn: "她在陰影中行動，利用煙霧與鋼鐵來剷除那些威脅愛歐尼亞的人。" },
                { en: "She rejects the rigid dogmas of her former masters, believing that results matter more than tradition.", cn: "她拒絕前任導師們僵化的教義，相信結果比傳統更重要。" },
                { en: "\"The order seeks balance, but I seek the survival of my people,\" she stated firmly.", cn: "「教團尋求平衡，但我尋求我子民的生存，」她堅定地表示。" },
                { en: "She is a lethal phantom, a rebel who defines her own morality in a world of grey.", cn: "她是一個致命的幽靈，一個在灰色世界中定義自我道德的反叛者。" },
                { en: "Independence is a sharp blade that cuts both ways, offering freedom at the cost of solitude.", cn: "獨立是一把雙面刃，以孤獨為代價提供自由。" }
            ]
        },
        {
            id: 43,
            region: "愛歐尼亞",
            title: "Shen: Eye of Twilight",
            titleCn: "慎：暮光之眼",
            content: [
                { en: "As the leader of the Kinkou Order, Shen is tasked with maintaining the equilibrium between the spirit and physical realms.", cn: "身為慎守教團的領袖，慎肩負著維持靈界與物質界平衡的任務。" },
                { en: "He views the world with an impartial detachment, setting aside personal emotion to fulfill his duty.", cn: "他以公正無私的超脫感觀察世界，放下個人情感以履行職責。" },
                { en: "His spirit blade can cross the veil between worlds, protecting the sanctity of the cosmic order.", cn: "他的靈劍能跨越兩個世界間的面紗，保護宇宙秩序的聖潔。" },
                { en: "\"I am the silent guardian of the threshold, where light and shadow meet,\" he remarked.", cn: "「我是那道門檻的沈默守護者，光與影在那裡相遇，」他評論道。" },
                { en: "His life is a constant vigil, a heavy burden that requires the suppression of his own desires.", cn: "他的生活是一場恆久的守望，這是一份要求壓抑自身慾望的沈重負擔。" },
                { en: "Justice without bias is a cold necessity that ensures the survival of the greater whole.", cn: "不偏不倚的正義是一種冰冷的必要性，確保了整體大局的生存。" }
            ]
        },
        {
            id: 44,
            region: "愛歐尼亞",
            title: "Zed: The Master of Shadows",
            titleCn: "劫：影流之主",
            content: [
                { en: "Zed embraced the forbidden shadow magic to gain the power necessary to drive the Noxians from Ionia.", cn: "劫擁抱了禁忌的影子魔法，以獲得將諾克薩斯人逐出愛歐尼亞所需的能量。" },
                { en: "He founded the Order of Shadow, a ruthless organization that values strength and results over tradition.", cn: "他創立了影流教團，一個重視力量與結果勝過傳統的殘酷組織。" },
                { en: "He is a lethal shadow-master, capable of striking from multiple directions simultaneously.", cn: "他是致命的影子大師，能同時從多個方向發起攻擊。" },
                { en: "\"Tradition is a shackle that prevents us from realizing our true potential,\" he declared.", cn: "「傳統是阻止我們發揮真正潛力的枷鎖，」他宣稱。" },
                { en: "His path led to the tragic death of his master, a legacy of blood that continues to haunt him.", cn: "他的道路導致了導師悲劇性的死亡，這是一段持續糾纏著他的血色遺產。" },
                { en: "To save a nation, one must sometimes be willing to sacrifice the purity of one's own soul.", cn: "為了拯救國家，有時必須願意犧牲自己靈魂的純潔。" }
            ]
        },
        {
            id: 45,
            region: "愛歐尼亞",
            title: "Ahri: The Nine-Tailed Fox",
            titleCn: "阿璃：九尾妖狐",
            content: [
                { en: "A vastaya who once consumed the essence of humans to become more human herself, Ahri now seeks her true origins.", cn: "一位曾透過消耗人類本質來讓自己更具人性的梵斯塔雅人，阿璃現在尋找著她的真實起源。" },
                { en: "She possesses an innate charm and lethal orb of spiritual energy, wandering the world in search of her past.", cn: "她擁有天生的魅力與致命的靈能寶珠，在世界流浪尋找著她的過去。" },
                { en: "She grapples with the guilt of her predatory history, seeking to forge a new identity based on empathy.", cn: "她與自己曾身為掠奪者的罪惡感搏鬥，試圖建立一個基於共情的新身分。" },
                { en: "\"Memories are both a treasure and a cage; I seek to understand the one that holds me,\" she mused.", cn: "「記憶既是寶藏也是囚籠；我試圖理解那個困住我的記憶，」她沉思著。" },
                { en: "She is a creature of immense grace and hidden sorrow, a solitary soul in a beautiful, dangerous land.", cn: "她是個極具優雅且隱藏著悲傷的生物，是這片美麗而危險土地上的一位孤獨靈魂。" },
                { en: "Redemption is a journey of rediscovering the humanity that was always hidden within.", cn: "救贖是一段重新發現那始終隱藏在內在的人性之旅。" }
            ]
        },
        {
            id: 46,
            region: "愛歐尼亞",
            title: "Xayah: The Rebel",
            titleCn: "剎雅：叛逆者",
            content: [
                { en: "A vastayan revolutionary, Xayah fights a guerrilla war to reclaim the waning magic of her people.", cn: "作為一名瓦斯塔亞革命者，剎雅發起了一場游擊戰，試圖奪回族人日漸消逝的魔法。" },
                { en: "She views the spread of humanity as a lethal blight upon the natural spiritual flow.", cn: "她將人類的擴張視為對自然靈性流動的一種致命枯萎。" },
                { en: "Her plumage consists of razor-sharp feathers that she manipulates with lethal precision.", cn: "她的羽翼由鋒利如刃的羽毛組成，她能以致命的精確度操控它們。" },
                { en: "\"Freedom is a song that must be sung with the rhythm of falling steel,\" she declared.", cn: "「自由是一首必須伴隨鋼鐵墜落節奏而唱的歌，」她宣稱道。" },
                { en: "Beneath her thorny exterior lies a profound devotion to her culture and her partner, Rakan.", cn: "在她那帶刺的外表下，隱藏著對自身文化及伴侶銳空的深切奉獻。" },
                { en: "The survival of a legacy often requires the fierce protection of its remaining embers.", cn: "傳承的生存，往往需要對其殘存餘燼進行猛烈的守護。" }
            ]
        },
        {
            id: 47,
            region: "愛歐尼亞",
            title: "Rakan: The Charmer",
            titleCn: "銳空：惑魅者",
            content: [
                { en: "The most flamboyant battle-dancer in vastayan history, Rakan is the chaotic heart to Xayah’s calculated mind.", cn: "身為瓦斯塔亞史上最華麗的戰鬥舞者，銳空是與剎雅冷靜頭腦相對應的混沌之心。" },
                { en: "He utilizes his infectious energy to distract enemies, turning every battlefield into a grand performance.", cn: "他利用極具感染力的能量來分散敵人的注意，將每個戰場轉化為一場宏大的表演。" },
                { en: "While he appears flighty, his loyalty to Xayah and the cause of their people is absolute.", cn: "雖然他看起來輕浮，但他對剎雅及族人事業的忠誠卻是絕對的。" },
                { en: "\"The world is a stage, and I am the spark that sets the night on fire,\" he laughed.", cn: "「世界是個舞台，而我是點燃黑夜的星火，」他大笑著。" },
                { en: "His movements are a blur of gold and feathers, a vibrant shield for the woman he loves.", cn: "他的動作是金光與羽毛的模糊交織，是他所愛女人的鮮活護盾。" },
                { en: "True partnership is the harmony of two disparate spirits dancing toward a singular goal.", cn: "真正的夥伴關係，是兩個迥異靈魂朝著單一目標共舞的和諧。" }
            ]
        },
        {
            id: 48,
            region: "愛歐尼亞",
            title: "Varus: The Arrow of Retribution",
            titleCn: "法洛士：報應箭矢",
            content: [
                { en: "Varus is a fusion of two Ionian hunters and a vengeful Darkin entity trapped within a bow.", cn: "法洛士是兩位愛歐尼亞獵人與一個被囚禁於長弓內的復仇暗裔實體的融合。" },
                { en: "He is a tragic composite, a relentless archer seeking to eradicate those who destroyed his past.", cn: "他是一個悲劇性的複合體，一位試圖剷除毀滅他過去之人的無情弓箭手。" },
                { en: "The internal struggle between the human souls and the Darkin malice is a constant torment.", cn: "人類靈魂與暗裔惡意之間的內在掙扎，是一場恆久的煎熬。" },
                { en: "\"We are three voices singing a single song of cold, calculated death,\" the entity hissed.", cn: "「我們是三種聲音，共同唱著一首冰冷且精算的死亡之歌，」該實體發出嘶嘶聲。" },
                { en: "His arrows are infused with a corruptive energy that withers the resolve of his foes.", cn: "他的箭矢注入了一種具侵蝕性的能量，能枯萎敵人的鬥志。" },
                { en: "Vengeance is a hungry flame that threatens to consume the very vessel it occupies.", cn: "復仇是一朵飢餓的火焰，威脅著要吞噬它所佔據的容器本身。" }
            ]
        },
        {
            id: 49,
            region: "愛歐尼亞",
            title: "Wukong: The Monkey King",
            titleCn: "悟空：猴王",
            content: [
                { en: "A vastayan prankster who sought the path of true strength, Wukong became the apprentice of Master Yi.", cn: "一位尋求真強者之路的瓦斯塔亞惡作劇者，悟空成了易大師的徒弟。" },
                { en: "He wields an enchanted staff that grows with his ambition, fighting with a mercurial and elusive style.", cn: "他揮舞著隨野心增長的魔杖，以一種變化莫測且難以捉摸的風格戰鬥。" },
                { en: "He balances his natural curiosity with the disciplined philosophy of Wuju.", cn: "他在天生的好奇心與無極劍術的紀律哲學之間取得平衡。" },
                { en: "\"Strength is not just in the blow, but in the wisdom to know when to strike,\" he remarked.", cn: "「力量不僅在於擊打，更在於知曉何時出擊的智慧，」他評論道。" },
                { en: "He stands as a bridge between the wild spirit of the forest and the refined art of combat.", cn: "他是森林狂野精神與精煉戰鬥藝術之間的橋樑。" },
                { en: "The journey toward mastery begins with the humility to unlearn the habits of the ego.", cn: "邁向大師之路，始於卸下自我習慣的謙卑。" }
            ]
        },
        {
            id: 50,
            region: "愛歐尼亞",
            title: "Kennen: The Heart of the Tempest",
            titleCn: "凱能：狂暴之心",
            content: [
                { en: "A yordle member of the Kinkou Order, Kennen is the swift messenger of the balance.", cn: "作為慎守教團的約德爾成員，凱能是平衡之道的敏捷使者。" },
                { en: "He manipulates the raw energy of lightning, moving with a speed that defies physical laws.", cn: "他操縱雷電的原始能量，以無視物理定律的速度移動。" },
                { en: "He serves as the \"Eye\" that observes the world, ensuring the equilibrium remains undisturbed.", cn: "他擔任觀察世界的「眼」，確保均衡狀態不被破壞。" },
                { en: "\"The storm does not choose sides; it merely cleanses the path of the stagnant,\" he chirped.", cn: "「風暴不選邊站；它僅僅是清除停滯之路上的障礙，」他清脆地說道。" },
                { en: "Despite his diminutive stature, his presence on the battlefield is as shocking as a thunderclap.", cn: "儘管身材矮小，他在戰場上的存在感卻如雷鳴般震撼。" },
                { en: "Energy must be tempered by purpose, lest it become a force of aimless devastation.", cn: "能量必須由目標來磨練，否則它會變成一股漫無目的的毀滅力量。" }
            ]
        },
        {
            id: 51,
            region: "愛歐尼亞",
            title: "Sett: The Boss",
            titleCn: "賽特：野心之火",
            content: [
                { en: "A half-beast criminal kingpin, Sett rose from the fighting pits to dominate the Ionian underworld.", cn: "一位半獸人罪犯首腦，賽特從鬥技場崛起，統治了愛歐尼亞的地下世界。" },
                { en: "He utilizes his immense physical strength to crush those who dare to challenge his authority.", cn: "他利用巨大的體能，粉碎那些膽敢挑戰其權威的人。" },
                { en: "While his methods are brutal, his loyalty to his mother is his only remaining moral anchor.", cn: "雖然他的手段殘忍，但對母親的忠誠是他唯一殘存的道德錨點。" },
                { en: "\"In this world, you either hold the reigns or you feel the whip,\" he grunted with a smirk.", cn: "「在這個世界上，你要麼握住韁繩，要麼感受鞭子，」他帶著苦笑低哼。" },
                { en: "He is a product of social exclusion, forging a throne out of grit and raw violence.", cn: "他是社會排斥下的產物，憑藉毅力與原始暴力鍛造出王座。" },
                { en: "Resilience can turn a life of suffering into a monument of unyielding power.", cn: "韌性可以將痛苦的一生，轉化為不屈權力的豐碑。" }
            ]
        },
        {
            id: 52,
            region: "愛歐尼亞",
            title: "Syndra: The Dark Sovereign",
            titleCn: "星朵拉：暗黑元首",
            content: [
                { en: "Possessing a terrifying innate magical potential, Syndra was feared and restrained by her mentors.", cn: "擁有恐怖的天生魔法潛力，星朵拉曾被她的導師們所恐懼與限制。" },
                { en: "She rejected the concept of balance, viewing it as a prison for her expanding consciousness.", cn: "她拒絕平衡的概念，將其視為束縛她擴張意識的囚籠。" },
                { en: "She wields dark orbs of raw power, manipulating the environment to suit her singular will.", cn: "她揮舞著原始力量的黑暗球體，操縱環境以符合她唯一的意志。" },
                { en: "\"Limitless power is the only truth in a world of fragile restraints,\" she declared.", cn: "「在一個充滿脆弱束縛的世界裡，無限的力量是唯一的真理，」她宣稱。" },
                { en: "She floats above the world, a detached monarch of her own isolated realm.", cn: "她漂浮於世間之上，是她那孤立領地的超脫君主。" },
                { en: "Potential, when suppressed by fear, can erupt into a storm of unbridled defiance.", cn: "潛能若被恐懼壓制，便可能爆發成一場放縱的反抗風暴。" }
            ]
        },
        {
            id: 53,
            region: "愛歐尼亞",
            title: "Lillia: The Bashful Bloom",
            titleCn: "莉莉亞：羞怯花蕾",
            content: [
                { en: "A shy spirit-fawn born from a magical tree, Lillia seeks to collect the dreams of mortals to heal her mother.", cn: "一位由魔法之樹誕生的害羞靈魂小鹿，莉莉亞試圖收集凡人的夢境來治癒她的母親。" },
                { en: "She perceives the world through the lens of slumber and imagination, fearing the harshness of reality.", cn: "她透過睡眠與想像的視角觀察世界，恐懼現實的嚴酷。" },
                { en: "Her magic can lull the weary into a peaceful sleep, revealing the hidden desires of their hearts.", cn: "她的魔法能引導疲憊者進入平靜的睡眠，揭示他們心中隱藏的渴望。" },
                { en: "\"Dreams are the whispers of the soul that we forget when the sun rises,\" she murmured.", cn: "「夢境是我們在太陽升起時遺忘的靈魂細語，」她低聲說道。" },
                { en: "She wanders the forest as a guardian of wonder, a fragile light in a world of growing shadows.", cn: "她在森林中流浪，作為奇蹟的守護者，是日益增長的陰影世界中一抹脆弱的光。" },
                { en: "Even the most timid heart can foster the healing that a cynical world desperately needs.", cn: "即便是一顆最膽怯的心，也能孕育出憤世嫉俗的世界所迫切需要的療癒。" }
            ]
        },
        {
            id: 54,
            region: "愛歐尼亞",
            title: "Jhin: The Virtuoso",
            titleCn: "燼：戲劇大師",
            content: [
                { en: "Though captured by the Kinkou and utilized by Ionian radicals, Jhin remains an enigma of lethal aesthetics.", cn: "雖然曾被慎守教團俘虜並被愛歐尼亞激進分子利用，燼依然是一個致命美學的謎團。" },
                { en: "He views every assassination as a \"performance\" that demands flawless composition.", cn: "他將每一次暗殺視為一場要求完美構圖的「表演」。" },
                { en: "His presence turned the spiritual land of Ionia into a stage for his grotesque masterpieces.", cn: "他的存在將愛歐尼亞這片靈性土地變成了他那些怪誕傑作的舞台。" },
                { en: "\"Art is the scream that escapes when the mask of civility finally cracks,\" he proclaimed.", cn: "「藝術是當文明面具最終破裂時逃逸出的尖叫，」他宣稱道。" },
                { en: "He is the ultimate personification of chaos dressed in the finery of calculated order.", cn: "他是穿著精算秩序華服的混沌終極化身。" },
                { en: "The line between madness and genius is often drawn in the blood of the uninspired.", cn: "瘋狂與天才之間的界限，往往是用平庸之輩的鮮血劃定的。" }
            ]
        },
        {
            id: 55,
            region: "愛歐尼亞",
            title: "Kayn: The Shadow Reaper",
            titleCn: "慨影：暗影割頭者",
            content: [
                { en: "A prodigy of shadow magic, Shieda Kayn was taken in by Zed after surviving a Noxian invasion as a child soldier.", cn: "作為影流魔法的天才，悉拉．慨影在孩童時期作為諾克薩斯娃娃兵倖存後，被劫收為門徒。" },
                { en: "He wields a sentient Darkin weapon, Rhaast, and remains locked in a constant psychological and physical battle for dominance.", cn: "他揮舞著具有自我意識的冥血族武器「慨影」，並與其陷入了爭奪肉體主導權的永恆身心鬥爭。" },
                { en: "Depending on who wins, he will either become a shadow master or be consumed by the Darkin's thirst for slaughter.", cn: "根據最終勝出者是誰，他要麼成為暗影大師，要麼被冥血族對殺戮的渴望所吞噬。" },
                { en: "\"I am the weapon, you are just the practice,\" he sneered, while Rhaast's voice echoed back in hunger.", cn: "「我才是真正的武器，你只是練習對象，」他冷笑道，而慨影那飢渴的聲音則隨之迴盪。" },
                { en: "He represents the ultimate gamble of seeking power from the very things that wish to destroy you.", cn: "他代表了從試圖毀滅你的事物中尋求力量，這種究極的豪賭。" }
            ]
        },
        {
            id: 56,
            region: "皮爾托福",
            title: "Jayce: The Defender of Tomorrow",
            titleCn: "杰西：明日守護者",
            content: [
                { en: "A brilliant inventor, Jayce dedicated his life to the marriage of science and magic, known as \"Hextech.", cn: "\" 身為一位天才發明家，杰西將一生致力於結合科學與魔法，即所謂的「海克斯科技」。" },
                { en: "He wields a transforming hammer-cannon, protecting the interests of the city with unyielding arrogance.", cn: "他揮舞著一把可轉形的錘砲，以一種不屈的傲慢守護著城市的利益。" },
                { en: "Though hailed as a hero, he struggles with the social responsibilities that accompany his intellectual gifts.", cn: "雖然被譽為英雄，他卻在智慧天賦所帶來的社會責任中掙扎。" },
                { en: "\"Progress is a relentless climb, and someone must clear the path for the future,\" he asserted.", cn: "「進步是一場不懈的攀登，必須有人為未來開闢道路，」他斷言道。" },
                { en: "He is a man of logic and order, often detached from the struggles of the less fortunate.", cn: "他是一個講求邏輯與秩序的人，往往與弱勢者的掙扎脫節。" },
                { en: "The burden of brilliance is the expectation to solve problems that others cannot even perceive.", cn: "天才的重擔，在於被期待去解決他人甚至無法察覺的問題。" }
            ]
        },
        {
            id: 57,
            region: "皮爾托福",
            title: "Vi: The Piltover Enforcer",
            titleCn: "菲艾：執法者",
            content: [
                { en: "Once a street-tough orphan from the slums of Zaun, Vi chose to use her strength for the law in Piltover.", cn: "曾是佐恩貧民窟中一名強悍的孤兒，菲艾選擇在皮爾托福為法律貢獻她的力量。" },
                { en: "She utilizes massive hextech gauntlets to shatter anything that stands in the way of her pursuit of order.", cn: "她利用巨大的海克斯手套，粉碎任何阻礙她追求秩序的障礙。" },
                { en: "Her methods are direct and visceral, reflecting a personality that values action over intricate planning.", cn: "她的手段直接且充滿力量感，反映出她那種行動勝過複雜計畫的性格。" },
                { en: "\"Sometimes, you have to break something old to build something new,\" she remarked with a smirk.", cn: "「有時，你必須打破舊有的東西，才能建立新的秩序，」她帶著苦笑評論道。" },
                { en: "Despite her official role, her heart remains connected to the shadows of the city she left behind.", cn: "儘管身居公職，她的心依然與她身後那座城市的陰影緊緊相連。" },
                { en: "Justice is a hammer that strikes most effectively when it is wielded with a personal understanding of pain.", cn: "當正義伴隨著對痛苦的個人理解而揮舞時，這把鐵錘的打擊最為有效。" }
            ]
        },
        {
            id: 58,
            region: "皮爾托福",
            title: "Caitlyn: The Sheriff of Piltover",
            titleCn: "凱特琳：皮爾托福警長",
            content: [
                { en: "The daughter of a wealthy merchant family, Caitlyn traded high society for a life of meticulous detective work.", cn: "出身於富裕商人家庭，凱特琳放棄了上流社會，轉而投身於縝密的偵探工作。" },
                { en: "She is the premier sharpshooter of the Enforcers, her rifle capable of delivering justice from afar.", cn: "她是執法者中的首席神射手，她的長槍能從遠處遞送正義。" },
                { en: "She seeks to uncover the truth behind the criminal underworld, using her intellect to outmaneuver her foes.", cn: "她試圖揭開犯罪地下世界背後的真相，利用她的智慧在智鬥中勝過敵人。" },
                { en: "\"A clean shot requires a steady hand and a mind free of distractions,\" she stated calmly.", cn: "「精準的射擊需要穩定的手，以及一個沒有雜念的心靈，」她平靜地說。" },
                { en: "She represents the moral compass of the city, striving to maintain order amidst growing civil unrest.", cn: "她代表了城市的道德指南針，在日益增長的動盪中努力維持秩序。" },
                { en: "Observation is a lethal weapon in the hands of those who possess the patience to wait for the perfect moment.", cn: "觀察是一件致命的武器，掌握在那些有耐心等待完美時刻的人手中。" }
            ]
        },
        {
            id: 59,
            region: "皮爾托福",
            title: "Camille: The Steel Shadow",
            titleCn: "卡蜜兒：鋼鐵之影",
            content: [
                { en: "The principal intelligence operative of House Ferros, Camille sacrificed her humanity to become a living weapon.", cn: "身為費羅斯家族的首席情報官，卡蜜兒犧牲了她的人性以成為一件活生生的武器。" },
                { en: "Her body is augmented with hextech, her legs replaced with lethal, razor-sharp blades.", cn: "她的身體被海克斯科技所強化，雙腿被替換成致命且鋒利如刃的刀鋒。" },
                { en: "She views herself as a surgeon, excising threats to the city's stability with clinical precision.", cn: "她將自己視為一名外科醫生，以臨床般的精確切除威脅城市穩定的因素。" },
                { en: "\"Precision is the difference between a butcher and a master of the craft,\" she remarked coldly.", cn: "「精確是屠夫與工藝大師之間的區別，」她冷冷地評論道。" },
                { en: "She operates in the grey areas of morality, ensuring the dominance of her clan and the city.", cn: "她在道德的灰色地帶行動，確保她的家族與這座城市的統治地位。" },
                { en: "Control is a delicate tapestry that must be constantly mended with steel and unwavering resolve.", cn: "控制是一幅微妙的掛毯，必須不斷地用鋼鐵與不移的決心來補綴。" }
            ]
        },
        {
            id: 60,
            region: "皮爾托福",
            title: "Orianna: The Lady of Clockwork",
            titleCn: "奧莉安娜：發條少女",
            content: [
                { en: "Born human, Orianna’s body was slowly replaced by mechanical parts to survive a fatal toxic accident.", cn: "出身人類，奧莉安娜的身體因一場致命的毒氣意外而被逐漸替換成機械零件。" },
                { en: "She now exists as a perfect clockwork creation, accompanied by a sentient brass orb.", cn: "她現在作為一個完美的發條造物存在，伴隨著一個具備意識的黃銅球體。" },
                { en: "She struggles to retain fragments of her human memories while operating with machine-like efficiency.", cn: "她在以機器般的效率運作之餘，努力保留她人類記憶的碎片。" },
