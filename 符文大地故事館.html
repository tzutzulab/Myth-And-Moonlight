                { en: "\"I can hear the ticking of the world, but the rhythm of the heart is harder to find,\" she mused.", cn: "「我能聽到世界的滴答聲，但心臟的節奏卻難以尋覓，」她沉思著。" },
                { en: "She is an enigma of brass and steel, a guardian of the city whose nature is both beautiful and tragic.", cn: "她是黃銅與鋼鐵構成的謎團，一位本性既美麗又悲劇的城市守護者。" },
                { en: "Identity is a ghost that persists even when the vessel that carried it has turned to cold metal.", cn: "身分是一個幽靈，即便承載它的容器已變成冰冷的金屬，它依然存在。" }
            ]
        },
        {
            id: 61,
            region: "皮爾托福",
            title: "Heimerdinger: The Revered Inventor",
            titleCn: "漢默丁格：大發明家",
            content: [
                { en: "A yordle scientist who chose Piltover for its dedication to the pursuit of knowledge.", cn: "一位選擇了皮爾托福的約德爾科學家，因為這座城市致力於追求知識。" },
                { en: "He possesses a brilliant, albeit eccentric, mind that seeks to solve the world's most complex problems.", cn: "他擁有一顆天才但古怪的大腦，試圖解決世界上最複雜的問題。" },
                { en: "He utilizes automated turrets and advanced weaponry to demonstrate the power of pure intellect.", cn: "他利用自動砲塔與先進武器，來展示純粹智慧的力量。" },
                { en: "\"Scientific discovery is a marathon, not a sprint toward chaos,\" he explained with excitement.", cn: "「科學發現是一場馬拉松，而不是一場奔向混亂的短跑，」他興奮地解釋道。" },
                { en: "Despite his short stature, his contributions to hextech have fundamentally altered the course of history.", cn: "儘管身材矮小，他對海克斯科技的貢獻從根本上改變了歷史的進程。" },
                { en: "Progress is a ladder built from the curiosity of those who dare to ask \"why.", cn: "\" 進步是一段由那些敢於問「為什麼」的人的好奇心所搭建的階梯。" }
            ]
        },
        {
            id: 62,
            region: "皮爾托福",
            title: "Seraphine: The Starry-Eyed Songstress",
            titleCn: "瑟拉芬：燦亮歌姬",
            content: [
                { en: "Possessing the ability to hear the souls of others through music, Seraphine seeks to unify the twin cities.", cn: "擁有透過音樂聆聽他人靈魂的能力，瑟拉芬試圖統一這兩座孿生城市。" },
                { en: "She uses her stage presence and melodic voice to bridge the gap between Piltover and Zaun.", cn: "她利用舞台魅力與悅耳歌聲，搭建起皮爾托福與佐恩之間的橋樑。" },
                { en: "While some view her as naive, her optimism is a powerful force for social change.", cn: "雖然有些人認為她天真，但她的樂觀是推動社會變革的強大力量。" },
                { en: "\"One voice is a whisper, but a thousand voices are a song that can change the world,\" she proclaimed.", cn: "「一個人的聲音是細語，但一千個人的聲音便是足以改變世界的歌，」她宣稱。" },
                { en: "She utilizes a hextech-powered platform to amplify the vibrations of empathy.", cn: "她利用一個海克斯驅動的平台，來放大共情的震動。" },
                { en: "Harmony is a deliberate choice that requires the courage to listen to the discordant notes of the crowd.", cn: "和諧是一種刻意的選擇，需要勇氣去聆聽群眾中那些不和諧的音符。" }
            ]
        },
        {
            id: 63,
            region: "皮爾托福",
            title: "Ezreal: The Prodigal Explorer",
            titleCn: "伊澤瑞爾：探險家",
            content: [
                { en: "A charismatic archaeologist, Ezreal stumbled upon a powerful shuriman gauntlet during his travels.", cn: "一位充滿魅力的考古學家，伊澤瑞爾在旅途中偶然發現了一只強大的蘇瑞瑪護手。" },
                { en: "He prefers the excitement of forgotten ruins over the dusty libraries of the university.", cn: "比起大學裡佈滿塵埃的圖書館，他更偏好被遺忘遺跡中的刺激感。" },
                { en: "He utilizes the gauntlet’s arcane energy to blink through space and unleash bolts of power.", cn: "他利用護手的奧術能量在空間中閃現，並釋放出能量彈。" },
                { en: "\"Maps are just suggestions for those who are brave enough to forge their own path,\" he quipped.", cn: "「地圖僅僅是對那些有勇氣開闢自己道路者的建議，」他俏皮地說。" },
                { en: "He is driven by a desire to find his lost parents, using fame as a beacon to guide them back.", cn: "他受尋找失蹤父母的慾望驅使，將名聲作為引導他們歸來的燈塔。" },
                { en: "Adventure is a call that resonates within the spirit, demanding the courage to embrace the unknown.", cn: "冒險是精神深處的一種呼喚，要求人們拿出擁抱未知的勇氣。" }
            ]
        },
        {
            id: 64,
            region: "佐恩",
            title: "Jinx: The Loose Cannon",
            titleCn: "吉茵珂絲：暴走重砲",
            content: [
                { en: "A manic and impulsive criminal from Zaun, Jinx lives to wreak havoc without a thought for the consequences.", cn: "身為一名來自佐恩、狂躁且衝動的罪犯，吉茵珂絲的生活宗旨就是製造混亂，從不考慮後果。" },
                { en: "She carries an arsenal of deadly toys, including her favorite rocket launcher, \"Fishbones.", cn: "\" 她隨身攜帶大量致命玩具，包括她最愛的火箭發射器「魚骨頭」。" },
                { en: "Her fractured mind is a playground of explosions and colorful destruction.", cn: "她那破碎的心靈是一座充斥著爆炸與繽紛毀滅的遊樂場。" },
                { en: "\"I'm not crazy! I just have a very creative way of solving boredom,\" she giggled amidst the smoke.", cn: "「我沒瘋！我只是有一種非常有創意的方式來解決無聊，」她在煙霧中咯咯笑道。" },
                { en: "She is a chaotic reflection of the city’s neglect, a firework that refuses to be extinguished.", cn: "她是這座城市受忽視後的混亂投射，是一朵拒絕熄滅的煙火。" },
                { en: "Chaos is the only freedom for those who find the world's order to be an unbearable cage.", cn: "對於那些發現世界秩序是座難以忍受之囚籠的人來說，混亂是唯一的自由。" }
            ]
        },
        {
            id: 65,
            region: "佐恩",
            title: "Warwick: The Uncaged Wrath of Zaun",
            titleCn: "沃維克：佐恩之怒",
            content: [
                { en: "Once a man who sought to leave a life of crime, Warwick was transformed into a monstrous predator by agonizing experiments.", cn: "曾是一位試圖脫離犯罪生活的男子，沃維克在一場痛苦的實驗中被轉化為恐怖的掠奪者。" },
                { en: "His body is fused with alchemical pumps, fueling a primal rage that is triggered by the scent of blood.", cn: "他的身體與鍊金幫浦融合，由血腥味觸發其原始的怒火。" },
                { en: "He stalks the dark alleys, hunting those who prey on the innocent in the grey city.", cn: "他潛伏在陰暗巷弄中，獵殺那些在灰色城市裡掠奪無辜者的人。" },
                { en: "\"The beast within is not a curse, but a mirror of the world that created me,\" he howled.", cn: "「內心的野獸並非詛咒，而是創造我的這個世界的鏡像，」他嚎叫著。" },
                { en: "He is a tragic guardian, a creature of nightmare who seeks a twisted form of justice.", cn: "他是一位悲劇性的守護者，是一個尋求扭曲正義形式的惡夢生物。" },
                { en: "Monstrosity is often the final refuge for a soul that has been shattered by cruelty.", cn: "怪誕醜陋，往往是受殘酷粉碎之靈魂的最後避難所。" }
            ]
        },
        {
            id: 66,
            region: "佐恩",
            title: "Viktor: The Machine Herald",
            titleCn: "維克特：機械使徒",
            content: [
                { en: "Believing that human frailty is the root of all suffering, Viktor embraced the \"Glorious Evolution.", cn: "\" 相信人類的脆弱是所有苦難的根源，維克特擁抱了「光榮進化」。" },
                { en: "He replaced his failing flesh with superior mechanical augmentations, seeking to lead humanity toward perfection.", cn: "他用優越的機械增強裝置替換了衰敗的肉體，試圖引領人類邁向完美。" },
                { en: "He values cold, unwavering logic over the unpredictable messiness of emotions.", cn: "他看重冷靜、不移的邏輯，更甚於難以捉摸且混亂的情感。" },
                { en: "\"Steel is stronger than flesh, and logic is sharper than sentiment,\" he stated with mechanical precision.", cn: "「鋼鐵比肉體強韌，而邏輯比情感敏銳，」他以機械般的精確說道。" },
                { en: "He views himself as a savior, though the world often sees him as a detached tyrant.", cn: "他將自己視為救世主，儘管世人往往將他視為冷漠的暴君。" },
                { en: "True progress requires the courage to shed the limitations of our biological inheritance.", cn: "真正的進步，需要勇氣去脫離我們生物遺傳的限制。" }
            ]
        },
        {
            id: 67,
            region: "佐恩",
            title: "Ekko: The Boy Who Shattered Time",
            titleCn: "艾克：時間刺客",
            content: [
                { en: "A genius inventor from the streets, Ekko created the \"Z-Drive\" to manipulate time in short bursts.", cn: "一位來自街頭的天才發明家，艾克創造了「夾秒計時器」，能短暫操縱時間。" },
                { en: "He uses his ingenuity to protect his friends and ensure a future for the youth of Zaun.", cn: "他利用自己的才智保護朋友，並為佐恩的年輕一代確保未來。" },
                { en: "He refuses to abandon his home for the heights of Piltover, valuing the grit and spirit of the underground.", cn: "他拒絕為了皮爾托福的高位而拋棄家園，他珍惜地下世界的毅力與精神。" },
                { en: "\"It’s not about how much time you have, but how you use the seconds you’ve got,\" he remarked.", cn: "「重點不在於你擁有多少時間，而在於你如何使用你所擁有的每一秒，」他評論道。" },
                { en: "He is a beacon of hope, a reminder that brilliance can flourish even in the darkest cracks.", cn: "他是希望的燈塔，提醒世人智慧即便在最陰暗的裂縫中也能綻放。" },
                { en: "Innovation is the weapon of the disenfranchised, a way to reclaim power from a rigid reality.", cn: "創新是被剝奪權利者的武器，是一種從僵化現實中奪回權力的方式。" }
            ]
        },
        {
            id: 68,
            region: "佐恩",
            title: "Singed: The Mad Chemist",
            titleCn: "辛吉德：瘋狂鍊金術士",
            content: [
                { en: "The architect of horrific chemical warfare, Singed is a man who sacrificed all morality for the sake of knowledge.", cn: "恐怖化學戰爭的締造者，辛吉德是一位為了知識而犧牲所有道德的人。" },
                { en: "He wanders the battlefield, leaving a trail of toxic ichor that withers everything it touches.", cn: "他在戰場上徘徊，留下毒性膿液的痕跡，枯萎接觸到的一切。" },
                { en: "He views living beings as mere data points in a grand, agonizing experiment.", cn: "他將生物視為一場宏大且痛苦實驗中單純的數據點。" },
                { en: "\"Knowledge is a poison that most are too weak to consume,\" he whispered through his bandages.", cn: "「知識是一種毒藥，大多數人都太過虛弱而無法承受，」他透過繃帶低聲說道。" },
                { en: "He is the embodiment of unethical science, a shadow that haunts the history of Runeterra’s wars.", cn: "他是非道德科學的化身，是一個困擾著符文大地戰爭史的陰影。" },
                { en: "Curiosity, when detached from empathy, becomes a force of pure, calculated devastation.", cn: "好奇心一旦脫離共情，便會化作一股純粹且精算的毀滅力量。" }
            ]
        },
        {
            id: 69,
            region: "佐恩",
            title: "Dr. Mundo: The Madman of Zaun",
            titleCn: "蒙多醫生：佐恩狂人",
            content: [
                { en: "A purple-skinned, incomprehensibly resilient freak, \"Dr.\" Mundo believes he is a world-class surgeon.", cn: "一位皮膚紫色、擁有不可思議韌性的怪胎，「蒙多醫生」自認為是一名世界級的外科醫生。" },
                { en: "His \"treatments\" usually involve massive cleavers and excruciating physical trauma.", cn: "他的「治療」通常涉及巨大的肉刀與極其痛苦的肉體創傷。" },
                { en: "He is oblivious to pain and social norms, wandering Zaun with a cheerful, terrifying lack of awareness.", cn: "他無視痛苦與社會規範，帶著一種開朗卻恐怖的無知在佐恩流浪。" },
                { en: "\"Mundo go where he pleases, and Mundo heal everyone... eventually,\" he grunted happily.", cn: "「蒙多想去哪就去哪，蒙多會醫好每個人……最終會的，」他愉快地低哼。" },
                { en: "He is a living testament to the bizarre mutations birthed by the city’s chemical waste.", cn: "他是這座城市化學廢料所孕育出之奇特變異的活證明。" },
                { en: "Ignorance can be a shield that protects the mind from the horrors of its own existence.", cn: "無知可以是一面護盾，保護心靈免於自身存在所帶來的恐懼。" }
            ]
        },
        {
            id: 70,
            region: "佐恩",
            title: "Twitch: The Plague Rat",
            titleCn: "圖奇：瘟疫之源",
            content: [
                { en: "A paranoid, mutated rat with a passion for filth and crossbows, Twitch thrives in the deepest sewers.", cn: "一隻偏執且變異、熱愛污穢與弩弓的老鼠，圖奇在最深處的下水道中茁壯。" },
                { en: "He sees himself as a connoisseur of trash, lurking in the shadows to spray his enemies with toxic bolts.", cn: "他自認為是垃圾的鑑賞家，潛伏在陰影中，用毒箭噴射敵人。" },
                { en: "He is obsessed with \"the shiny things\" and the ultimate destruction of anyone who stands in his way.", cn: "他執著於「閃亮的東西」，以及徹底毀滅任何擋路的人。" },
                { en: "\"Oh, what's that smell? It's the scent of victory and unwashed fur!\" he shrieked.", cn: "「喔，那是什麼味道？那是勝利與未洗皮毛的芬芳！」他尖叫著。" },
                { en: "He is a creature of pure, unrefined instinct, a reminder of the life that festers beneath the surface.", cn: "他是一個純粹、未經修飾的本能生物，提醒著人們在表面之下潰爛的生命。" },
                { en: "Survival often requires embracing the very filth that society seeks to flush away.", cn: "生存往往需要擁抱那些社會試圖沖走的污穢。" }
            ]
        },
        {
            id: 71,
            region: "佐恩",
            title: "Zac: The Secret Weapon",
            titleCn: "札克：秘密武器",
            content: [
                { en: "Created as a combat experiment using sentient ooze, Zac chose to use his power for good instead of destruction.", cn: "作為使用有意識黏液的戰鬥實驗產物，札克選擇將力量用於行善而非毀滅。" },
                { en: "He can stretch, bounce, and reform his body, serving as a vigilante protector of the downtrodden.", cn: "他能伸縮、彈跳並重組身體，作為受壓迫者的義警守護者。" },
                { en: "He values the kindness he was shown by his creators, viewing empathy as his greatest strength.", cn: "他珍惜創造者所展現的善意，將共情視為自己最強大的力量。" },
                { en: "\"I was built to break things, but I’d much rather build a better world,\" he said with a gentle wobble.", cn: "「我生來是為了破壞，但我寧願建立一個更好的世界，」他輕輕晃動著說道。" },
                { en: "He is a anomaly in Zaun, a soft-hearted hero born from a hard, chemical lab.", cn: "他是佐恩的一個異數，一位出生於冰冷化學實驗室卻心軟的英雄。" },
                { en: "Our nature is not defined by our origin, but by the choices we make every day.", cn: "我們的本性並非由出身定義，而是由我們每天所做的選擇決定。" }
            ]
        },
        {
            id: 72,
            region: "佐恩",
            title: "Blitzcrank: The Great Steam Golem",
            titleCn: "布里茨：蒸汽巨神兵",
            content: [
                { en: "Originally built to clean up hazardous waste in Zaun’s deepest levels, Blitzcrank eventually evolved beyond his programming to develop a soul.", cn: "最初是為了清理佐恩最深處的有毒廢料而建造的，布里茨最終演化出了超越程式設定的意識與靈魂。" },
                { en: "He is a tireless protector of the city’s downtrodden, using his massive iron fists and lightning-charged energy to defend those in danger.", cn: "他是這座城市受壓迫者的疲倦守護者，利用他巨大的鐵拳與充滿電能的能量來保護陷入危險的人。" },
                { en: "He believes that every living thing, even those made of metal, deserves a chance at a better life.", cn: "他相信每一個生命，即便是由金屬構成的，都值得擁有過上更好生活的機會。" },
                { en: "\"Exterminate... just kidding. I am here to help,\" he buzzed, his metal chest whirring with mechanical warmth.", cn: "「徹底滅絕……開玩笑的，我是來幫忙的，」他發出嗡嗡聲，金屬胸腔因機械的溫暖而轉動著。" },
                { en: "He represents the spark of humanity that can ignite within even the coldest machines.", cn: "他代表了即便是最冰冷的機器，也能點燃人性的火花。" }
            ]
        },
        {
            id: 73,
            region: "佐恩",
            title: "Janna: The Storm's Fury",
            titleCn: "珍娜：風暴女神",
            content: [
                { en: "Once an ancient wind spirit summoned by sailors, Janna found a new purpose protecting the people of Zaun from the toxic \"Zaun Gray.", cn: "曾是一位受水手召喚的遠古風之精靈，珍娜找到了新的使命：保護佐恩人民免受有毒的「佐恩灰雲」侵害。" },
                { en: "She is a symbol of hope in a city of despair, her gentle breezes providing fresh air and her gales sweeping away those who seek to exploit the weak.", cn: "她是絕望之城中的希望象徵，她的微風提供新鮮空氣，她的狂風則掃蕩那些試圖剝削弱者的人。" },
                { en: "Though many have forgotten her origins, she remains a silent guardian, listening to the prayers carried on the wind.", cn: "儘管許多人已忘記她的起源，她依然是一位沈默的守護者，傾聽著風中傳來的祈禱。" },
                { en: "\"The wind is a whisper of freedom, even in the deepest canyons of the earth,\" she breathed softly.", cn: "「即便是在大地的最深處，風也是自由的低語，」她輕聲說道。" },
                { en: "She embodies the enduring nature of faith and the quiet power of protection.", cn: "她體現了信仰的持久本質，以及守護的沈靜力量。" }
            ]
        },
        {
            id: 74,
            region: "佐恩",
            title: "Renata Glasc: The Chem-Baroness",
            titleCn: "睿娜妲‧格萊斯克：化學男爵夫人",
            content: [
                { en: "Born from the ashes of her parents' laboratory, Renata rose from poverty to become the most influential figure in Zaun’s chemical industry.", cn: "從父母實驗室的灰燼中誕生，睿娜妲從貧困中崛起，成為佐恩化學工業中最具影響力的人物。" },
                { en: "She controls her empire through Glasc Industries, using \"loyalty\" bought with debt and chemical manipulation to ensure dominance.", cn: "她透過「葛萊斯克工業」統治她的帝國，利用債務換取的「忠誠」與化學操控來確保她的霸權。" },
                { en: "She views the world as a series of investments, believing that everyone has a price and a weakness to be exploited.", cn: "她將世界視為一系列的投資，堅信每個人都有其身價，也都有可以被利用的弱點。" },
                { en: "Her signature chem-tech weapons can turn allies against each other, driving them into a mindless, berserk rage.", cn: "她標誌性的化學科技武器能讓盟友反目成仇，使他們陷入無意識的狂暴憤怒之中。" },
                { en: "\"True power is not taken; it is earned through investment... and impeccable timing,\" she smiled coldly, adjusting her mask.", cn: "「真正的力量不是奪取的；它是透過投資……以及完美的時機贏來的，」她冷冷一笑，調整著面具。" }
            ]
        },
        {
            id: 75,
            region: "弗雷爾卓德",
            title: "Ashe: The Frost Archer",
            titleCn: "艾希：寒冰射手",
            content: [
                { en: "Ashe is the Warmother of the Avarosan tribe, seeking to unite the fractured clans through peace and diplomacy.", cn: "艾希是阿瓦羅莎部落的戰母，試圖透過和平與外交統一分裂的氏族。" },
                { en: "She discovered an ancient bow of \"True Ice,\" believing herself to be the reincarnation of a legendary queen.", cn: "她發現了一把由「真霜冰晶」製成的古弓，並深信自己是傳奇女王的轉世。" },
                { en: "She carries the hope of a unified Freljord, a burden that requires immense political and moral courage.", cn: "她背負著統一弗雷爾卓德的希望，這是一份需要極大政治與道德勇氣的重擔。" },
                { en: "\"One people, one Freljord; the blood of our ancestors demands a future without war,\" she declared.", cn: "「一個民族，一個弗雷爾卓德；祖先的鮮血要求一個沒有戰爭的未來，」她宣稱。" },
                { en: "She is a visionary leader who chooses the difficult path of mercy in a land that values only strength.", cn: "她是一位高瞻遠矚的領袖，在一個只看重力量的土地上選擇了艱難的慈悲之路。" },
                { en: "Leadership is not about the power to command, but the wisdom to inspire a shared vision.", cn: "領導力不在於發號施令的權力，而在於激發共同願景的智慧。" }
            ]
        },
        {
            id: 76,
            region: "弗雷爾卓德",
            title: "Sejuani: Fury of the North",
            titleCn: "史瓦妮：北境之怒",
            content: [
                { en: "The ruthless leader of the Winter's Claw, Sejuani believes that only the strong deserve to survive the winter.", cn: "作為凜冬之爪殘酷的領袖，史瓦妮相信唯有強者才配在寒冬中生存。" },
                { en: "She rides a massive druskvarg named Bristle, leading her raids with primal ferocity and iron will.", cn: "她騎著一頭名為「Bristle」的巨大鬃齒獸，以原始的兇猛與鐵石意志領導著劫掠。" },
                { en: "She views Ashe’s talk of peace as a dangerous delusion that will lead their people to starvation.", cn: "她將艾希的和平言論視為危險的幻覺，認為那會導致族人走向飢餓。" },
                { en: "\"Pain is the only teacher that prepares us for the frost; the weak are merely fuel for the fire,\" she grunted.", cn: "「痛苦是唯一能讓我們準備好面對嚴霜的老師；弱者僅僅是火焰的燃料，」她低哼道。" },
                { en: "She embodies the untamed spirit of the north, a force of nature that refuses to be softened by civilization.", cn: "她體現了北方未經馴服的精神，是一股拒絕被文明軟化的自然力量。" },
                { en: "Survival is a relentless struggle that leaves no room for the luxury of hesitation or pity.", cn: "生存是一場殘酷的鬥爭，不為猶豫或同情這類奢侈品留下任何空間。" }
            ]
        },
        {
            id: 77,
            region: "弗雷爾卓德",
            title: "Lissandra: The Ice Witch",
            titleCn: "麗珊卓：冰霜女巫",
            content: [
                { en: "The enigmatic leader of the Frostguard, Lissandra has spent centuries weaving a web of lies to conceal an ancient horror.", cn: "身為冰霜守衛神秘的領袖，麗珊卓數世紀以來編織著謊言之網，以掩蓋一段遠古的恐怖。" },
                { en: "She buried the Void-born \"Watchers\" beneath the howling abyss, sacrificing her sisters to save the world.", cn: "她將虛空生物「觀察者」埋葬在咆哮深淵之下，犧牲了自己的姊妹以拯救世界。" },
                { en: "She manipulates True Ice with a dark mastery, freezing any truth that threatens her eternal vigil.", cn: "她以黑暗的技藝操縱真霜冰晶，凍結任何威脅到她永恆守望的真相。" },
                { en: "\"The world is a fragile dream preserved in ice; I am the nightmare that keeps it from waking,\" she whispered.", cn: "「世界是保存於冰中的脆弱美夢；而我則是阻止它醒來的惡夢，」她低聲說道。" },
                { en: "She exists as a solitary guardian of a secret that would drive mortals to madness.", cn: "她作為一個秘密的孤獨守護者而存在，而那個秘密足以讓凡人陷入瘋狂。" },
                { en: "Responsibility can become a cage that isolates the soul from the very world it seeks to protect.", cn: "責任可能演變成一座囚籠，將靈魂與它試圖保護的世界隔離開來。" }
            ]
        },
        {
            id: 78,
            region: "弗雷爾卓德",
            title: "Braum: The Heart of the Freljord",
            titleCn: "布朗姆：弗雷爾卓德之心",
            content: [
                { en: "A legendary hero known for his immense strength and even larger heart, Braum is a symbol of hope.", cn: "一位以巨大力量與更寬廣胸懷著稱的傳奇英雄，布朗姆是希望的象徵。" },
                { en: "He carries a massive enchanted vault door as a shield, protecting the innocent from both beasts and blizzards.", cn: "他攜帶著一面巨大的附魔金庫門作為護盾，保護無辜者免受野獸與暴風雪的侵害。" },
                { en: "His laughter is as warm as a hearth-fire, capable of melting the coldest skepticism.", cn: "他的笑聲如壁爐之火般溫暖，足以融化最冰冷的懷疑。" },
                { en: "\"The darker the night, the brighter the stars; today, we are the shield that holds the line,\" he bellowed with a smile.", cn: "「黑夜愈暗，繁星愈亮；今天，我們就是守住陣線的護盾，」他帶著微笑吼道。" },
                { en: "He wanders the land, performing deeds of kindness that become the folklore of the mountains.", cn: "他在土地上流浪，立下無數善行，成為山脈間流傳的民間傳說。" },
                { en: "True strength is defined by the capacity to protect the weak without losing one’s gentleness.", cn: "真正的強大，定義在於有能力保護弱者，同時又不失其溫柔。" }
            ]
        },
        {
            id: 79,
            region: "弗雷爾卓德",
            title: "Olaf: The Berserker",
            titleCn: "歐拉夫：狂戰士",
            content: [
                { en: "Driven by a prophecy that predicted he would die peacefully in his bed, Olaf seeks a glorious death in battle.", cn: "受一則預言他將平靜死在床上的預言所驅使，歐拉夫在戰鬥中尋求光榮的死亡。" },
                { en: "He fights with a suicidal frenzy, his dual axes reflecting a mind that has embraced the inevitability of doom.", cn: "他以自殺式的瘋狂戰鬥，他的雙斧反映出一個擁抱了宿命必然性的靈魂。" },
                { en: "The more dangerous the opponent, the more exhilarated he becomes, laughing in the face of annihilation.", cn: "對手愈危險，他便愈發興奮，在湮滅面前放聲大笑。" },
                { en: "\"I seek the end of my story in the heat of combat, where the ice turns red with honor,\" he roared.", cn: "「我在戰鬥的熱情中尋求故事的終局，在那裡，冰雪將因榮譽而染紅，」他咆哮道。" },
                { en: "He is a man who fears peace more than he fears the blade, a warrior in search of a worthy end.", cn: "他是一個恐懼和平勝過恐懼刀鋒的人，一位尋找體面終局的戰士。" },
                { en: "Fate is a challenge to be met with defiance, turning an unwanted destiny into a legendary struggle.", cn: "命運是一場需要以蔑視來面對的挑戰，將不被渴望的宿命轉化為一場傳奇的鬥爭。" }
            ]
        },
        {
            id: 80,
            region: "弗雷爾卓德",
            title: "Tryndamere: The Barbarian King",
            titleCn: "泰達米爾：蠻族之王",
            content: [
                { en: "Fueled by unbridled rage, Tryndamere refused to die when his people were slaughtered by a dark entity.", cn: "由放縱的憤怒所驅動，當族人被黑暗實體屠殺時，泰達米爾拒絕死去。" },
                { en: "He forged a pact with Avarosa through marriage to Ashe, balancing his fury with the needs of a nation.", cn: "他透過與艾希的婚姻與阿瓦羅莎建立了盟約，在憤怒與國家需求之間取得平衡。" },
                { en: "His legendary blade is an extension of his will, capable of cleaving through stone and steel.", cn: "他那傳奇的巨劍是他意志的延伸，足以劈開磐石與鋼鐵。" },
                { en: "\"My rage is a fire that never burns out, a tempest that defies the cold of death,\" he asserted.", cn: "「我的憤怒是永不熄滅的火，是無視死亡冰冷的風暴，」他斷言道。" },
                { en: "He is a king who rules through raw power, yet he is slowly learning the nuances of diplomacy.", cn: "他是一位透過原始力量統治的國王，但也正緩慢學習著外交的細微差別。" },
                { en: "Anger can be a powerful engine for survival, but it must be channeled to avoid self-destruction.", cn: "憤怒可以是生存的強大引擎，但必須加以引導，以避免自我毀滅。" }
            ]
        },
        {
            id: 81,
            region: "弗雷爾卓德",
            title: "Anivia: The Cryophoenix",
            titleCn: "艾妮維亞：冰晶鳳凰",
            content: [
                { en: "An ancient spirit of the ice, Anivia is the benevolent guardian of the Freljord's eternal cycle.", cn: "作為冰雪的遠古靈魂，艾妮維亞是弗雷爾卓德永恆循環的仁慈守護者。" },
                { en: "She represents the rebirth of the land, sacrificing herself in times of great peril only to rise again.", cn: "她代表了土地的重生，在巨大危險之時犧牲自己，僅為了再次升起。" },
                { en: "Her wings command the blizzards, and her presence brings a sense of divine calm to the frozen wastes.", cn: "她的雙翼主宰著暴風雪，她的存在為冰封荒原帶來了一種神聖的平靜。" },
                { en: "\"I am the winter’s breath and the spring’s promise; I endure as the mountains endure,\" she sang.", cn: "「我是冬天的呼吸，也是春天的諾言；我如山脈般恆久忍耐，」她歌詠著。" },
                { en: "She views the mortals of the north as her children, guiding them through the harshness of history.", cn: "她將北方的凡人視為孩子，指引他們走過嚴酷的歷史。" },
                { en: "Existence is a series of cycles, where every ending is merely a prelude to a new beginning.", cn: "存在是一連串的循環，每一個終局都僅僅是新開始的前奏。" }
            ]
        },
        {
            id: 82,
            region: "弗雷爾卓德",
            title: "Volibear: The Relentless Storm",
            titleCn: "弗利貝爾：不滅狂雷",
            content: [
                { en: "An ancient god of war and thunder, Volibear seeks to return the Freljord to its wild, savage roots.", cn: "作為遠古的戰爭與雷電之神，弗利貝爾試圖讓弗雷爾卓德回歸原始、野蠻的根源。" },
                { en: "He despises the encroachment of civilization and the weakness that comes with \"soft\" traditions.", cn: "他輕蔑文明的侵蝕，以及伴隨「軟弱」傳統而來的虛弱。" },
                { en: "His lightning shatters the sky, and his roar echoes the primal fury of the earth itself.", cn: "他的閃電粉碎天空，他的吼叫迴盪著大地本身的原始怒火。" },
                { en: "\"Civilization is a cage for the spirit; only in the storm are we truly free,\" he thundered.", cn: "「文明是靈魂的囚籠；唯有在風暴中，我們才是真正的自由，」他如雷鳴般吼道。" },
                { en: "He is a deity of raw instinct, demanding blood and sacrifice to maintain the balance of the wild.", cn: "他是一位代表原始本能的神靈，要求鮮血與祭獻以維持荒野的平衡。" },
                { en: "Power in its purest form is indifferent to the morality of man, existing only to endure and dominate.", cn: "純粹形式的力量對人類的道德漠不關心，其存在僅為了持久與統治。" }
            ]
        },
        {
            id: 83,
            region: "弗雷爾卓德",
            title: "Ornn: The Fire below the Mountain",
            titleCn: "鄂爾：山脈半神",
            content: [
                { en: "The oldest of the Freljordian demi-gods, Ornn is the master of forging and craftsmanship who dwells within his volcano, Hearth-Home.", cn: "作為弗雷爾卓德最古老的半神之一，鄂爾是精通鍛造與工藝的大師，居住在名為「爐家」的火山之中。" },
                { en: "He values hard work and solitude, preferring the rhythmic strike of his hammer over the meddling of his siblings, Volibear and Anivia.", cn: "他看重辛勤工作與孤獨，比起手足弗利貝爾與艾妮維亞的干預，他更喜歡鎚子敲擊的節律聲。" },
                { en: "He forged the most legendary weapons of the world, including the very hammer Poppy carries and the gate of Braum's shield.", cn: "他鍛造了世上最傳奇的武器，包括波比持有的聖鎚以及布朗姆那面盾牌的大門。" },
                { en: "\"I don't need followers.", cn: "" },
                { en: "I need a quiet place to work and a well-balanced anvil,\" he grunted amidst the embers.", cn: "「我不需要追隨者。 我只需要一個安靜的工作場所以及一個平衡良好的鐵砧，」他在餘燼中咕嶓著。" },
                { en: "He represents the dignity of labor and the enduring strength of the earth's ancient core.", cn: "他代表了勞動的尊嚴，以及大地古老核心那持久的力量。" }
            ]
        },
        {
            id: 84,
            region: "弗雷爾卓德",
            title: "Nunu & Willump: The Boy and His Yeti",
            titleCn: "努努和威朗普：少年與雪怪",
            content: [
                { en: "A young boy with a boundless imagination, Nunu discovered a legendary yeti named Willump, only to find a best friend instead of a monster.", cn: "一位擁有無限想像力的少年，努努發現了傳奇雪怪威朗普，卻發現對方並非怪物，而是他最好的朋友。" },
                { en: "They travel across the icy wastes, using the magic of friendship and enchanted snowballs to turn a harsh world into an endless adventure.", cn: "他們在冰冷的荒原上旅行，利用友誼的魔法與受咒的雪球，將嚴酷的世界變成一場無盡的冒險。" },
                { en: "While others see a beast, Nunu sees a guardian who helps him search for his lost mother through stories and laughter.", cn: "當他人看到野獸時，努努看到的是一位守護者，正透過故事與笑聲幫助他尋找失蹤的母親。" },
                { en: "\"The world is just a big playground if you have a yeti to carry you on his back!\" Nunu cheered.", cn: "「只要有一隻雪怪背著你，世界就是一個巨大的遊樂場！」努努歡呼道。" },
                { en: "They embody the purity of childhood wonder and the power of a bond that transcends species.", cn: "他們體現了孩童般好奇心的純真，以及跨越物種的羈絆力量。" }
            ]
        },
        {
            id: 85,
            region: "弗雷爾卓德",
            title: "Trundle: The Troll King",
            titleCn: "特朗德：巨魔之王",
            content: [
                { en: "A cunning and massive troll, Trundle seized leadership of his tribe by outsmarting his rivals and claiming a powerful ice club from Lissandra.", cn: "一位狡詐且巨大的巨魔，特朗德透過智取對手並從麗珊卓手中奪取強大的冰霜巨棒，奪得了部落的領導權。" },
                { en: "He uses the power of \"Boneshiver\" to freeze his enemies in their tracks, asserting his dominance over the tundra with brute force and guile.", cn: "他利用「碎骨者」的力量將敵人凍結在原地，以蠻力與詭計確立他在凍原上的統治地位。" },
                { en: "He has aligned himself with the Frostguard, using their dark magic to ensure that the trolls remain a force to be feared.", cn: "他與寒冰衛隊結盟，利用他們的黑暗魔法確保巨魔依然是一股令人恐懼的力量。" },
                { en: "\"I’m the king of the trolls! Anyone who disagrees can take it up with my giant frozen club,\" he cackled.", cn: "「我是巨魔之王！任何不同意的人都可以去跟我的巨大冰棒談談，」他尖叫著大笑。" },
                { en: "He represents the ruthless ambition and primal strength required to rule the chaotic tribes of the North.", cn: "他代表了統治北方混亂部落所需的殘酷野心與原始力量。" }
            ]
        },
        {
            id: 86,
            region: "弗雷爾卓德",
            title: "Gragas: The Rabble Rouser",
            titleCn: "古拉格斯：酒桶之王",
            content: [
                { en: "A massive and rowdy brewer, Gragas wanders the Freljord in search of the perfect ingredients for the ultimate pint of ale.", cn: "一位體型巨大且吵鬧的釀酒師，古拉格斯在弗雷爾卓德四處遊蕩，尋找釀造極致佳釀的完美原料。" },
                { en: "His constitution is legendary, allowing him to survive the coldest blizzards as long as he has a full cask of his own potent brew.", cn: "他的體質極為傳奇，只要手邊有一桶自己釀製的烈酒，他就能在最嚴酷的暴風雪中生存。" },
                { en: "He often inadvertantly starts brawls in every tavern he visits, using his massive size and explosive casks to clear the room.", cn: "他經常在他造訪的每一間小酒館中無意間引發鬥毆，利用巨大的體型與爆炸酒桶來清理現場。" },
                { en: "\"The only thing better than a cold drink is a good fight to settle the tab!\" he bellowed, hoisting his barrel.", cn: "「唯一比冰涼飲料更好的東西，就是用一場痛快的戰鬥來結帳！」他扛起酒桶大吼。" },
                { en: "He embodies the boisterous, untamed spirit of the Freljord, finding joy in the simple pleasures of drink and combat.", cn: "他體現了弗雷爾卓德喧鬧且不羈的精神，在飲酒與戰鬥的簡單快樂中尋找滿足。" }
            ]
        },
        {
            id: 87,
            region: "弗雷爾卓德",
            title: "Udyr: The Spirit Walker",
            titleCn: "烏迪爾：靈魂行者",
            content: [
                { en: "The most powerful spirit walker in the Freljord, Udyr channels the primal energy of the animal spirits to protect the balance of the wild.", cn: "作為弗雷爾卓德最強大的靈魂行者，烏迪爾引導獸靈的原始能量，守護荒野的平衡。" },
                { en: "He spent years training in Ionia with Lee Sin to master the chaotic voices of the spirits that once threatened to drive him mad.", cn: "他在愛歐尼亞與李星共同修行多年，學會了掌控那些曾威脅要讓他發瘋的混亂靈魂之聲。" },
                { en: "He can manifest the strength of the Bear, the speed of the Tiger, the resilience of the Turtle, and the fire of the Phoenix.", cn: "他能展現巨熊的力量、猛虎的速度、靈龜的韌性以及鳳凰的烈焰。" },
                { en: "As a guardian of the North, he stands against any force that seeks to exploit the natural world for selfish gain.", cn: "作為北方的守護者，他挺身對抗任何試圖為了私利而剝削自然世界的勢力。" },
                { en: "\"The spirits guide my hand, and the wild demands its due,\" he growled, his body glowing with ancient, primal power.", cn: "「靈魂引導我的手，而荒野要求其應得的尊重，」他低吼，身體閃爍著古老的原始力量。" }
            ]
        },
        {
            id: 88,
            region: "闇影島",
            title: "Viego: The Ruined King",
            titleCn: "維爾戈：殞落國王",
            content: [
                { en: "Driven by an obsessive and destructive love, Viego unleashed the Black Mist upon the world to resurrect his fallen queen.", cn: "受一種執著且具毀滅性的愛所驅使，維爾戈向世界釋放了黑霧，試圖復活他已故的王后。" },
                { en: "He wields the Blade of the Ruined King, a relic that commands the very souls of those it strikes.", cn: "他揮舞著「殞落王者之劍」，這件遺物能統御被它擊中之人的靈魂。" },
                { en: "His heart is a hollow void, filled only with the agonizing memory of a lost romance.", cn: "他的心是一個空洞的虛無，僅充斥著對失去戀情的痛苦記憶。" },
                { en: "\"I would burn this world to cinders just to see her smile once more,\" he whispered with regal despair.", cn: "「即便將世界焚為灰燼，我也只求能再次看見她的微笑，」他帶著王者的絕望低聲說道。" },
                { en: "He is the tragic catalyst of the archipelago's doom, a monarch who chose grief over responsibility.", cn: "他是群島毀滅的悲劇誘因，一位選擇了悲傷而非責任的君主。" },
                { en: "Love, when twisted by selfishness, can become a cataclysm that consumes the innocent.", cn: "愛一旦被自私扭曲，便可能演變成一場吞噬無辜者的災難。" }
            ]
        },
        {
            id: 89,
            region: "闇影島",
            title: "Thresh: The Chain Warden",
            titleCn: "瑟雷西：鍊魂獄長",
            content: [
                { en: "Once a guardian of hidden knowledge, Thresh was corrupted by the mists into a sadistic spirit who finds joy in torment.", cn: "曾是隱秘知識的守護者，瑟雷西被迷霧腐化為一個在折磨中尋找樂趣的虐待狂幽靈。" },
                { en: "He traps the souls of his victims within a spectral lantern, subjecting them to an eternity of agony.", cn: "他將受害者的靈魂囚禁在幽冥燈籠中，讓他們遭受永恆的煎熬。" },
                { en: "He values the slow psychological erosion of his prey, finding elegance in the breaking of a spirit.", cn: "他看重對獵物緩慢的心理侵蝕，在靈魂的破碎中尋找優雅。" },
                { en: "\"Death is not the end; it is merely the beginning of your service to me,\" he cackled.", cn: "「死亡並非終點；它僅僅是你對我效命的開始，」他刺耳地笑著。" },
                { en: "He is a master of chains and deceit, a phantom who stalks the boundary between life and undeath.", cn: "他是鎖鏈與詭計的大師，一個潛伏在生與死交界處的幽靈。" },
                { en: "Cruelty is a craft that requires patience and a complete absence of mercy.", cn: "殘酷是一門工藝，需要耐心以及慈悲的徹底缺席。" }
            ]
        },
        {
            id: 90,
            region: "闇影島",
            title: "Kalista: The Spear of Vengeance",
            titleCn: "克黎思妲：復仇之矛",
            content: [
                { en: "A former general betrayed and murdered by those she trusted, Kalista returned as a specter of retribution.", cn: "曾是一位被信任之人背叛並謀殺的將軍，克黎思妲作為報應的幽靈重返世間。" },
                { en: "She binds herself to the souls of the betrayed, exacting bloody justice upon the deceitful.", cn: "她將自己與被背叛者的靈魂連結，向欺詐之人施加血腥的正義。" },
                { en: "Her body is pierced by countless ethereal spears, each one a testament to her tragic end.", cn: "她的身體被無數幽靈長矛刺穿，每一根都是她悲劇結局的見證。" },
                { en: "\"We are the shadow of your broken oaths, the sting of the spear you cannot outrun,\" the collective voice hissed.", cn: "「我們是你破碎誓言的陰影，是你無法逃脫的長矛刺痛，」那集體的聲音發出嘶嘶聲。" },
                { en: "She is an avatar of cold, unyielding vengeance, devoid of individual identity.", cn: "她是冰冷、不屈復仇的化身，已不再具備個人身分。" },
                { en: "The quest for retribution can hollow out a soul until only the mission remains.", cn: "對報應的追求會掏空一個靈魂，直到只剩下使命為止。" }
            ]
        },
        {
            id: 91,
            region: "闇影島",
            title: "Hecarim: The Shadow of War",
            titleCn: "赫克林：戰爭之影",
            content: [
                { en: "A knight who embraced the slaughter during the Ruination, Hecarim is now a monstrous fusion of man and horse.", cn: "一位在殞落王難期間擁抱殺戮的騎士，赫克林現在是人與馬的恐怖融合體。" },
                { en: "He leads the spectral Iron Order, trampling the living beneath his ghostly hooves.", cn: "他領導著幽冥的鐵之騎士團，將生者踐踏在他那鬼魅般的蹄下。" },
                { en: "He finds ecstasy in the heat of combat, his presence a herald of impending devastation.", cn: "他在戰鬥的狂熱中尋求欣快，他的存在是即將到來之毀滅的先兆。" },
                { en: "\"The march of death never falters; we are the thunder that precedes the darkness,\" he thundered.", cn: "「死亡的行軍永不停歇；我們是黑暗降臨前的雷鳴，」他如雷般吼道。" },
                { en: "He represents the mindless brutality of war, a spirit that knows only the hunger for the charge.", cn: "他代表了戰爭中盲目的殘暴，是一個僅知對衝鋒渴望的靈魂。" },
                { en: "Ambition, when uncoupled from honor, transforms a hero into a nightmare.", cn: "野心一旦脫離榮譽，便會將英雄轉化為噩夢。" }
            ]
        },
        {
            id: 92,
            region: "闇影島",
            title: "Karthus: The Deathsinger",
            titleCn: "卡爾瑟斯：死亡頌唱者",
            content: [
                { en: "Obsessed with the beauty of passing, Karthus sought the Shadow Isles to embrace the purity of undeath.", cn: "執著於消逝之美，卡爾瑟斯尋求闇影島以擁抱亡靈的純潔。" },
                { en: "He views death as a glorious liberation and seeks to \"save\" the living by bringing them into the mist.", cn: "他將死亡視為一種光榮的解放，並試圖透過將生者帶入迷霧來「拯救」他們。" },
                { en: "His songs are elegies of soul-shattering power, echoing across the boundaries of existence.", cn: "他的歌聲是具備粉碎靈魂力量的輓歌，迴盪在存在的界限之上。" },
                { en: "\"Do not fear the silence; it is the most beautiful melody you will ever hear,\" he sang solemnly.", cn: "「不要恐懼沈默；那是你所能聽到的最美旋律，」他莊重地歌詠著。" },
                { en: "He is a priest of the grave, an entity who finds divine purpose in the extinction of life.", cn: "他是一位墳墓的祭司，一個在生命的滅絕中尋找神聖目標的實體。" },
                { en: "Perspective can turn the ultimate terror into a perceived state of grace.", cn: "觀點能將終極的恐怖，轉化為一種被感知的恩典狀態。" }
            ]
        },
        {
            id: 93,
            region: "闇影島",
            title: "Gwen: The Hallowed Seamstress",
            titleCn: "關：聖潔裁縫師",
            content: [
                { en: "A doll given life by a fragment of a queen’s soul, Gwen fights the Black Mist with the very tools that created her.", cn: "一個由王后靈魂碎片賦予生命的娃娃，關利用創造她的工具來對抗黑霧。" },
                { en: "She wields a pair of massive spectral scissors, snaring the shadows and protecting the light.", cn: "她揮舞著一把巨大的幽靈剪刀，剪碎陰影並守護光明。" },
                { en: "She finds joy in the fragile beauty of life, cherishing the humanity she was granted.", cn: "她在生命脆弱的美感中尋找喜悅，珍惜她被賦予的人性。" },
                { en: "\"The mist is dark, but my stitches are strong; I will mend what was broken,\" she chirped with resolve.", cn: "「迷霧雖暗，但我的針腳很牢固；我會縫補那些破碎的事物，」她堅定地說道。" },
                { en: "She is a glimmer of hope in a land of despair, a testament to the enduring power of love’s memory.", cn: "她是絕望之地的一線希望，證明了愛的記憶那持久的力量。" },
                { en: "Even the smallest fragment of goodness can stand against the rising tide of darkness.", cn: "即便是一抹微小的良善碎片，也能對抗日益增長的黑暗浪潮。" }
            ]
        },
        {
            id: 94,
            region: "闇影島",
            title: "Yorick: Shepherd of Souls",
            titleCn: "約瑞科：牧魂人",
            content: [
                { en: "The last survivor of a forgotten religious order, Yorick utilizes the power of the mist to lay the dead to rest.", cn: "作為一個被遺忘宗教教團的最後倖存者，約瑞科利用迷霧的力量讓死者安息。" },
                { en: "He carries the \"Maiden of the Mist\" upon his back, a manifestation of the curse he seeks to break.", cn: "他在背上背負著「迷霧妖女」，那是他試圖打破之詛咒的具象化。" },
                { en: "He is a lonely figure, burdened by the voices of a thousand ghosts who demand release.", cn: "他是個孤獨的身影，背負著上千個要求解脫的幽靈之聲。" },
                { en: "\"I am the grave-digger for a kingdom that refused to die,\" he muttered with weary determination.", cn: "「我是一個拒絕死去之王國的掘墓人，」他帶著疲憊的決心喃喃自語。" },
                { en: "He seeks to confront the Ruined King and end the nightmare of the archipelago.", cn: "他試圖與殞落國王對抗，終結群島的噩夢。" },
                { en: "True service often requires enduring the very corruption one seeks to eradicate.", cn: "真正的服務，往往需要忍受一個人試圖剷除的那種腐敗。" }
            ]
        },
        {
            id: 95,
            region: "闇影島",
            title: "Maokai: The Twisted Treant",
            titleCn: "茂凱：扭曲大樹",
            content: [
                { en: "Once a peaceful nature spirit of the Blessed Isles, Maokai was warped into a vengeful entity by the Ruination.", cn: "曾是福光島和平的自然靈魂，茂凱因殞落王難而被扭曲成一個復仇的實體。" },
                { en: "He preserves the last remnants of the islands' pure water within his own heartwood.", cn: "他在自己的心材中保存著島嶼純淨泉水的最後殘餘。" },
                { en: "He strikes out at the undead with root and branch, seeking to restore the natural balance.", cn: "他用根與枝幹打擊亡靈，試圖恢復自然平衡。" },
                { en: "\"The land remembers the sun, and I will not let the shadows drown the seeds of the past,\" he roared.", cn: "「土地記得太陽，我不會讓陰影淹沒過去的種子，」他咆哮道。" },
                { en: "He is a guardian of memory and life, a living fortress against the encroaching decay.", cn: "他是記憶與生命的守護者，是一個對抗日益侵蝕之腐敗的活堡壘。" },
                { en: "Resilience is the refusal to let the environment dictate the nature of one's soul.", cn: "韌性，就是拒絕讓環境決定一個靈魂的本質。" }
            ]
        },
        {
            id: 96,
            region: "比爾吉沃特",
            title: "Miss Fortune: The Bounty Hunter",
            titleCn: "好運姐：賞金獵人",
            content: [
                { en: "Driven by the desire to avenge her murdered parents, Sarah Fortune rose to become the most feared captain in Bilgewater.", cn: "受為慘死父母報仇的慾望驅使，莎拉．福圖納崛起成為比爾吉沃特最令人畏懼的船長。" },
                { en: "She rules the port with a combination of lethal charm and ruthless strategic brilliance.", cn: "她結合了致命的魅力與冷酷的戰略才華，統治著這座港口。" },
                { en: "With her dual pistols, \"Shock\" and \"Awe,\" she dismantled the reign of the previous pirate king.", cn: "憑藉著雙槍「震撼」與「敬畏」，她瓦解了前任海盜之王的統治。" },
                { en: "\"Justice is a luxury that requires a steady hand and a heavy coin purse,\" she remarked with a smirk.", cn: "「正義是一種奢侈品，需要穩定的手與厚實的錢袋，」她帶著苦笑評論道。" },
                { en: "She is a survivor who turned her personal tragedy into a monument of unyielding power.", cn: "她是一位倖存者，將個人悲劇轉化為不屈權力的豐碑。" },
                { en: "Ambition is the wind that fills the sails of those who refuse to be victims of fate.", cn: "野心是鼓動那些拒絕成為命運受害者之帆的強風。" }
            ]
        },
        {
            id: 97,
            region: "比爾吉沃特",
            title: "Gangplank: The Saltwater Scourge",
            titleCn: "剛普朗克：海洋之災",
            content: [
                { en: "Once the undisputed ruler of Bilgewater, Gangplank was brought low by a coup but refused to stay dead.", cn: "曾是比爾吉沃特無可爭議的統治者，剛普朗克雖因一場政變倒下，卻拒絕就此沈淪。" },
                { en: "He is a man of iron and salt, his body scarred by countless battles and a burning desire for reclamation.", cn: "他是一個由鋼鐵與鹽分構成的男子，身體佈滿無數戰鬥與焚身渴望奪回權力的傷痕。" },
                { en: "He utilizes black powder and brutal intimidation to remind the world that he is still the rightful king.", cn: "他利用黑火藥與殘暴的威嚇，提醒世人他依然是合法的國王。" },
                { en: "\"The sea does not forgive, and neither do I; the tide will turn in blood,\" he growled.", cn: "「海洋不會原諒，我也一樣；潮汐將隨著鮮血而轉向，」他低吼道。" },
                { en: "He represents the old world of piracy, a relic of violence that refuses to be forgotten by history.", cn: "他代表了舊時代的海盜風氣，一個拒絕被歷史遺忘的暴力遺物。" },
                { en: "Power is a crown made of thorns that must be held with a bleeding, iron fist.", cn: "權力是一頂由荊棘製成的皇冠，必須用流血的鐵拳牢牢握住。" }
            ]
        },
        {
            id: 98,
            region: "比爾吉沃特",
            title: "Graves: The Outlaw",
            titleCn: "葛雷夫：不法之徒",
            content: [
                { en: "A high-stakes gambler and mercenary, Graves is a man whose loyalty is as heavy as the smoke from his shotgun.", cn: "身為一名豪賭客與傭兵，葛雷夫的忠誠與他散彈槍噴出的煙霧一樣沈重。" },
                { en: "He escaped a high-security prison to reunite with his partner, Twisted Fate, seeking a mix of revenge and profit.", cn: "他從戒備森嚴的監獄脫逃，與夥伴逆命重聚，尋求報復與利益的結合。" },
                { en: "He prefers a direct approach, letting \"New Destiny\" do the talking in tight situations.", cn: "他偏好直接的手段，在緊要關頭讓「新命運」代為發言。" },
                { en: "\"I’m not a hero; I’m just a guy with a big gun and a very long memory,\" he grunted.", cn: "「我不是英雄；我只是個拿著大槍且記性極好的傢伙，」他低哼道。" },
                { en: "He navigates the lawless streets of the port with a grit that only a lifetime of trouble can forge.", cn: "他以一種唯有終生麻煩不斷才能磨練出的毅力，穿梭在港口法外之地的街道上。" },
                { en: "Honor among thieves is a fragile currency, yet it is the only thing worth holding onto in a storm.", cn: "盜賊間的榮譽是一種脆弱的貨幣，卻也是風暴中唯一值得堅持的事物。" }
            ]
        },
        {
            id: 99,
            region: "比爾吉沃特",
            title: "Twisted Fate: The Cardmaster",
            titleCn: "逆命：卡牌大師",
            content: [
                { en: "An infamous cardsharp and con artist, Twisted Fate relies on luck, magic, and a silver tongue to survive.", cn: "一位惡名昭彰的千術高手與詐欺師，逆命依靠運氣、魔法與如簧巧舌生存。" },
                { en: "He can vanish in a flurry of cards, appearing where he is least expected and most dangerous.", cn: "他能在卡牌旋風中消失，出現在最出人意料且最危險的地方。" },
                { en: "Despite his selfish exterior, he shares a bond of brotherhood with Graves that transcends their checkered past.", cn: "儘管外表自私，他與葛雷夫之間卻有著超越複雜過去的兄弟情誼。" },
                { en: "\"Lady Luck is a fickle mistress, but she always smiles on those who know how to cheat,\" he quipped.", cn: "「幸運女神是位反覆無常的情人，但她總是向懂得如何作弊的人微笑，」他俏皮地說。" },
                { en: "He is a master of the gamble, viewing life as a game where the stakes are always mortal.", cn: "他是一位賭博大師，將生命視為一場賭注始終事關生死的遊戲。" },
                { en: "Fate is not a fixed path, but a deck of cards waiting to be stacked by a clever hand.", cn: "命運並非固定的道路，而是一疊等待著被聰明手掌操縱的卡牌。" }
            ]
        },
        {
            id: 100,
            region: "比爾吉沃特",
            title: "Illaoi: The Kraken Priestess",
            titleCn: "伊羅旖：海妖祭司",
            content: [
                { en: "As the Prophet of the Great Kraken, Illaoi tests the souls of others to ensure they are moving toward their destiny.", cn: "身為偉大拿加卡波洛絲的先知，伊羅旖測試他人的靈魂，以確保他們正朝著宿命邁進。" },
                { en: "She wields a massive golden idol, summoning spectral tentacles to crush the stagnant and the fearful.", cn: "她揮舞著巨大的黃金神像，召喚幽冥觸手來粉碎停滯者與恐懼者。" },
                { en: "She views life as a constant motion, believing that stagnation is the ultimate sin against the gods.", cn: "她將生命視為永恆的運動，相信停滯是對神靈最嚴重的冒罪。" },
                { en: "\"Every breath is a challenge; if you do not move, you are already dead,\" she proclaimed.", cn: "「每一次呼吸都是挑戰；如果你不動，你便已經死了，」她宣稱道。" },
                { en: "She is a force of spiritual vitality, a priestess who demands action over empty prayers.", cn: "她是一股靈性活力的力量，一位要求行動勝過空洞祈禱的祭司。" },
                { en: "True faith is not found in temple walls, but in the relentless pursuit of one's inner drive.", cn: "真誠的信仰不存在於寺廟牆壁中，而是在對內在驅動力的不懈追求中。" }
            ]
        },
        {
            id: 101,
            region: "比爾吉沃特",
            title: "Pyke: The Bloodharbor Ripper",
            titleCn: "派克：血港開膛手",
            content: [
                { en: "A drowned harpooner returned from the depths, Pyke hunts the captains who betrayed their crews for gold.", cn: "一位從深海歸來的溺斃魚叉手，派克獵殺那些為了金金錢而背叛船員的船長們。" },
                { en: "He keeps a mental list of names, crossing them out in blood as he strikes from the shadows.", cn: "他在腦中保留著名單，在從陰影中出擊時用鮮血將名字劃掉。" },
                { en: "He moves through the water like a phantom, his bone-skewer delivering a lethal, watery justice.", cn: "他像幽靈般在水中穿行，他的骨刺遞送著致命且水淋淋的正義。" },
                { en: "\"I went under, and the city followed; now, everyone’s name is on the list,\" he rasped.", cn: "「我沈入深海，整座城市也隨之沈沒；現在，每個人的名字都在名單上，」他沙啞地說。" },
                { en: "He is a creature of vengeance and delirium, a nightmare birthed by the cruelty of the sea.", cn: "他是復仇與譫妄的產物，一個由海洋殘酷所孕育出的惡夢。" },
                { en: "Betrayal is a debt that can only be settled when the ledger is washed in the crimson of the guilty.", cn: "背叛是一筆債務，唯有當帳冊被罪人的深紅鮮血洗淨時，才能結清。" }
            ]
        },
        {
            id: 102,
            region: "比爾吉沃特",
            title: "Fizz: The Tidal Trickster",
            titleCn: "飛斯：深海浪人",
            content: [
                { en: "An ancient yordle who dwells in the reefs around Bilgewater, Fizz is as playful as he is dangerous.", cn: "一位居住在比爾吉沃特周圍礁石的遠古約德爾人，飛斯既愛玩又危險。" },
                { en: "He commands the creatures of the deep, often summoning a massive shark to devour his unsuspecting foes.", cn: "他統御著深海生物，經常召喚巨鯊來吞噬那些毫無防備的敵人。" },
                { en: "He finds amusement in leading the arrogant into traps, dancing through the waves with elusive grace.", cn: "他在引導傲慢者陷入陷阱中尋找樂趣，以難以捉摸的優雅在波濤中起舞。" },
                { en: "\"The ocean hides many secrets, and most of them have very sharp teeth,\" he laughed.", cn: "「海洋隱藏著許多秘密，而且多數都長著非常銳利的牙齒，」他大笑著。" },
                { en: "He is a guardian of the tides, a mischievous spirit who reminds sailors to fear the depths.", cn: "他是潮汐的守護者，一位提醒水手們恐懼深海的淘氣靈魂。" },
                { en: "Curiosity is the hook that lures the unwary into the crushing embrace of the sea.", cn: "好奇心是將不留神者誘入海洋粉碎性擁抱的鉤子。" }
            ]
        },
        {
            id: 103,
            region: "比爾吉沃特",
            title: "Nautilus: The Titan of the Depths",
            titleCn: "納帝魯斯：深海巨人",
            content: [
                { en: "A massive armored figure lost to the sea, Nautilus now roams the darkness seeking the tithes owed to the depths.", cn: "一位迷失於海洋的巨大裝甲身影，納帝魯斯現在漫遊於黑暗中，尋求欠給深海的祭禮。" },
                { en: "He pulls his enemies down with a massive anchor, an inexorable force of watery retribution.", cn: "他用巨大的船錨將敵人拖入深淵，是一股無法阻擋的水中報應力量。" },
                { en: "He is a relic of forgotten promises, a titan whose path leaves nothing but broken timber and salt.", cn: "他是被遺忘承諾的殘餘，是一位所經之處只剩下破碎木材與鹽分的巨人。" },
                { en: "\"Forward... forward... the darkness demands its due,\" he droned with a heavy, metallic voice.", cn: "「前進……前進……黑暗要求它應得的代價，」他以沈重且金屬般的聲音單調地說道。" },
                { en: "He embodies the crushing pressure of the abyss, a guardian of the oceanic toll.", cn: "他體現了深淵那粉碎性的壓力，是海洋通行費的守護者。" },
                { en: "Duty can become an eternal anchor that drags a soul through the lightless reaches of time.", cn: "職責可能變成一個永恆的錨，拖著靈魂穿行在無光的時光深處。" }
            ]
        },
        {
            id: 104,
            region: "蘇瑞瑪",
            title: "Azir: The Emperor of the Sands",
            titleCn: "阿祈爾：砂之皇",
            content: [
                { en: "The last emperor of ancient Shurima, Azir was betrayed at the moment of his ascension, leading to the empire's collapse.", cn: "作為古蘇瑞瑪的最後一位皇帝，阿祈爾在昇華之際遭到背叛，導致了帝國的崩潰。" },
                { en: "Reborn after millennia, he commands the very sands to form phalanxes of loyal soldiers.", cn: "千年後重生歸來，他操控黃沙組成效忠於他的士兵方陣。" },
                { en: "He seeks to restore Shurima to its former glory, viewing himself as the rightful shepherd of his people.", cn: "他試圖恢復蘇瑞瑪往日的榮光，將自己視為子民合法的牧者。" },
                { en: "\"Shurima is a dream that refused to die, and I am the dawn that wakes it,\" he proclaimed.", cn: "「蘇瑞瑪是個拒絕死去的美夢，而我則是喚醒它的黎明，」他宣稱道。" },
                { en: "He embodies the majestic and often detached will of a god-emperor.", cn: "他體現了一位神皇那莊嚴且往往超脫凡塵的意志。" },
                { en: "Power is not merely a throne, but the responsibility to lead a nation through the shifting dunes of history.", cn: "權力不僅僅是一個王座，更是在歷史更迭的沙丘中引領國家的責任。" }
            ]
        },
        {
            id: 105,
            region: "蘇瑞瑪",
            title: "Xerath: The Magus Ascendant",
            titleCn: "齊勒斯：昇華大巫師",
            content: [
                { en: "Once a slave and a trusted advisor, Xerath’s ambition led him to steal the power of the Sun Disc for himself.", cn: "曾是一名奴隸與備受信任的顧問，齊勒斯的野心使他為自己竊取了太陽圓盤的力量。" },
                { en: "He was transformed into a being of pure, unfettered arcane energy, shackled within the shards of a sarcophagus.", cn: "他被轉化為一個純粹、無拘無束的奧術能量體，被束縛在石棺的碎片之中。" },
                { en: "He views mortals as insects and seeks to reshape the world according to his own chaotic design.", cn: "他將凡人視為螻蟻，並試圖根據自己混亂的設計重塑世界。" },
                { en: "\"I am the storm that breaks the chains of fate; I am the magic that the gods feared,\" he hissed.", cn: "「我是粉碎命運枷鎖的風暴；我是神靈所恐懼的魔法，」他發出嘶嘶聲。" },
                { en: "He represents the destructive potential of knowledge when it is divorced from morality.", cn: "他代表了當知識脫離道德時所具有的毀滅性潛力。" },
                { en: "Freedom, when pursued through betrayal, creates a prison far more agonizing than any physical cell.", cn: "透過背叛追求的自由，會創造出一個比任何實體牢房都更痛苦的囚籠。" }
            ]
        },
        {
            id: 106,
            region: "蘇瑞瑪",
            title: "Nasus: The Curator of the Sands",
            titleCn: "納瑟斯：砂之守望者",
            content: [
                { en: "An enlightened jackal-headed Ascended, Nasus was a brilliant general and scholar of the ancient empire.", cn: "一位睿智的胡狼頭昇華者，納瑟斯曾是古帝國的天才將軍與學者。" },
                { en: "He spent centuries in self-imposed exile, mourning the fall of Shurima and guarding its hidden wisdom.", cn: "他在自我放逐中度過了數世紀，哀悼蘇瑞瑪的隕落並守護著隱藏的智慧。" },
                { en: "He wields a massive axe and the power to wither the life force of those who threaten the balance.", cn: "他揮舞著巨斧，並擁有枯萎那些威脅平衡者生命力的力量。" },
                { en: "\"The past is a heavy book, but its lessons are the only shield against the future,\" he mused.", cn: "「過去是一本沈重的書，但它的教訓是對抗未來唯一的護盾，」他沉思著。" },
                { en: "He is a stoic guardian, a weary sage who values the preservation of history above all else.", cn: "他是一位堅毅的守護者，一位將保存歷史視為重中之重的疲憊智者。" },
                { en: "Wisdom is a burden that requires the patience to endure the long, lonely march of time.", cn: "智慧是一份重擔，需要耐心去忍受漫長而孤獨的時光行軍。" }
            ]
        },
        {
            id: 107,
            region: "蘇瑞瑪",
            title: "Renekton: The Butcher of the Sands",
            titleCn: "雷尼克頓：砂之屠夫",
            content: [
                { en: "The brother of Nasus, Renekton was once a noble warrior who sacrificed himself to imprison Xerath.", cn: "作為納瑟斯的弟弟，雷尼克頓曾是一位高尚的戰士，為了囚禁齊勒斯而犧牲了自己。" },
                { en: "Centuries of confinement and Xerath’s psychological torture drove him into a murderous insanity.", cn: "數世紀的禁錮與齊勒斯的心理折磨，使他陷入了殘暴的瘋狂。" },
                { en: "He now roams the desert as a bloodthirsty crocodile-headed beast, seeking vengeance against his brother.", cn: "他現在作為一隻嗜血的鱷魚頭巨獸在沙漠流浪，尋求對哥哥的復仇。" },
                { en: "\"I am the teeth in the dark, the hunger that the sands cannot satisfy,\" he roared in fury.", cn: "「我是黑暗中的利齒，是沙漠無法滿足的飢渴，」他憤怒地吼叫著。" },
                { en: "He is a tragic victim of duty, a hero whose mind was devoured by the darkness he sought to contain.", cn: "他是職責下的悲劇受害者，一位心靈被他試圖遏制的黑暗所吞噬的英雄。" },
                { en: "A mind shattered by trauma perceives the entire world through the lens of betrayal and rage.", cn: "被創傷粉碎的心靈，會透過背叛與憤怒的視角來觀察整個世界。" }
            ]
        },
        {
            id: 108,
            region: "蘇瑞瑪",
            title: "Sivir: The Battle Mistress",
            titleCn: "希維爾：戰場之影",
            content: [
                { en: "A legendary mercenary and treasure hunter, Sivir discovered that she is the last living descendant of the Shuriman royalty.", cn: "一位傳奇的傭兵與寶藏獵人，希維爾發現自己是蘇瑞瑪皇室最後的在世後裔。" },
                { en: "She wields a massive, cross-shaped blade called the \"Chalicar,\" a relic that unlocked the tomb of Azir.", cn: "她揮舞著名為「恰麗卡爾」的巨大十字刃，這件遺物開啟了阿茲爾的陵墓。" },
                { en: "She values her independence and the weight of gold, yet she is haunted by the destiny of her bloodline.", cn: "她珍視自己的獨立與黃金的重量，卻也被血脈的宿命所困擾。" },
                { en: "\"I don’t lead nations; I just finish the jobs that others are too scared to take,\" she asserted.", cn: "「我不領導國家；我只完成那些他人因恐懼而不敢接下的工作，」她斷言道。" },
                { en: "She is a pragmatic survivor, a bridge between the ancient myths and the harsh reality of the modern desert.", cn: "她是一位務實的倖存者，是古老神話與現代沙漠殘酷現實之間的橋樑。" },
                { en: "Legacy is a shadow that follows you, no matter how fast you run or how deep you bury the past.", cn: "傳承是跟隨著你的陰影，無論你跑得多快或將過去埋得多深。" }
            ]
        },
        {
            id: 109,
            region: "蘇瑞瑪",
            title: "Taliyah: The Stoneweaver",
            titleCn: "塔莉雅：編石者",
            content: [
                { en: "A young nomad with the ability to manipulate stone and earth, Taliyah fled the empire to protect her family.", cn: "一位擁有操控岩石與大地能力的年輕游牧民，塔莉雅為了保護家人而逃離了帝國。" },
                { en: "She traveled across Runeterra, eventually training under Yasuo to master her turbulent powers.", cn: "她遊歷符文大地，最終在犽宿門下訓練以掌控她那混亂的力量。" },
                { en: "She returned to Shurima to stand against the rising power of Azir, fearing for the freedom of her people.", cn: "她回到蘇瑞瑪對抗崛起的阿茲爾，擔心著族人的自由。" },
                { en: "\"The desert is my loom, and I will weave a future where the small are not crushed by the great,\" she vowed.", cn: "「沙漠是我的織布機，我將編織一個弱小者不會被強大者粉碎的未來，」她誓言道。" },
                { en: "She represents the resilience of the common folk, a gentle soul with the strength of a mountain.", cn: "她代表了平民的韌性，是一個擁有大山般力量的溫柔靈魂。" },
                { en: "The most enduring monuments are not built of stone, but of the courage to protect those we love.", cn: "最持久的豐碑不是由石頭建造，而是源於保護所愛之人的勇氣。" }
            ]
        },
        {
            id: 110,
            region: "蘇瑞瑪",
            title: "Amumu: The Sad Mummy",
            titleCn: "阿姆姆：殤之木乃伊",
            content: [
                { en: "A lonely and melancholic soul from ancient Shurima, Amumu wanders the world in search of a friend.", cn: "一個來自古蘇瑞瑪、孤獨且憂鬱的靈魂，阿姆姆在世界流浪尋找朋友。" },
                { en: "He is afflicted by a curse that brings ruin to anything he touches, leaving him eternally isolated.", cn: "他深受詛咒困擾，會給他觸碰到的任何事物帶來毀滅，使他永遠處於孤立狀態。" },
                { en: "His bandages are a physical manifestation of his eternal grief and longing for connection.", cn: "他的繃帶是他永恆悲傷與對聯繫渴望的肉體展現。" },
                { en: "\"Will you be my friend? Or will the shadows take you too?\" he sobbed into the desert wind.", cn: "「你會成為我的朋友嗎？還是陰影也會把你帶走？」他向著沙漠的風啜泣。" },
                { en: "He is a figure of pure tragedy, an enigma whose origin is lost to the shifting sands of time.", cn: "他是一個純粹悲劇的人物，一個起源已在流轉的時光沙塵中失落的謎團。" },
                { en: "The greatest suffering is not the presence of pain, but the absence of a hand to hold through it.", cn: "最大的痛苦不在於痛苦本身，而在於度過痛苦時沒有一隻可以握住的手。" }
            ]
        },
        {
            id: 111,
            region: "蘇瑞瑪",
            title: "K'Sante: The Pride of Nazumah",
            titleCn: "卡桑帝：納祖芒之傲",
            content: [
                { en: "A legendary monster hunter from the city-state of Nazumah, K'Sante defends his home from the desert's threats.", cn: "一位來自城邦納祖芒的傳奇獵魔人，卡桑帝守護著家園免受沙漠的威脅。" },
                { en: "He wields \"Ntofos,\" massive blunt weapons crafted from the hide of a regenerative predator.", cn: "他揮舞著「恩圖佛」，這是一對由具備再生能力掠奪者皮革製成的巨大鈍器。" },
                { en: "He values the strength of community and the discipline required to overcome overwhelming odds.", cn: "他重視社群的力量，以及克服壓倒性逆境所需的紀律。" },
                { en: "\"A hunter is defined by his scars, but a protector is defined by the smiles behind him,\" he stated.", cn: "「獵人由他的傷痕定義，但守護者是由他身後的笑容所定義的，」他表示。" },
                { en: "He is a modern hero of Shurima, representing a culture that survived without the help of the Ascended.", cn: "他是蘇瑞瑪的現代英雄，代表了一個在沒有昇華者幫助下存續下來的文化。" },
                { en: "True pride is found in the labor of one's own hands and the unwavering commitment to one's people.", cn: "真正的驕傲，存在於親手的勞作以及對子民不移的承諾之中。" }
            ]
        },
        {
            id: 112,
            region: "蘇瑞瑪",
            title: "Rammus: The Armordillo",
            titleCn: "拉姆斯：披甲龍龜",
            content: [
                { en: "An enigmatic being of the deep desert, Rammus is a creature of few words whose origins are shrouded in countless myths and divine theories.", cn: "身為深處沙漠的神祕存在，拉姆斯是一個寡言的生物，其起源籠罩在無數神話與神性論點的迷霧之中。" },
                { en: "He rolls through the sands at incredible speeds, his spiked shell reflecting the desert sun and deflecting the strongest of blows.", cn: "他以驚人的速度在沙丘間滾動，佈滿尖刺的外殼反射著沙漠烈日，並能彈開最強勁的攻擊。" },
                { en: "While some worship him as a god and others see him as a simple beast, he remains a silent wanderer who occasionally intervenes in mortal affairs.", cn: "儘管有人將他奉若神明，也有人視他為單純的野獸，他依然是一位沈默的遊蕩者，偶爾介入凡間事務。" },
                { en: "\"Alright,\" he responded to a grand temple built in his honor, before rolling away into the horizon.", cn: "「恩，」面對為了榮耀他而建的宏偉神廟，他僅如此回應，隨後便滾向地平線消失不見。" },
                { en: "He represents the quiet, immovable mysteries of the natural world that require no explanation.", cn: "他代表了自然界中那些沈默、不可撼動且無需解釋的神祕。" }
            ]
        },
        {
            id: 113,
            region: "伊克斯塔爾",
            title: "Skarner: The Ancient Sovereign",
            titleCn: "史加納：元素巨蠍",
            content: [
                { en: "Skarner is a massive, ancient Brackern—a race of crystalline creatures who are the true masters of earth and stone in Shurima.", cn: "史加納是一隻巨大的遠古布雷克族——這是一個由水晶構成的種族，是蘇瑞瑪大地與岩石真正的掌控者。" },
                { en: "He protects the secrets of his kind and the powerful life-crystals embedded in their bodies, sensing the tremors of the world through the soil.", cn: "他保護著族人的秘密以及嵌在他們體內強大的生命水晶，透過土壤感知世界的震動。" },
                { en: "After the recent awakening of Shurima's empire, he has become a formidable guardian of the land’s equilibrium against those who would exploit its magic.", cn: "隨著蘇瑞瑪帝國近期的甦醒，他成為了土地平衡的強大守護者，對抗那些試圖剝削這片土地魔法的人。" },
                { en: "\"The earth remembers what the wind forgets; my sting is the price for your greed,\" he rumbled, his crystalline tail glowing.", cn: "「大地記得風所遺忘的一切；我的螫刺是你貪婪的代價，」他發出低吼，水晶尾巴閃爍著光芒。" },
                { en: "He embodies the ancient wisdom of the earth and the fierce protection of ancestral heritage.", cn: "他體現了大地古老的智慧，以及對祖先遺產的強烈守護。" }
            ]
        },
        {
            id: 114,
            region: "符文大地",
            title: "Zilean: The Chronokeeper",
            titleCn: "極靈：時光守護者",
            content: [
                { en: "The last of the Icathian mages, Zilean survived the Void’s destruction of his home by projecting his consciousness into the timelines.", cn: "作為艾凱西亞最後的法師，極靈透過將意識投影到時間線中，在虛空毀滅家園的災難中倖存。" },
                { en: "He drifts through past, present, and future, searching for a way to undo the tragedy and restore his people to life.", cn: "他在過去、現在與未來間漂流，在無數毀滅的結局中，尋找拯救族人並扭曲悲劇的方法。" },
                { en: "His existence is a lonely vigil, as he witnesses the rise and fall of civilizations in the blink of an eye.", cn: "他的存在是一場孤獨的守望，他在轉瞬之間見證了無數文明的興起與衰亡。" },
                { en: "He uses his mastery over time to protect his allies, slowing down his enemies or even cheating death itself.", cn: "他利用對時間的掌控來保護盟友，減緩敵人的速度，甚至能從死神手中奪回生命。" },
                { en: "\"Time is a river, and I am the one who must find the path back to what was lost,\" he sighed solemnly.", cn: "「時間是一條河，而我必須找到那條回到失落之地的路，」他莊嚴地嘆息道。" }
            ]
        },
        {
            id: 115,
            region: "符文大地",
            title: "Jax: Grandmaster at Arms",
            titleCn: "賈克斯：武器達人",
            content: [
                { en: "Once a Kohari warrior of Icathia, Jax is one of the few survivors of the war against the Void, now a wanderer seeking worthy allies.", cn: "曾是艾凱西亞的「考哈里」戰士，賈克斯是虛空戰爭少數的倖存者，現在是一位尋找強大盟友的遊蕩者。" },
                { en: "He carries a mystical lamppost—the \"Last Light of Icathia\"—as a symbol of hope for his fallen homeland.", cn: "他提著一盞神秘的燈柱——「艾凱西亞最後之光」，作為復興故土的希望象徵。" },
                { en: "He refuses to use a traditional weapon, believing that his skill alone is enough to defeat any foe who lacks a true soul.", cn: "他拒絕使用傳統武器，堅信單憑自己的技巧就足以擊敗任何缺乏真正靈魂的對手。" },
                { en: "He travels Runeterra challenging the strongest fighters, testing their mettle to see if they are brave enough to face the encroaching darkness.", cn: "他遊歷符文大地挑戰最強的鬥士，測試他們的勇氣，看他們是否足以面對即將到來的黑暗。" },
                { en: "\"Imagine if I had a real weapon,\" he chuckled, standing undefeated atop a mountain of fallen foes.", cn: "「想像一下，如果我用的是真武器，」他在戰敗者的屍山巔峰上發出冷笑。" }
            ]
        },
        {
            id: 116,
            region: "巨石峰",
            title: "Leona: The Radiant Dawn",
            titleCn: "雷歐娜：黎明之光",
            content: [
                { en: "Chosen by the Aspect of the Sun, Leona is the templar of the Solari, a holy order that worships the daylight.", cn: "被太陽星靈所選中，雷歐娜是烈陽教派的聖殿武士，這是一個崇拜日光的神聖組織。" },
                { en: "She wields the Zenith Blade and a shield infused with solar fire, standing as a beacon against darkness.", cn: "她揮舞著天頂之刃與注入烈陽之火的盾牌，作為對抗黑暗的燈塔。" },
                { en: "She believes in the absolute purity of the sun, yet she is haunted by her fractured friendship with Diana.", cn: "她深信太陽的絕對純潔，卻也因與黛安娜那破碎的友誼而感到困擾。" },
                { en: "\"The sun provides the warmth of life and the fire of justice,\" she proclaimed with unwavering faith.", cn: "「太陽提供了生命的溫暖與正義的火焰，」她帶著不移的信仰宣稱。" },
                { en: "She is a protector and a warrior, an unyielding pillar of light in a world of growing shadows.", cn: "她是守護者也是戰士，是日益增長的陰影世界中屹立不搖的光之支柱。" },
                { en: "True devotion requires the courage to shine even when the cold shadows of doubt threaten to extinguish the spark.", cn: "真正的虔誠需要勇氣去發光，即便當懷疑的冰冷陰影威脅要熄滅星火之際。" }
            ]
        },
        {
            id: 117,
            region: "巨石峰",
            title: "Diana: Scorn of the Moon",
            titleCn: "黛安娜：皎月之光",
            content: [
                { en: "After discovering hidden truths about the moon, Diana became the host for the Aspect of the Moon, opposing the Solari.", cn: "在發現關於月亮的隱藏真相後，黛安娜成了皎月星靈的宿主，與烈陽教派對抗。" },
                { en: "She wields a crescent moonblade, moving with the cold, lethal grace of the midnight sky.", cn: "她揮舞著新月形狀的月之刃，以午夜天空那冰冷而致命的優雅移動著。" },
                { en: "She seeks to restore the balance between day and night, viewing the Solari’s dominance as a dangerous imbalance.", cn: "她試圖恢復日夜間的平衡，將烈陽教派的統治視為一種危險的失衡。" },
                { en: "\"The moon hides the truths that the sun is too blinding to see,\" she whispered into the night.", cn: "「月亮隱藏了那些太陽因太過耀眼而讓人無法看清的真相，」她向著黑夜低聲說道。" },
                { en: "She is a heretic to her people, a solitary figure who finds strength in the silver glow of the stars.", cn: "她對族人而言是個異教徒，一個在群星銀光中尋找力量的孤獨身影。" },
                { en: "The truth is often found in the places that society forbids us to explore.", cn: "真理往往存在於社會禁止我們去探索的地方。" }
            ]
        },
        {
            id: 118,
            region: "巨石峰",
            title: "Pantheon: The Unbreakable Spear",
            titleCn: "潘森：不屈之槍",
            content: [
                { en: "Once the host of the Aspect of War, Atreus reclaimed his humanity after the god within him was slain by Aatrox.", cn: "曾是戰爭星靈的宿主，阿特瑞斯在體內的神靈被厄薩斯斬殺後，重新奪回了他的韌性。" },
                { en: "He now fights as a mortal with the fading power of a god, proving that human will is the ultimate weapon.", cn: "他現在以凡人之軀運用神靈殘存的力量戰鬥，證明人類的意志才是終極武器。" },
                { en: "He despises the gods and the carnage they bring, standing as a shield for those caught in their games.", cn: "他蔑視神靈及其帶來的屠殺，作為那些受困於神靈遊戲中之人的護盾。" },
                { en: "\"The stars may be eternal, but it is the brief flicker of mortal life that defines courage,\" he roared.", cn: "「星辰或許永恆，但唯有凡人生命那短暫的閃爍，才定義了勇氣，」他吼道。" },
                { en: "He is a testament to the resilience of the human spirit, a man who refused to be a puppet of the divine.", cn: "他是人類精神韌性的證明，一個拒絕成為神權傀儡的人。" },
                { en: "Greatness is not found in immortality, but in the struggle to protect what is fragile and fleeting.", cn: "偉大不在於長生不死，而在於保護那些脆弱且短暫事物的鬥爭中。" }
            ]
        },
        {
            id: 119,
            region: "巨石峰",
            title: "Taric: The Shield of Valoran",
            titleCn: "塔里克：瓦羅然之盾",
            content: [
                { en: "A former Demacian knight exiled for a moment of distraction, Taric climbed Mount Targon and found a new purpose.", cn: "曾因一時分心而被流放的德瑪西亞騎士，塔里克攀上了巨石峰並找到了新的目標。" },
                { en: "He became the Protector, the Aspect of Life and Love, dedicated to preserving the beauty of the world.", cn: "他成了守護者——生命與愛的星靈，致力於保存世界的美麗。" },
                { en: "He utilizes the cosmic energy of starlight to heal the wounded and shield the innocent.", cn: "他利用星光的宇宙能量來治癒傷者並護佑無辜。" },
                { en: "\"True beauty is found in the act of kindness, not in the perfection of the form,\" he said with gentle grace.", cn: "「真正的美存在於善良的行徑中，而非外表的完美，」他帶著溫柔的優雅說道。" },
                { en: "He is a beacon of hope, a guardian who values every spark of life as a sacred treasure.", cn: "他是希望的燈塔，一位將每一抹生命火花都視為神聖寶藏的守護者。" },
                { en: "The most powerful armor is not forged of steel, but of the compassion that binds us together.", cn: "最強大的裝甲並非由鋼鐵鑄造，而是由將我們連結在一起的同情心所構成。" }
            ]
        },
        {
            id: 120,
            region: "巨石峰",
            title: "Zoe: The Aspect of Twilight",
            titleCn: "柔伊：暮光星靈",
            content: [
                { en: "Possessing the whimsy of a child and the power of a cosmic deity, Zoe was chosen as the Aspect of Twilight.", cn: "擁有孩童般的異想天開與宇宙神靈的力量，柔伊被選為暮光星靈。" },
                { en: "She wanders through dimensions, delivering messages that often herald cataclysmic shifts in reality.", cn: "她穿梭於各個維度，遞送著往往預示現實發生災難性變動的訊息。" },
                { en: "She views the world as a playground, playing with space and time with an innocent, terrifying ease.", cn: "她將世界視為遊樂場，以一種天真卻恐怖的輕鬆感玩弄著空間與時間。" },
                { en: "\"Why be serious when the universe is full of chocolate and glitter?\" she giggled while opening a portal.", cn: "「當宇宙充滿了巧克力與閃亮亮的東西時，為什麼要這麼嚴肅呢？」她一邊開啟傳送門一邊咯咯笑道。" },
                { en: "She is an unpredictable force of change, a reminder that the divine can be as fickle as a summer breeze.", cn: "她是一股難以捉摸的變革力量，提醒著神性也可能像夏日微風般反覆無常。" },
                { en: "Chaos is the loom upon which the stars weave the ever-changing tapestry of existence.", cn: "混沌是星辰編織千變萬化存在掛毯的織布機。" }
            ]
        },
        {
            id: 121,
            region: "巨石峰",
            title: "Aphelios: The Weapon of the Faithful",
            titleCn: "亞菲利歐：信仰之武",
            content: [
                { en: "A mute assassin of the Lunari, Aphelios strikes from the shadows with a variety of mystical moonstone weapons.", cn: "身為皎月教派的一名沈默刺客，亞菲利歐利用多種神秘的月石武器從陰影中出擊。" },
                { en: "He is guided by the voice of his sister, Alune, who channels her celestial magic into his hands.", cn: "他受姊妹阿盧妮的聲音指引，後者將她的星空魔法灌注於他的雙手中。" },
                { en: "He endures agonizing rituals to maintain his connection to the divine, viewing pain as a necessary sacrifice.", cn: "他忍受著痛苦的儀式以維持與神性的連結，將痛苦視為必要的犧牲。" },
                { en: "\"The silence is my canvas, and the moonstone is my brush of cold, calculated judgment,\" the spirit echoed.", cn: "「沈默是我的畫布，而月石是我那冰冷且精算之評判的畫筆，」靈魂迴盪著。" },
                { en: "He is a weapon of religious devotion, a lethal shadow that serves the light of the moon.", cn: "他是宗教奉獻下的武器，是一位效命於月光之下的致命陰影。" },
                { en: "The deepest bonds are those that can transcend the physical realm and speak through the silence of the soul.", cn: "最深厚的羈絆，是那些能超越物理領域並透過靈魂的沈默對話的聯繫。" }
            ]
        },
        {
            id: 122,
            region: "巨石峰",
            title: "Soraka: The Starchild",
            titleCn: "索拉卡：星之子",
            content: [
                { en: "A celestial being who gave up her immortality to heal the inhabitants of Runeterra, Soraka lives in the foothills.", cn: "一位為了治癒符文大地居民而放棄永恆生命的星辰生物，索拉卡居住在山麓地帶。" },
                { en: "She views the potential for goodness in every soul, sacrificing her own essence to mend the broken.", cn: "她在每個靈魂中都看見向善的潛力，不惜犧牲自己的本質來修補破碎。" },
                { en: "Her magic is a soothing balm of starlight, a testament to her profound empathy for mortal suffering.", cn: "她的魔法是星光構成的舒緩膏藥，證明了她對凡人苦難的深切共情。" },
                { en: "\"We are all fragments of the same sky, searching for the light that guides us home,\" she sang.", cn: "「我們都是同一片天空的碎片，尋找著指引我們回家的光芒，」她歌詠著。" },
                { en: "She is a martyr of compassion, a divine spirit who chose the frailty of life over the coldness of eternity.", cn: "她是同情心的殉道者，一位選擇了脆弱生命而非冰冷永恆的神聖靈魂。" },
                { en: "Healing is a radical act of love that requires the willingness to feel the pain of others as your own.", cn: "治癒是一種激進的愛之表現，需要願意將他人的痛苦感同身受。" }
            ]
        },
        {
            id: 123,
            region: "伊克斯塔爾",
            title: "Qiyana: Empress of the Elements",
            titleCn: "姬亞娜：元素女皇",
            content: [
                { en: "The youngest of ten sisters, Qiyana possesses a terrifying mastery over the elements and an even greater ambition.", cn: "身為十姊妹中年紀最小的一位，姬亞娜擁有恐怖的元素駕馭力，以及更巨大的野心。" },
                { en: "She seeks to claim her rightful place as the ruler of Ixtal, viewing her elders as stagnant and shortsighted.", cn: "她試圖奪回自己作為伊克斯塔爾統治者的合法地位，將長輩視為停滯且短視的人。" },
                { en: "She wields a massive ring-blade called an \"Ohmlatl,\" manipulating brush, ice, and earth with lethal elegance.", cn: "她揮舞著名為「歐姆拉托」的巨大環刃，以致命的優雅操縱著叢林、冰霜與大地。" },
                { en: "\"I don’t just use the elements; I command them to bow before their true queen,\" she asserted.", cn: "「我不僅僅是使用元素；我命令它們在真正的女皇面前低頭，」她斷言道。" },
                { en: "She is a prodigy of arrogance, a ruler who believes that might and mastery are the only true virtues.", cn: "她是傲慢的天才，一位深信力量與掌控才是唯一真美德的統治者。" },
                { en: "Talent without humility is a storm that seeks to reshape the world in its own reflection.", cn: "缺乏謙卑的天賦是一場風暴，試圖照著自己的倒影重塑世界。" }
            ]
        },
        {
            id: 124,
            region: "伊克斯塔爾",
            title: "Milio: The Gentle Flame",
            titleCn: "米里歐：溫暖之焰",
            content: [
                { en: "A young boy from a remote village, Milio discovered the \"Axiom of Fire\" in a way that heals instead of burns.", cn: "一位來自偏遠村莊的小男孩，米里歐發現了「火焰公理」那種治癒而非灼燒的使用方式。" },
                { en: "He carries a magical backpack containing a \"fuemigo,\" a friendly flame-spirit that helps him protect his allies.", cn: "他背著一個裝有「火苗（fuemigo）」的魔法背包，那是一個能幫助他保護隊友的友善火靈。" },
                { en: "He traveled to the capital, Ixaocan, to restore his family’s honor and join the ranks of the elemental masters.", cn: "他前往首都以緒奧肯，試圖恢復家族榮耀並加入元素大師的行列。" },
                { en: "\"My flames don't hurt; they feel like a warm hug on a cold night,\" he chirped with a bright smile.", cn: "「我的火焰不會傷人；它們感覺就像寒冷冬夜裡的一個溫暖擁抱，」他帶著燦爛笑容清脆地說道。" },
                { en: "He represents the purity and wonder of magic, a stark contrast to the cold calculation of the Ixtali elite.", cn: "他代表了魔法的純潔與奇蹟，與伊克斯塔爾精英階層那冷酷的計算形成了鮮明對比。" },
                { en: "Kindness is a spark that can illuminate even the most rigid and traditional of societies.", cn: "善良是一抹火星，足以照亮即便最僵化且傳統的社會。" }
            ]
        },
        {
            id: 125,
            region: "伊克斯塔爾",
            title: "Neeko: The Curious Chameleon",
            titleCn: "妮可：好奇變色龍",
            content: [
                { en: "A member of the lost Oovi-Kat tribe, Neeko can shape-shift into others by communing with their spirit, or \"Sho'ma.", cn: "身為失落的霧尾族一員，妮可能透過與他人的靈魂（Sho'ma）溝通，變身成對方的模樣。" },
                { en: "She wanders the jungles of Ixtal and beyond, searching for a new \"tribe\" to call her own.", cn: "她在伊克斯塔爾及更遠處的叢林遊蕩，尋找一個能稱之為家的新「部落」。" },
                { en: "She perceives the world with a vibrant, colorful wonder, seeing the connections that others ignore.", cn: "她以鮮活、繽紛的驚奇感觀察世界，看見了他人忽視的聯繫。" },
                { en: "\"Neeko is not hiding; Neeko is just being everyone at once!\" she giggled while changing forms.", cn: "「妮可不是在躲藏；妮可只是同時在當每個人！」她一邊變身一邊咯咯笑道。" },
                { en: "She is an embodiment of empathy and curiosity, a bridge between the ancient spirits and the modern world.", cn: "她是共情與好奇心的化身，是古老靈魂與現代世界之間的橋樑。" },
                { en: "To truly understand another, one must be willing to see the world through their eyes.", cn: "若要真正理解他人，必須願意透過他們的雙眼來觀察世界。" }
            ]
        },
        {
            id: 126,
            region: "伊克斯塔爾",
            title: "Nidalee: The Bestial Huntress",
            titleCn: "奈德麗：狂野獵手",
            content: [
                { en: "Raised by a pack of cougars after being lost in the jungle, Nidalee is a fierce protector of the wild.", cn: "在叢林走失後由美洲獅群撫養長大，奈德麗是荒野悍勇的守護者。" },
                { en: "She possesses the ability to transform into a lethal feline, stalking those who dare to defile her home.", cn: "她擁有變身為致命貓科動物的能力，追蹤那些敢於玷污她家園的人。" },
                { en: "She views the inhabitants of the cities as soft and disconnected from the true rhythm of life.", cn: "她將城市居民視為軟弱者，認為他們與生命的真實節奏脫節。" },
                { en: "\"The jungle has no laws, only the survival of those who respect the predator within,\" she hissed.", cn: "「叢林沒有法律，唯有那些尊重內在掠奪者的人才能生存，」她發出嘶嘶聲。" },
                { en: "She is a bridge between humanity and the primal, a guardian whose loyalty lies with the forest.", cn: "她是人性與原始之間的橋樑，一位忠誠於森林的守護者。" },
                { en: "Civilization is a fleeting dream compared to the eternal, unyielding reality of the natural world.", cn: "與自然界永恆不屈的現實相比，文明只是一場轉瞬即逝的美夢。" }
            ]
        },
        {
            id: 127,
            region: "伊克斯塔爾",
            title: "Rengar: The Primal Hunter",
            titleCn: "雷葛爾：傲興獵人",
            content: [
                { en: "A vastayan trophy hunter who seeks the most dangerous prey, Rengar was exiled from his tribe for being undersized.", cn: "一位尋求最危險獵物的瓦斯塔亞標本獵人，雷葛爾曾因體型瘦小而被族人流放。" },
                { en: "He mastered the art of the hunt, viewing every scar as a lesson and every kill as a tribute to his skill.", cn: "他精通了狩獵藝術，將每一道傷疤視為教訓，將每一次擊殺視為對技藝的致敬。" },
                { en: "He is locked in an eternal rivalry with the Void-beast Kha'Zix, a battle that has cost him an eye.", cn: "他與虛空生物卡力斯陷入了永恆的宿敵對決，那場戰鬥讓他失去了一隻眼睛。" },
                { en: "\"A true hunter does not just kill; he understands the very heartbeat of his prey,\" he growled.", cn: "「真正的獵人不僅僅是殺戮；他能理解獵物心跳的起伏，」他低吼道。" },
                { en: "He represents the relentless pursuit of excellence, a predator who lives for the thrill of the chase.", cn: "他代表了對卓越的不懈追求，是一位為了追逐的刺激而活的掠奪者。" },
                { en: "Our limitations are merely the starting points for the legends we choose to create.", cn: "我們的局限，僅僅是我們選擇創造傳奇的起點。" }
            ]
        },
        {
            id: 128,
            region: "伊克斯塔爾",
            title: "Zyra: Rise of the Thorns",
            titleCn: "枷蘿：棘之興起",
            content: [
