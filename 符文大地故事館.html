                { en: "An ancient, sentient plant that consumed a human mage to gain a mobile form, Zyra seeks to reclaim the world for her kin.", cn: "一株吞噬了人類法師以獲得行動能力的遠古有意識植物，枷蘿試圖為她的族類奪回世界。" },
                { en: "She commands a legion of lethal thorns and predatory blooms, viewing all animals as mere fertilizer.", cn: "她統御著致命荊棘與掠奪之花的軍團，將所有動物僅視為肥料。" },
                { en: "She represents the vengeful side of nature, a force that seeks to erase the scars of civilization.", cn: "她代表了自然界復仇的一面，是一股試圖抹除文明傷痕的力量。" },
                { en: "\"The world was green once, and it will be again when your bones have turned to dust,\" she whispered.", cn: "「世界曾是一片翠綠，當你們的白骨化作塵埃時，它將再次回歸，」她低聲說道。" },
                { en: "She is a beautiful, lethal anomaly, a predator that thrives on the decay of the old world.", cn: "她是個美麗且致命的異數，是一個在舊世界腐朽中茁壯的掠奪者。" },
                { en: "Life finds a way to endure, often by devouring the very things that once sought to control it.", cn: "生命總能找到生存之道，往往是透過吞噬那些曾試圖控制它的事物。" }
            ]
        },
        {
            id: 129,
            region: "伊克斯塔爾",
            title: "Malphite: Shard of the Monolith",
            titleCn: "墨菲特：熔岩巨獸",
            content: [
                { en: "Malphite is a colossal creature of living stone, a shard of a massive elemental fortress known as the \"Monolith\" that once stood to guard the world against the Void.", cn: "墨菲特是一個由活生生的石頭構成的巨大生物，他是曾為了抵禦虛空而守護世界的巨大元素要塞——「獨石」的一塊碎片。" },
                { en: "After the Monolith fell during the ancient war in Ixtal, Malphite was the only fragment that retained its purpose, wandering the world to maintain order amidst chaos.", cn: "在伊克斯塔爾的遠古戰爭中「獨石」崩毀後，墨菲特是唯一保留了其使命的殘片，他在世間遊蕩，試圖在混亂中維持秩序。" },
                { en: "He is a literal part of the earth, possessing immense strength and an unyielding will to protect Runeterra from the encroaching darkness.", cn: "他是大地實質的一部分，擁有驚人的力量與不屈的意志，致力於保護符文大地免受黑暗侵蝕。" },
                { en: "\"Caught between a rock and a hard place? That’s usually where I like to be,\" he rumbled, his voice like grinding tectonic plates.", cn: "「左右為難？那通常就是我最喜歡待的地方，」他發出如地殼變動般的低沈轟鳴聲。" },
                { en: "He represents the enduring stability of the natural world and the heavy burden of being the last sentinel of an extinct age.", cn: "他代表了自然界持久的穩定性，以及作為逝去時代最後守望者所背負的沈重負擔。" },
                { en: "The mountain does not move for the storm; it simply waits for the sky to clear once more.", cn: "山嶽不會因風暴而動搖；它只是靜靜等待天空再次放晴。" }
            ]
        },
        {
            id: 130,
            region: "虛空",
            title: "Kai'Sa: Daughter of the Void",
            titleCn: "凱莎：虛空之女",
            content: [
                { en: "As a young girl, Kai'Sa was swallowed by the void, surviving only by bonding with a living symbiotic second skin.", cn: "小時候的凱莎被虛空吞噬，靠著與一件活生生的共生皮膚融合才得以倖存。" },
                { en: "She is a human who has mastered the predatory tools of the void to protect humanity from its hunger.", cn: "她是一個掌握了虛空獵殺工具的人類，致力於保護人類免受虛空的飢渴吞噬。" },
                { en: "She lives in a constant state of isolation, feared by those she seeks to save.", cn: "她一直處於孤立狀態，被她試圖拯救的人們所恐懼。" },
                { en: "\"I am the hunter in the dark, the wall between the world and the nothingness,\" she declared.", cn: "「我是黑暗中的獵人，是世界與虛無之間的屏障，」她宣稱道。" },
                { en: "She represents the strength of the human spirit to endure and adapt to even the most horrific circumstances.", cn: "她代表了人類精神在最恐怖的環境中依然能忍受並適應的強大韌性。" },
                { en: "True heroism is the choice to defend a world that may never accept you back.", cn: "真正的英雄主義，是選擇去守護一個可能永遠不再接納你的世界。" }
            ]
        },
        {
            id: 131,
            region: "虛空",
            title: "Kassadin: The Void Walker",
            titleCn: "卡薩丁：虛空行者",
            content: [
                { en: "Searching for his lost daughter, Kassadin utilized forbidden artifacts to enter the void and fight its corruption.", cn: "為了尋找失蹤的女兒，卡薩丁利用禁忌遺物進入虛空，並與其中的腐化力量對抗。" },
                { en: "He is a man of singular resolve, his body sustained by ancient magic and a heart fueled by paternal love.", cn: "他是一個意志堅定的男人，身體由遠古魔法支撐，內心則由父愛驅動。" },
                { en: "He knows the true horror of what lies beneath the surface of Runeterra, a secret that weighs heavily on his soul.", cn: "他知道潛伏在符文大地地表下的真正恐怖，這份秘密沈重地壓在他的靈魂上。" },
                { en: "\"The void must be contained, or it will consume every memory of our existence,\" he stated grimly.", cn: "「虛空必須被遏制，否則它將吞噬我們存在過的每一絲記憶，」他冷峻地表示。" },
                { en: "He is a lonely sentinel, sacrificing his own humanity to stem the tide of total annihilation.", cn: "他是一個孤獨的哨兵，犧牲了自己的人性來抵擋徹底毀滅的浪潮。" },
                { en: "The greatest sacrifices are those made in the silence of an invisible war.", cn: "最偉大的犧牲，往往是在一場看不見的戰爭中沈默地完成的。" }
            ]
        },
        {
            id: 132,
            region: "虛空",
            title: "Kha'Zix: The Voidreaver",
            titleCn: "卡力斯：虛空掠食者",
            content: [
                { en: "A lethal predator that evolves by consuming the strongest creatures it finds, Kha'Zix is driven by a constant hunger.", cn: "一個透過吞噬最強大生物來進化的致命掠食者，卡力斯被恆久的飢渴所驅使。" },
                { en: "He adapts his physical form—developing wings, claws, or invisibility—to overcome any challenge.", cn: "他改變自己的肉體形態——演化出翅膀、利爪或隱身能力——以克服任何挑戰。" },
                { en: "He is locked in a deadly rivalry with Rengar, viewing the hunter as the ultimate trophy to facilitate his growth.", cn: "他與雷葛爾陷入了致命的敵對，將這位獵人視為促進其進化的終極戰利品。" },
                { en: "\"Consume and adapt; there is no limit to the perfection of the void,\" he hissed while cloaked in shadows.", cn: "「吞噬並適應；虛空的完美沒有極限，」他在陰影的遮蔽下發出嘶嘶聲。" },
                { en: "He represents the terrifying potential of biological evolution when stripped of all empathy.", cn: "他代表了當生物演化被剝奪所有共情時，那令人恐懼的潛力。" },
                { en: "Growth is a relentless cycle of overcoming obstacles and incorporating their strength.", cn: "成長是一個不斷克服障礙並吸收其力量的無情循環。" }
            ]
        },
        {
            id: 133,
            region: "虛空",
            title: "Malzahar: The Prophet of the Void",
            titleCn: "馬爾札哈：虛空先知",
            content: [
                { en: "Once a gifted seer, Malzahar’s mind was shattered by visions of the void, leading him to believe that oblivion is the only cure for suffering.", cn: "曾是一位天賦異稟的先知，馬爾札哈的心靈被虛空的景象粉碎，使他相信湮滅是苦難唯一的解藥。" },
                { en: "He opened rifts to let the void into Runeterra, acting as a herald for the coming silence.", cn: "他開啟裂隙引導虛空進入符文大地，作為即將到來的沈默之使徒。" },
                { en: "He commands a swarm of voidlings, viewing the destruction of the world as a holy necessity.", cn: "他統御著虛空靈群，將世界的毀滅視為一種神聖的必要性。" },
                { en: "\"Do not fight the end; embrace the cold peace that only the void can provide,\" he preached.", cn: "「不要對抗終焉；擁抱唯有虛空能提供的冰冷和平，」他傳教般說道。" },
                { en: "He is a man who lost his hope and replaced it with a fanatical devotion to the inevitable.", cn: "他是一個失去希望，並將其替換為對必然之事的狂熱奉獻的人。" },
                { en: "Madness often dresses itself in the language of destiny to justify the devastation it seeks.", cn: "瘋狂往往披著宿命的外衣，為它所追求的毀滅尋找藉口。" }
            ]
        },
        {
            id: 134,
            region: "虛空",
            title: "Vel'Koz: The Eye of the Void",
            titleCn: "威寇茲：虛空之眼",
            content: [
                { en: "The oldest of the void-spawn, Vel'Koz seeks to deconstruct the world through pure observation and biological disintegration.", cn: "作為虛空生物中最古老的存在，威寇茲試圖透過純粹的觀察與生物分解來解構世界。" },
                { en: "He views all life as data points to be analyzed, showing no emotion or bias in his destructive research.", cn: "他將所有生命視為待分析的數據點，在他毀滅性的研究中不帶任何情感或偏見。" },
                { en: "His massive laser beams turn matter into dust, recording the essence of everything he destroys.", cn: "他那巨大的雷射光束將物質化為塵埃，紀錄下他所毀滅之物的一切本質。" },
                { en: "\"Knowledge is a weapon, and I am the ultimate architect of its acquisition,\" he calculated.", cn: "「知識是武器，而我是獲取知識的終極建築師，」他精算著。" },
                { en: "He is a cold, intellectual horror, representing the void’s desire to understand what it must eventually erase.", cn: "他是一個冰冷、理性的恐怖，代表了虛空想要理解它最終必須抹除之物的慾望。" },
                { en: "Understanding can be as lethal as any blade when utilized by a mind that values data over life.", cn: "當一個看重數據勝過生命的意志利用理解力時，它可能與任何利刃一樣致命。" }
            ]
        },
        {
            id: 135,
            region: "虛空",
            title: "Rek'Sai: The Void Burrower",
            titleCn: "雷珂煞：虛空遁地者",
            content: [
                { en: "The queen of a vicious species of void-spawn, Rek'Sai turned the Shuriman desert into her personal hunting ground.", cn: "作為一種殘暴虛空物種的女王，雷珂煞將蘇瑞瑪沙漠變成了她的私人獵場。" },
                { en: "She moves through the earth with terrifying speed, sensing the vibrations of her prey from below.", cn: "她在地底下以恐怖的速度移動，從下方感應獵物的震動。" },
                { en: "She is a primal force of hunger and territorial aggression, leaving only ruin in her wake.", cn: "她是飢渴與領地侵略的原始力量，所過之處只留下廢墟。" },
                { en: "\"The desert screams when she hunts, but the silence after is much louder,\" the nomad legends whispered.", cn: "「她狩獵時沙漠在尖叫，但隨後的沈默卻更加震耳欲聾，」游牧民的傳說低語著。" },
                { en: "She is the apex predator of a nightmare realm, a silent threat that strikes without warning.", cn: "她是噩夢領域的掠食者之首，是一個毫無預警便發動攻擊的沈默威脅。" },
                { en: "Territory is a boundary drawn in the blood of those who fail to sense the danger beneath their feet.", cn: "領地是一道界線，由那些未能察覺腳下危險的人之鮮血所劃定。" }
            ]
        },
        {
            id: 136,
            region: "虛空",
            title: "Cho'Gath: The Terror of the Void",
            titleCn: "科加斯：虛空恐懼",
            content: [
                { en: "An entity of immense size and insatiable hunger, Cho'Gath grows larger with every creature he devours.", cn: "一個體型巨大且飢渴難耐的實體，科加斯每吞噬一個生物體型就會變得更大。" },
                { en: "He views the world as a feast, seeking to consume enough mass to eventually swallow entire nations.", cn: "他將世界視為盛宴，試圖攝取足夠的質量以最終吞噬整個國家。" },
                { en: "He is a manifestation of the void’s endless consumption, a living mountain of scales and teeth.", cn: "他是虛空無盡消耗的具象化，是一座由鱗片與利齒構成的活大山。" },
                { en: "\"The world is but a morsel, and I have only just begun to dine,\" he boomed.", cn: "「世界不過是一小口，而我的用餐才剛剛開始，」他如雷鳴般說道。" },
                { en: "He represents the ultimate physical manifestation of the void’s desire to fill the emptiness with ruin.", cn: "他代表了虛空想要用廢墟填補空虛的終極肉體展現。" },
                { en: "Appetite, when unbridled, becomes a gravity that pulls the world toward its own extinction.", cn: "當胃口不受約束時，它會變成一種引力，將世界拉向自身的滅絕。" }
            ]
        },
        {
            id: 137,
            region: "虛空",
            title: "Bel'Veth: The Empress of the Void",
            titleCn: "貝爾薇斯：虛空女皇",
            content: [
                { en: "The newest and perhaps most dangerous evolution, Bel'Veth seeks to replace the void and reality with her own \"Lavender Sea.", cn: "\" 作為最新且或許最危險的演化，貝爾薇斯試圖用她自己的「薰衣草海」來取代虛空與現實。" },
                { en: "She is the collective memory of a consumed city, possessing a regal and chilling intelligence.", cn: "她是某座被吞噬城市的集體記憶，擁有著高貴且令人膽寒的智慧。" },
                { en: "She offers a terrifying choice: total annihilation by the old void, or eternal servitude within her new creation.", cn: "她提供了一個恐怖的選擇：被舊虛空徹底毀滅，或是在她的新造物中永恆效命。" },
                { en: "\"I am the end of your story and the beginning of mine; the ocean of void will swallow the stars,\" she proclaimed.", cn: "「我是你故事的終結，是我故事的開始；虛空之海將吞噬星辰，」她宣稱。" },
                { en: "She represents a shift in the void’s nature—from mindless consumption to strategic conquest.", cn: "她代表了虛空本質的轉變——從盲目的消耗轉向策略性的征服。" },
                { en: "A new master is often just a different shape for an old, familiar doom.", cn: "一位新的主宰，往往只是古老且熟悉的末日換了另一種形狀。" }
            ]
        },
        {
            id: 138,
            region: "虛空",
            title: "Kog'Maw: The Mouth of the Abyss",
            titleCn: "寇格魔：深淵大口",
            content: [
                { en: "Emerging from a Void-rift in Icathia, Kog'Maw is a creature of pure, corrosive hunger that seeks to \"examine\" everything by consuming it.", cn: "從艾凱西亞的虛空裂隙中鑽出的寇格魔，是一個純粹且具腐蝕性飢餓的生物，牠試圖透過「吞噬」來「研究」萬物。" },
                { en: "Unlike other Void horrors that hunt with malice, Kog'Maw is driven by a strange, almost childlike curiosity, though its methods are nonetheless lethal.", cn: "與其他帶著惡意狩獵的虛空恐懼不同，寇格魔受一種奇異、近乎孩童般的好奇心驅動，儘管牠的手法同樣致命。" },
                { en: "It oozes caustic acid that can dissolve the toughest armor, turning everything it touches into a feast for its endless belly.", cn: "牠分泌出能溶解最強韌盔甲的強酸，將所觸及的一切轉化為滿足其無盡胃口的饗宴。" },
                { en: "\"Terror coming... Daddy coming!\" it gurgled, its multiple eyes darting around in search of the next meal.", cn: "「恐怖要來了……爹地要來了！」牠發出咕嶓聲，眾多眼睛四處張望，尋找著下一餐。" },
                { en: "Kog'Maw represents the mindless, consuming nature of the Void—a reminder that to the abyss, all of existence is merely food.", cn: "寇格魔代表了虛空那無意識的、吞噬一切的天性——牠提醒著世人，對深淵而言，所有存在都僅僅是食物。" }
            ]
        },
        {
            id: 139,
            region: "班德爾城",
            title: "Teemo: The Swift Scout",
            titleCn: "提摩：迅捷斥候",
            content: [
                { en: "Despite his adorable appearance, Teemo is one of the most lethal and disciplined scouts in Bandle City.", cn: "儘管外表可愛，提摩卻是班德爾城中最致命且最具紀律的斥候之一。" },
                { en: "He maintains a cheerful demeanor while planting invisible, poisonous mushrooms across the battlefield.", cn: "他一邊保持著愉快的舉止，一邊在戰場上佈置隱形的有毒香菇。" },
                { en: "He is a master of guerrilla warfare, a tiny warrior who values the safety of his home above all else.", cn: "他是一位游擊戰大師，一個將家園安全視為重中之重的迷你戰士。" },
                { en: "\"Size is a distraction for those who fail to see the danger in a single blowgun,\" he remarked with a salute.", cn: "「對於那些看不清吹箭筒威脅的人來說，體型僅僅是種干擾，」他敬禮說道。" },
                { en: "He represents the unexpected lethal potential hidden behind a facade of innocence.", cn: "他代表了隱藏在天真外表下，那出人意料的致命潛能。" },
                { en: "The smallest guardian can cast the longest shadow when the light of home is at stake.", cn: "當家園的光芒受到威脅時，最小的守護者也能投射出最長的陰影。" }
            ]
        },
        {
            id: 140,
            region: "班德爾城",
            title: "Tristana: The Yordle Gunner",
            titleCn: "崔絲塔娜：約德爾砲手",
            content: [
                { en: "Inspired by the great warriors of the human world, Tristana decided to bring heavy ordinance to the defenses of Bandle City.", cn: "受人類世界偉大戰士的啟發，崔絲塔娜決定為班德爾城的防禦引進重型軍火。" },
                { en: "She wields a massive cannon named \"Boomer,\" finding joy in the thrill of explosive combat.", cn: "她揮舞著一門名為「波波」的巨砲，在爆炸性戰鬥的刺激中尋找喜悅。" },
                { en: "She is a brave and impulsive commander, always ready to leap into the fray to protect her friends.", cn: "她是一位勇敢且衝動的指揮官，隨時準備躍入戰火中保護朋友。" },
                { en: "\"A big bang is the best way to say 'stay away' to anyone who threatens our woods,\" she laughed.", cn: "「一聲巨響是向任何威脅我們森林之人表達『離遠點』的最佳方式，」她大笑著。" },
                { en: "She embodies the spirit of adventurous adaptation, turning curiosity into a formidable defense.", cn: "她體現了冒險性的適應精神，將好奇心轉化為強大的防禦力。" },
                { en: "Inspiration can turn a simple curiosity into a lifelong mission of courage and gunpowder.", cn: "靈感能將單純的好奇，轉化為伴隨勇氣與火藥的終身使命。" }
            ]
        },
        {
            id: 141,
            region: "班德爾城",
            title: "Lulu: The Fae Sorceress",
            titleCn: "露璐：精靈法師",
            content: [
                { en: "After wandering into the Glade with her faerie companion Pix, Lulu returned with a perception of reality that is delightfully warped.", cn: "在與她的精靈同伴皮克斯闖入奇幻仙境後，露璐帶著一種令人愉悅的扭曲現實感回到了世間。" },
                { en: "She manipulates reality with whimsical spells, turning her enemies into harmless critters.", cn: "她用異想天開的咒語操縱現實，將敵人變成無害的小生物。" },
                { en: "She views the world as a place of endless play, often oblivious to the gravity of \"adult\" problems.", cn: "她將世界視為無盡玩樂之所，往往無視「成年人」問題的嚴重性。" },
                { en: "\"That tasted purple! Let's do it again, but with more sparkles this time!\" she giggled.", cn: "「那吃起來像紫色！我們再來一次，但這次要加更多亮晶晶的東西！」她咯咯笑道。" },
                { en: "She represents the untamed and illogical side of Bandle magic, where imagination is the only law.", cn: "她代表了班德爾魔法中未經馴服且不合邏輯的一面，在那裡，想像力是唯一的法律。" },
                { en: "Wonder is a magic that reminds us that reality is far more flexible than we dare to believe.", cn: "驚奇是一抹魔法，提醒著我們：現實遠比我們敢於相信的還要更加靈活。" }
            ]
        },
        {
            id: 142,
            region: "班德爾城",
            title: "Veigar: The Tiny Master of Evil",
            titleCn: "維迦：邪惡小法師",
            content: [
                { en: "Captured and tortured by Mordekaiser in the past, Veigar’s mind broke, leading him to embrace the path of dark sorcery.", cn: "曾被魔鬥凱薩俘虜並折磨，維迦的心靈因此破碎，使他擁抱了黑暗巫術之路。" },
                { en: "He seeks to be the greatest villain the world has ever known, though his \"evil\" acts often end up helping others.", cn: "他試圖成為世人所知最偉大的惡棍，儘管他的「惡行」往往最後卻幫到了他人。" },
                { en: "He commands the celestial power of the stars, wielding cosmic energy with a dramatic and comical flair.", cn: "他統御星辰的聖光力量，以一種戲劇化且滑稽的風格揮舞著宇宙能量。" },
                { en: "\"Is that a short joke?! I will show you the true meaning of cosmic suffering!\" he shrieked.", cn: "「那是體型笑話嗎？！我會讓你見識到宇宙級痛苦的真正含義！」他尖叫道。" },
                { en: "He is a tragic and humorous figure, a reminder that even the darkness can have a touch of the absurd.", cn: "他是一個既悲劇又幽默的人物，提醒著世人即便黑暗也可能帶有一絲荒誕。" },
                { en: "Identity is often a mask we wear to hide the scars of a past we can no longer change.", cn: "身分往往是我們佩戴的面具，用來隱藏那些我們已無法改變的過去傷痕。" }
            ]
        },
        {
            id: 143,
            region: "班德爾城",
            title: "Yuumi: The Magical Cat",
            titleCn: "悠咪：魔法靈貓",
            content: [
                { en: "A sentient cat from Bandle City, Yuumi is on a quest to find her lost master, Norra, with the help of the \"Book of Thresholds.", cn: "\" 一隻來自班德爾城的有意識貓咪，悠咪在「門檻之書」的幫助下，正致力於尋找失蹤的主人諾拉。" },
                { en: "She hitches a ride with other heroes, shielding them with magic while searching for clues across Runeterra.", cn: "她搭便車依附在其他英雄身上，在遊歷符文大地尋找線索的同時，用魔法保護著他們。" },
                { en: "She values friendship and comfort, finding the world to be a giant playground filled with interesting people.", cn: "她珍視友誼與舒適，覺得世界是一個充滿有趣人士的巨大遊樂場。" },
                { en: "\"Book says we should go this way, but my nose says there’s a nap waiting nearby,\" she purred.", cn: "「書上說我們該走這邊，但我的鼻子說附近正有一場午睡等著我，」她咕嚕咕嚕地說。" },
                { en: "She represents the bond of companionship and the simple joys of a life lived with magic and curiosity.", cn: "她代表了同伴間的羈絆，以及伴隨著魔法與好奇心生活的簡單喜悅。" },
                { en: "The longest journeys are best shared with a friend who knows when to be brave and when to rest.", cn: "漫長的旅程，最好與一位懂得何時勇敢、何時休息的朋友同行。" }
            ]
        },
        {
            id: 144,
            region: "班德爾城",
            title: "Rumble: The Mechanized Menace",
            titleCn: "藍寶：機械使徒",
            content: [
                { en: "A brilliant inventor who grew tired of being looked down upon, Rumble built a massive mechanical suit named \"Tristy.", cn: "\" 一位厭倦了被輕視的天才發明家，藍寶建造了一台名為「崔絲蒂」的巨大機械裝甲。" },
                { en: "He utilizes scrap metal and flames to prove that yordle ingenuity is superior to any human technology.", cn: "他利用廢金屬與火焰來證明，約德爾人的智慧優於任何人類科技。" },
                { en: "He is a fiery and protective individual, fiercely proud of his heritage and his personal creations.", cn: "他是一個熱血且具保護欲的人，對自己的文化傳承與個人造物感到極度自豪。" },
                { en: "\"They called me small, but they’ll look up to me when they’re looking through the smoke!\" he roared.", cn: "「他們說我渺小，但當他們穿過煙霧觀察時，將不得不仰望我！」他咆哮道。" },
                { en: "He represents the underdog spirit, a warrior who forged his own power from the discarded remnants of the world.", cn: "他代表了弱者逆襲的精神，一位從世界遺棄的殘渣中鍛造出自身力量的戰士。" },
                { en: "Respect is not a gift, but a fortress built from the relentless refusal to be ignored.", cn: "尊重並非恩賜，而是一座由「拒絕被忽視」的堅定意志所築成的堡壘。" }
            ]
        },
        {
            id: 145,
            region: "蒂瑪西亞",
            title: "Poppy: Keeper of the Hammer",
            titleCn: "波比：聖鎚守護者",
            content: [
                { en: "Poppy carries a legendary hammer intended for a \"Great Hero,\" unaware that she herself embodies the hero she seeks.", cn: "波比帶著一把預定給「偉大英雄」的傳奇聖鎚，卻渾然不知自己正是她所尋找的那位英雄。" },
                { en: "She wanders through Demacia and beyond, performing deeds of incredible valor while remaining humbler than anyone.", cn: "她在德瑪西亞及更遠處流浪，立下驚人的勇氣勳績，同時保持著比任何人都更謙遜的態度。" },
                { en: "She is a symbol of duty and perseverance, her strength rooted in her unwavering commitment to a promise.", cn: "她是職責與毅力的象徵，她的力量源於對承諾的不移堅持。" },
                { en: "\"I'm just a yordle with a hammer, but the hero is out there somewhere... I'm sure of it,\" she stated firmly.", cn: "「我只是個拿著鎚子的約德爾人，但英雄就在某處……我很確定，」她堅定地表示。" },
                { en: "She represents the nobility of unrecognized greatness, a heart of gold hidden beneath common armor.", cn: "她代表了未被察覺之偉大的高尚，是隱藏在普通護甲下的一顆金子般的心。" },
                { en: "True heroism is not found in the desire for glory, but in the quiet fulfillment of an impossible task.", cn: "真正的英雄主義不在於對榮耀的渴望，而在於沈靜地完成一項不可能的任務。" }
            ]
        },
        {
            id: 146,
            region: "闇影島",
            title: "Vex: The Gloomist",
            titleCn: "薇可絲：愁雲使者",
            content: [
                { en: "Unlike most energetic yordles, Vex is a brooding teenager who finds comfort in shadows, misery, and sarcasm.", cn: "不同於大多數充滿活力的約德爾人，薇可絲是個憂鬱的青少年，在陰影、痛苦與諷刺中尋找慰藉。" },
                { en: "She manipulates \"Shadow,\" a powerful entity that reflects her cynical view of the vibrant world.", cn: "她操控著「影子」，一個反映出她對這個鮮活世界憤世嫉俗看法的強大實體。" },
                { en: "She found a strange kinship with Viego and the Black Mist, preferring the gloom of the Shadow Isles.", cn: "她與維爾戈及黑霧產生了奇特的親近感，更偏好闇影島的憂鬱氣息。" },
                { en: "\"Everything is too loud, too bright, and just… way too much. Can we go back to the darkness now?\" she sighed.", cn: "「一切都太吵、太亮，而且……實在太多了。我們現在能回黑暗裡去了嗎？」她嘆了口氣。" },
                { en: "She represents the internal struggle with melancholy and the desire for peace in a chaotic, overstimulating world.", cn: "她代表了與憂鬱的內在掙扎，以及在混亂、過度刺激的世界中對平靜的渴望。" },
                { en: "Solitude can be a sanctuary for a soul that finds the world's joy to be an exhausting performance.", cn: "對於一個覺得世界的快樂是一場精疲力竭之表演的靈魂來說，孤獨可以是一個聖所。" }
            ]
        },
        {
            id: 147,
            region: "班德爾城",
            title: "Corki: The Daring Bombardier",
            titleCn: "庫奇：英勇投彈手",
            content: [
                { en: "A Yordle pilot with a passion for flight, Corki settled in Piltover and became the leader of the Screaming Yipsnakes.", cn: "身為一名對飛行充滿熱情的約德爾飛行員，庫奇定居在皮爾托福，並成為「尖嘯之蛇」空中大隊的領袖。" },
                { en: "He patrols the skies in his heavily armed ROFLCopter, finding peace only in the roar of engines and the smell of gunpowder.", cn: "他駕著武裝到牙齒的偵察機巡邏領空，唯有在引擎的轟鳴與硝煙味中才能找到靈魂的平靜。" },
                { en: "Unlike other Yordles, he finds the mundane life on the ground boring, preferring the thrill of a high-speed dogfight.", cn: "與其他約德爾人不同，他覺得地面的平凡生活枯燥乏味，更偏好高空高速纏鬥帶來的刺激感。" },
                { en: "With his phosphorus bombs and Gatling gun, he rains destruction upon any threat to the City of Progress.", cn: "憑藉著磷光炸彈與格林機槍，他向任何威脅進步之城的敵人傾瀉毀滅性的火力。" },
                { en: "\"I’m on it, Charlie! Lima! Incoming!\" he shouted, diving into the fray with a grin beneath his massive mustache.", cn: "「交給我吧！目標確認！飛彈來囉！」他在巨大的鬍鬚下露出笑容，大喊著衝入戰場。" }
            ]
        },
        {
            id: 148,
            region: "弗雷爾卓德",
            title: "Gnar: The Missing Link",
            titleCn: "納兒：迷失之牙",
            content: [
                { en: "A prehistoric Yordle frozen in true ice for millennia, Gnar was accidentally freed into a world he no longer recognizes.", cn: "一位被困在真冰中數千年的史前約德爾人，納兒意外重獲自由，來到一個他已不再認得的世界。" },
                { en: "While usually a playful, pint-sized creature, his pent-up rage can trigger a transformation into a massive, earth-shaking beast.", cn: "雖然平時是個愛玩的小不點，但他積壓的遠古憤怒會觸發變身，讓他化身為巨大的、足以撼動大地的猛獸。" },
                { en: "He struggles to communicate with modern civilization, expressing his curiosity and fear through primal babbles and squeaks.", cn: "他努力嘗試與現代文明溝通，透過原始的胡言亂語與吱喳聲表達他的好奇與恐懼。" },
                { en: "In his primal form, he can hurl massive boulders and crush buildings, embodying the raw, untamed power of the ancient Freljord.", cn: "在原始形態下，他能投擲巨石並摧毀建築，體現了遠古弗雷爾卓德那原始且不羈的力量。" },
                { en: "\"Gnar dada!\" he babbled happily, a split second before the wild fury takes over and he levels the battlefield.", cn: "「納兒．大大！」他開心地叫著，下一秒狂暴的怒火便會佔據身心，將戰場夷為平地。" }
            ]
        },
        {
            id: 149,
            region: "佐恩",
            title: "Ziggs: The Hexplosives Expert",
            titleCn: "希格斯：爆破鬼才",
            content: [
                { en: "A yordle with a chaotic love for things that go \"boom,\" Ziggs found his life in Bandle City too predictable and moved to Piltover.", cn: "希格斯是一位對「砰」的一聲有著混亂愛好的約德爾人，他覺得班德爾城的生活太好預測，於是搬到了皮爾托福。" },
                { en: "After a freak accident involving high-grade hexplosives, he realized his true calling wasn't just science, but large-scale demolition.", cn: "在一次涉及高級海克斯炸藥的離奇事故後，他意識到自己的天職不只是科學研究，而是大規模爆破。" },
                { en: "He eventually moved to Zaun, where the lack of regulations allows him to experiment with even more unstable and volatile bombs.", cn: "他最終搬到了佐恩，那裡缺乏規範的環境讓他能實驗更多不穩定且易揮發的炸彈。" },
                { en: "He carries a massive bomb on his back and constantly juggles smaller ones, eager to find any structure that looks like it needs a \"remodel.\"", cn: "他背著一個巨大的炸彈，手裡不斷玩弄著小炸彈，渴望尋找任何看起來需要「翻修」的建築物。" },
                { en: "\"Blow it up! Blow it all up! You call that a bomb? I’ll show you a REAL bomb!\" he shrieked, cackling as the fuse burned down.", cn: "「炸掉它！通通炸掉！你管那叫炸彈？我讓你看看什麼叫真正的炸彈！」他尖叫著，在導火線燃盡時發出咯咯狂笑。" }
            ]
        },
        {
            id: 150,
            region: "符文大地",
            title: "Aurelion Sol: The Star Forger",
            titleCn: "翱銳龍獸：鑄星龍靈",
            content: [
                { en: "A cosmic entity of immense power, Aurelion Sol crafted the stars in the early days of the universe.", cn: "身為擁有巨大能量的宇宙實體，翱銳龍獸在宇宙初期親手鑄造了繁星。" },
                { en: "He was tricked into servitude by the people of Targon, forced to wear a crown that binds his will.", cn: "他被巨石峰的人民欺騙而淪為奴隸，被迫戴上一頂束縛他意志的王冠。" },
                { en: "He longs to return to the celestial heavens and burn away the world that dared to enslave him.", cn: "他渴望重返星空，並焚毀這座竟敢奴役他的世界。" },
                { en: "\"The stars were my first creation, and they shall be the last thing you ever see,\" he boomed with celestial arrogance.", cn: "「繁星是我最初的造物，也將會是你們所見到的最後之物，」他帶著宇宙級的傲慢吼道。" },
                { en: "He represents the majesty of the cosmos and the hubris of mortals who seek to control the infinite.", cn: "他代表了宇宙的莊嚴，以及凡人試圖控制無限力量的狂妄自大。" },
                { en: "Freedom is the natural state of a soul that was born amidst the birth of galaxies.", cn: "自由是誕生於星系誕生之時的靈魂，所擁有的天然狀態。" }
            ]
        },
        {
            id: 151,
            region: "符文大地",
            title: "Bard: The Wandering Caretaker",
            titleCn: "巴德：漫遊守護者",
            content: [
                { en: "A celestial vagabond who exists beyond the comprehension of mortals, Bard maintains the cosmic balance.", cn: "一位存在於凡人理解之外的星空流浪者，巴德維持著宇宙的平衡。" },
                { en: "He travels through dimensions, appearing only when the fabric of reality is threatened by artifacts out of place.", cn: "他穿梭於各個維度，唯有當現實結構受到錯位遺物的威脅時才會現身。" },
                { en: "He communicates through melodic chimes and mystical tones, guided by an unfathomable divine logic.", cn: "他透過旋律優美的風鈴聲與神秘音調進行溝通，受一種深不可測的神聖邏輯指引。" },
                { en: "The world is a symphony, and Bard is the conductor who ensures that no single note causes the entire song to collapse.", cn: "世界是一場交響樂，而巴德則是確保沒有任何單一音符會導致整首歌崩潰的指揮家。" },
                { en: "He is a silent guardian, a reminder that there are forces watching over the universe that care nothing for human conflict.", cn: "他是一位沈默的守護者，提醒著世人：宇宙中存在著完全不在乎人類衝突的守護力量。" },
                { en: "Harmony often requires the intervention of those who can see the patterns that mortals ignore.", cn: "和諧往往需要那些能看見凡人所忽視之規律的人介入。" }
            ]
        },
        {
            id: 152,
            region: "符文大地",
            title: "Fiddlesticks: The Ancient Fear",
            titleCn: "費德提克：遠古恐懼",
            content: [
                { en: "The first of ten primordial demons, Fiddlesticks is the literal manifestation of fear, predating the rise of civilization.", cn: "作為十位原始惡魔之首，費德提克是恐懼的具象化，其存在早於文明的崛起。" },
                { en: "It mimics the voices of its victims to lure the unwary into the darkness of the harvest.", cn: "它模仿受害者的聲音，引誘不留神的人進入收割的黑暗中。" },
                { en: "It possesses no soul or mercy, existing only to feed on the terror it creates in the hearts of men.", cn: "它不具備靈魂或慈悲，存在的唯一目的就是攝取它在人類心中創造出的恐怖。" },
                { en: "\"It’s just a scarecrow... until it starts screaming with your mother's voice,\" the folk tales warned.", cn: "「那只是個稻草人……直到它開始用你母親的聲音尖叫為止，」民間故事警告著。" },
                { en: "It is a primal horror, a shadow that lingers in the corners of our collective nightmares.", cn: "它是一種原始的恐怖，是徘徊在我們集體惡夢角落裡的陰影。" },
                { en: "Fear is the most ancient and powerful emotion, a primal instinct that connects all living things.", cn: "恐懼是最古老且最強大的情感，是一種連結所有生物的原始本能。" }
            ]
        },
        {
            id: 153,
            region: "符文大地",
            title: "Ryze: The Rune Mage",
            titleCn: "雷茲：符文法師",
            content: [
                { en: "An ancient sorcerer burdened with a task of monumental importance, Ryze seeks to collect the \"World Runes.", cn: "\" 一位背負著極其重要任務的遠古法師，雷茲致力於收集「世界符文」。" },
                { en: "He knows that these artifacts of pure power could unmake existence if they fall into the wrong hands.", cn: "他知道這些純粹力量的遺物一旦落入錯誤之人手中，將會毀滅存在本身。" },
                { en: "He avoids close ties with others, fearing that the runes' corruption will touch those he cares about.", cn: "他避免與他人建立親密關係，擔心符文的腐化會波及他所關心的人。" },
                { en: "\"A scroll, a mission, and a lifetime of solitude—that is the price for the world's survival,\" he muttered.", cn: "「一卷卷軸，一個使命，以及一生的孤獨——這就是世界生存的代價，」他喃喃自語。" },
                { en: "He is a lonely martyr of knowledge, a man who carries the weight of the planet on his shoulders.", cn: "他是一位知識的孤獨殉道者，一個將星球重量扛在肩上的男人。" },
                { en: "True power is not a prize to be wielded, but a danger to be contained with unwavering discipline.", cn: "真正的力量並非用來揮舞的獎賞，而是需要以不移的紀律來遏制的危險。" }
            ]
        },
        {
            id: 154,
            region: "符文大地",
            title: "Kindred: The Eternal Hunters",
            titleCn: "鏡爪：永恆獵人",
            content: [
                { en: "Representing the dual nature of death, Kindred is composed of Lamb, who offers a swift end, and Wolf, who hunts those who flee.", cn: "鏡爪代表了死亡的雙重本質，由提供迅速終局的「神羊」與獵殺逃跑者的「魔狼」組成。" },
                { en: "They are the end of every story, a presence that waits for all living things at the boundary of existence.", cn: "他們是每個故事的終局，是存在邊界上等待著所有生物的身影。" },
                { en: "They are not cruel, but a fundamental part of the cycle of life, as inevitable as the setting sun.", cn: "他們並不殘酷，而是生命循環中基本的一環，如同落日般不可避免。" },
                { en: "\"Lamb, tell me a story... There was once a pale man with dark hair who was very lonely,\" they whispered.", cn: "「神羊，給我講個故事……從前有一個蒼白、黑髮且非常孤獨的男人，」他們低聲說道。" },
                { en: "They are the personification of destiny, the silent observers of the transition from being to non-being.", cn: "他們是宿命的擬人化，是從存在轉向虛無的沈默觀察者。" },
                { en: "Death is not a wall, but a gateway that everyone must eventually pass through.", cn: "死亡並非一道牆，而是每個人最終都必須穿過的門扉。" }
            ]
        },
        {
            id: 155,
            region: "符文大地",
            title: "Shaco: The Demon Jester",
            titleCn: "薩科：惡魔小丑",
            content: [
                { en: "A mysterious and malevolent entity, Shaco is a murderous marionette who finds joy in chaos and confusion.", cn: "身為一個神秘且邪惡的實體，薩科是一個在混亂與困惑中尋找喜悅的謀殺傀儡。" },
                { en: "His origin is unknown, appearing across the world to sow discord and leave a trail of laughter and blood.", cn: "他的起源不明，出現在世界各地散播不和，並留下笑聲與鮮血的痕跡。" },
                { en: "He utilizes illusions and deadly traps, playing with his victims' minds before delivering the final blow.", cn: "他利用幻象與致命陷阱，在遞送最終一擊前玩弄受害者的心靈。" },
                { en: "\"Why so serious? Death is just a punchline that everyone eventually gets,\" he cackled from the shadows.", cn: "「幹嘛這麼嚴肅？死亡不過是每個人最終都會得到的笑話結尾，」他在陰影中刺耳地大笑。" },
                { en: "He represents the unpredictable and dark side of humor, a jester whose performances are always fatal.", cn: "他代表了幽默感中難以捉摸且黑暗的一面，一位表演總是致命的小丑。" },
                { en: "Laughter can be a mask for a malice that defies logic and reason.", cn: "笑聲可以是一抹惡意的面具，無視邏輯與理性。" }
            ]
        },
        {
            id: 156,
            region: "蘇瑞瑪",
            title: "Naafiri: The Hound of a Hundred Bites",
            titleCn: "娜菲芮：冥血之犬",
            content: [
                { en: "Once a powerful Darkin assassin, Naafiri's spirit was trapped within a dagger, only to be found by a pack of desert hounds.", cn: "曾是強大的冥血族刺客，娜菲芮的靈魂被囚禁在短刀中，最終被一群沙漠獵犬尋獲。" },
                { en: "Rather than possessing a single host, her essence shattered across the entire pack, creating a collective consciousness of lethal predators.", cn: "她的精華並未佔據單一宿主，而是粉碎並分佈在整個犬群中，形成了一個擁有集體意識的致命掠食者群體。" },
                { en: "She seeks out her Darkin kin, believing that there is strength in numbers and that the world will tremble before her \"pack\".", cn: "她尋找著冥血族同類，堅信眾志成城的力量，並要讓世界在她帶領的「犬群」面前戰慄。" },
                { en: "\"We are many, and our hunger is one. The hunt never ends,\" the pack howled in unison.", cn: "「我們數量眾多，且飢渴如一。狩獵永不停止，」犬群齊聲哀嚎。" }
            ]
        },
        {
            id: 157,
            region: "比爾吉沃特",
            title: "Nilah: Joy Unbound",
            titleCn: "淣菈：解放之喜",
            content: [
                { en: "Hailing from a distant land, Nilah is a warrior who gained immense power by striking a bargain with Ashlesh, the ancient demon of joy.", cn: "來自遙遠國度的戰士，淣菈透過與古代喜悅惡魔「艾希雷許」達成契約，獲得了驚人的力量。" },
                { en: "In exchange for her memories and the ability to feel any emotion other than joy, she wields a whip of shimmering, lethal water.", cn: "作為失去記憶與除了喜悅外所有情感的代價，她揮舞著一條閃爍且致命的水鞭。" },
                { en: "She hunts the greatest mythical beasts of Runeterra, her laughter echoing even in the heart of the most terrifying battles.", cn: "她在符文大地獵殺最強大的神話野獸，即便在最恐怖的戰場中心，也能聽到她的笑聲迴盪。" },
                { en: "\"My joy is a flood that will drown the world's fears,\" she sang as she danced through the waves.", cn: "「我的喜悅是將淹沒世間恐懼的洪流，」她在波濤中起舞歌唱。" }
            ]
        },
        {
            id: 158,
            region: "符文大地",
            title: "Evelynn: Agony's Embrace",
            titleCn: "伊芙琳：痛苦之擁",
            content: [
                { en: "A primordial demon who took the form of a seductive human woman, Evelynn lures her prey with the promise of pleasure before inflicting unimaginable pain.", cn: "一位化身為誘人人類女性的原始惡魔，伊芙琳以享樂為誘餌引誘獵物，隨後施加超乎想像的痛苦。" },
                { en: "She feeds on the agony of others, finding the screams of the broken to be the only thing that makes her feel truly alive.", cn: "她以他人的哀慟為食，對她而言，受難者的尖叫聲是唯一能讓她感受到自己真正活著的事物。" },
                { en: "She wanders the shadows of the world's cities, waiting for the perfect moment to reveal her true, lash-wielding form.", cn: "她在世界各大城市的陰影中徘徊，等待著展露她那揮舞長鞭之真實形態的完美時刻。" },
                { en: "\"It’s better when they scream; it adds a certain... flavor to the end,\" she whispered into the dark.", cn: "「他們尖叫時感覺更好；這為結局增添了某種……風味，」她在黑暗中低語。" }
            ]
        },
        {
            id: 159,
            region: "符文大地",
            title: "Nocturne: The Eternal Nightmare",
            titleCn: "夜曲：永恆噩夢",
            content: [
                { en: "Born from the collective nightmares of sentient beings during the ancient Rune Wars, Nocturne is a shadow demon that haunts the dreams of the living.", cn: "誕生於古代符文戰爭期間眾生集體噩夢之中，夜曲是一位糾纏生者夢境的暗影惡魔。" },
                { en: "He manifests in the physical world where fear is strongest, tearing through his victims with blades of cold, dark energy.", cn: "他在恐懼最強烈的地方化身於現實世界，用冰冷的黑暗能量之刃撕裂受害者。" },
                { en: "To face him is to face one's deepest terrors, as he turns the mind's own darkness into a lethal weapon.", cn: "面對他就等同於面對內心深處最深的恐懼，因為他能將心靈的黑暗轉化為致命武器。" },
                { en: "\"Darkness... is coming for you. Are you afraid of the dark?\" his voice echoed from the void.", cn: "「黑暗……正朝你而來。你怕黑嗎？」他的聲音從虛空中迴盪而出。" }
            ]
        },
        {
            id: 160,
            region: "符文大地",
            title: "Brand: The Burning Vengeance",
            titleCn: "布蘭德：復仇之焰",
            content: [
                { en: "Once a man named Kegan Rodhe, he was consumed by the ancient, fiery essence of a World Rune, becoming a creature of pure, destructive flame.", cn: "曾是一位名叫基根．諾德的男子，他被世界符文那古老且灼熱的精華所吞噬，成為了純粹毀滅之焰的化身。" },
                { en: "He seeks only to burn the world to cinders, driven by a primal rage against all living things.", cn: "受對眾生的原始憤怒驅使，他唯一的目標就是將世界焚為灰燼。" },
                { en: "He is a reminder of the catastrophic power held within the World Runes and the danger of seeking knowledge beyond human limit.", cn: "他提醒著世人世界符文所蘊含的災難性力量，以及尋求超越人類極限之知識的危險性。" },
                { en: "\"This world will be nothing but smoke and ash when I am through with it,\" he roared, wreathed in fire.", cn: "「當我大功告成時，這世界將只剩煙霧與灰燼，」他在烈火環繞中咆哮。" }
            ]
        },
        {
            id: 161,
            region: "愛歐尼亞",
            title: "Ivern: Friend of the Forest",
            titleCn: "埃爾文：森林之友",
            content: [
                { en: "A former ruthless conqueror, Ivern Bramblefoot was transformed into a sentient tree-man after cutting down the sacred God-Willow.", cn: "曾是殘酷的征服者，埃爾文．布蘭博弗特在砍下神聖的「神柳」後，被轉化為有意識的樹人。" },
                { en: "Now, he spends his centuries nurturing life in the forests of Runeterra, speaking to animals and coaxing flowers to bloom.", cn: "現在，他耗費數個世紀在符文大地的森林中培育生命，與動物交談並哄勸花朵綻放。" },
                { en: "He protects the wild with a gentle but formidable magic, viewing all living creatures as his beloved friends.", cn: "他以溫柔且強大的魔法保護荒野，將所有生物視為他摯愛的朋友。" },
                { en: "\"Every leaf has a story, and I have the time to listen to them all,\" he chuckled, patting a mossy stone.", cn: "「每一片葉子都有一個故事，而我有的是時間去聆聽，」他拍著長滿青苔的石頭呵呵笑道。" }
            ]
        },
        {
            id: 162,
            region: "符文大地",
            title: "Smolder: The Fiery Fledgling",
            titleCn: "史矛德：熾炎幼龍",
            content: [
                { en: "A young dragon belonging to the imperial lineage of Camavor, Smolder was lost for years before rediscovering his fiery heritage.", cn: "隸屬於卡馬維亞皇室血統的幼龍，史矛德在失蹤多年後重新發現了他那火熱的傳承。" },
                { en: "He is eager to prove himself as a true dragon, though he often causes more trouble than intended with his sneezing fireballs.", cn: "他急於證明自己是一條真正的龍，儘管他的「火球噴嚏」經常造成意料之外的麻煩。" },
                { en: "Watched over by his massive, powerful mother, he is a playful but potent force beginning to realize his place in the world.", cn: "在他那強大巨大的母親注視下，他是一股愛玩但潛力驚人的力量，正開始意識到自己在世上的地位。" },
                { en: "\"Just you wait! One day my fire will be as big as the sun!\" he chirped with youthful confidence.", cn: "「你等著瞧吧！總有一天我的火焰會像太陽一樣大！」他帶著年少的自信吱喳叫道。" }
            ]
        },
        {
            id: 163,
            region: "符文大地",
            title: "Aatrox: The Darkin Blade",
            titleCn: "厄薩斯：冥血劍魔",
            content: [
                { en: "Once a noble Ascended warrior of Shurima who fought against the Void, Aatrox and his brethren were eventually corrupted by the horrors they faced.", cn: "厄薩斯曾是蘇瑞瑪高貴的昇華者戰士，曾帶頭對抗虛空，但他與他的同胞最終卻被所面對的恐怖力量侵蝕了身心。" },
                { en: "To end their chaotic reign as Darkin, they were trapped within their own weapons by ancient celestial magic, leaving Aatrox imprisoned in eternal darkness.", cn: "為了終結冥血族引發的混亂統治，古老的天界魔法將他們封印在各自的武器中，使厄薩斯被囚禁於永恆的黑暗。" },
                { en: "After centuries, he finally possessed a mortal fool who dared to touch his blade, molding the host's flesh into a monstrous approximation of his former glory.", cn: "數個世紀後，他終於附身於一名膽敢觸碰巨劍的凡人，並將宿主的血肉重塑成醜陋而強大、勉強趨近他昔日榮光的模樣。" },
                { en: "His ultimate goal is not conquest but a desperate longing for death, believing that by destroying all of existence, he might finally end his own suffering.", cn: "他的最終目標並非征服，而是對死亡的渴望；他深信唯有摧毀世間萬物、引發末日，才能終結他那永無止境的囚禁痛苦。" },
                { en: "\"I am not your enemy; I am THE enemy! I will hack into your soul until the very heavens bleed,\" he roared, his tattered wings casting a shadow over the battlefield.", cn: "「我不是你的敵人，我就是萬物的宿敵！我將砍碎你的靈魂，直到上蒼也為之流血，」他怒吼著，殘破的雙翼在戰場上投下絕望的陰影。" }
            ]
        },
        {
            id: 164,
            region: "佐恩",
            title: "Zeri: The Spark of Zaun",
            titleCn: "婕莉：佐恩之火",
            content: [
                { en: "A spirited, young woman from a working-class family, Zeri channels her electric emotions into a customized, spark-driven rifle.", cn: "婕莉是一位出身工人家庭、充滿活力的年輕女性，她能將電能般的情緒灌注進一把特製的海克斯電能步槍中。" },
                { en: "She fights to protect her community and those who are overlooked by the powerful Chem-barons of Zaun.", cn: "她戰鬥是為了守護她的社區，以及那些被強大的佐恩化學男爵們所忽視的平民。" },
                { en: "Her speed is legendary, moving through the streets of Zaun like a lightning strike, striking fast and disappearing before the smoke clears.", cn: "她的速度極為傳奇，穿梭在佐恩街道時猶如雷擊，在煙霧散去前就已完成突襲並消失。" },
                { en: "She embodies the resilience of the common people, showing that even a single spark can ignite a revolution against oppression.", cn: "她體現了平凡人的韌性，證明了即便是一點火星，也能點燃反抗壓迫的革命。" },
                { en: "\"I don't just fight for me; I fight for everyone they’ve stepped on. Get ready for a jolt!\" she declared with eyes glowing with energy.", cn: "「我不只是為自己而戰；我是為每個被他們踐踏的人而戰。準備好被電擊吧！」她宣告著，雙眼閃爍著能量光芒。" }
            ]
        },
        {
            id: 165,
            region: "愛歐尼亞",
            title: "Hwei: The Visionary",
            titleCn: "赫威：微光畫匠",
            content: [
                { en: "A melancholic painter who creates breathtaking visions to express the complex beauty and pain within his soul.", cn: "赫威是一位憂鬱的畫家，他透過創造令人屏息的幻象，來表達內心深處複雜的美麗與痛苦。" },
                { en: "He wields a mystical paintbrush that can manifest his art into reality, using colors to either heal his allies or destroy his enemies.", cn: "他揮舞著一把神祕的畫筆，能將藝術化為現實，利用色彩來治癒盟友或毀滅對手。" },
                { en: "Haunted by a tragedy that destroyed his temple, he wanders Ionia seeking to understand the darkness that Jhin ignited within him.", cn: "一場摧毀了他神廟的悲劇始終糾纏著他，他在愛歐尼亞遊蕩，試圖理解燼在他心中點燃的那股黑暗。" },
                { en: "His art is a double-edged sword—it is both a sanctuary for his heart and a lethal weapon for the battlefield.", cn: "他的藝術是一把雙刃劍——既是他心靈的避難所，也是戰場上的致命武器。" },
                { en: "\"Through art, I find my truth. Whether it is a soft sunrise or a cold storm, it is all me,\" he whispered, painting the air itself.", cn: "「透過藝術，我找到了真理。無論是柔和的旭日還是冰冷的風暴，那全都是我，」他低語著，在空氣中作畫。" }
            ]
        },
        {
            id: 166,
            region: "蘇瑞瑪",
            title: "Akshan: The Rogue Sentinel",
            titleCn: "埃可尚：黎明之影",
            content: [
                { en: "A charismatic hero with a flair for the dramatic, Akshan fights against evil using an ancient, soul-redeeming weapon called the Absolver.", cn: "埃可尚是一位充滿魅力、熱愛戲劇化表現的英雄，他利用名為「救贖者」的古老靈魂武器來對抗邪惡。" },
                { en: "He seeks vengeance for his fallen mentor, Shadya, but his true purpose is to save those who have been wronged by death itself.", cn: "他為死去的恩師夏迪亞尋求復仇，但他真正的目的是拯救那些被死亡本身不公正對待的人。" },
                { en: "With his grappling hook, he swings through the desert ruins, striking from the shadows before vanishing back into the sun.", cn: "憑藉著勾繩，他在沙漠遺跡中穿梭，從陰影中突擊後又消失在烈日之下。" },
                { en: "He is a rebel at heart, refusing to follow the strict rules of the Sentinels of Light, choosing instead to follow his own sense of justice.", cn: "他骨子裡是個叛逆者，拒絕遵循光明哨兵的嚴格教條，選擇追隨自己內心的正義。" },
                { en: "\"I don't just take lives; I return the ones that were stolen. It’s a messy job, but someone’s got to look good doing it,\" he smirked.", cn: "「我不只是奪走性命；我還帶回那些被偷走的生命。這工作很棘手，但總要有人帥氣地完成它，」他壞笑道。" }
            ]
        },
        {
            id: 167,
            region: "弗雷爾卓德",
            title: "Aurora: The Witch Between Worlds",
            titleCn: "歐羅拉：間界巫女",
            content: [
                { en: "Born into a Bryni tribe, Aurora has the unique ability to see and interact with the spirit world that overlaps with the mortal realm.", cn: "誕生於布里尼部落，歐羅拉擁有獨特的能力，能看見並與跟凡間重疊的靈界進行互動。" },
                { en: "She is a master of spiritual magic, using her powers to guide lost spirits and protect the balance between the two worlds.", cn: "她是靈魂魔法的大師，利用她的力量引導迷失的靈魂，並守護兩個世界之間的平衡。" },
                { en: "Unlike others who fear the cold, she finds comfort in the silent, spiritual echoes of the icy North.", cn: "與其他畏懼寒冷的人不同，她在冰封北境那寂靜的靈魂迴響中找到了慰藉。" },
                { en: "Her companion, a spirit fox, helps her navigate the complex ley lines of magic that crisscross the Freljord.", cn: "她的同伴——一隻靈狐，幫助她在縱橫交錯於弗雷爾卓德的複雜魔法脈絡中穿行。" },
                { en: "\"The spirits aren't gone; they’re just waiting for someone to listen. I’m the one who hears them,\" she said softly, her eyes glowing with ancient light.", cn: "「靈魂並未消失；他們只是在等待有人傾聽。而我就是那個聽見他們的人，」她輕聲說道，雙眼閃爍著古老的光芒。" }
            ]
        },
        {
            id: 168,
            region: "比爾吉沃特",
            title: "Tahm Kench: The River King",
            titleCn: "貪啃奇：河中之王",
            content: [
                { en: "An ancient demon who travels the waterways of Runeterra, Tahm Kench offers deals to those in desperate need, though the price is always their soul.", cn: "一位遊歷於符文大地水道的古老惡魔，貪啃奇向絕望之人提供交易，儘管代價永遠是他們的靈魂。" },
                { en: "He is known for his immense hunger and his silver-tongued charm, luring his prey into his gullet with promises of wealth or escape.", cn: "他以無盡的飢渴與三寸不爛之舌著稱，用財富或逃脫的承諾將獵物誘入腹中。" },
                { en: "To some, he is a god of fortune; to others, he is the monster beneath the waves that consumes everything you love.", cn: "對某些人而言，他是財富之神；對另一些人來說，他是浪潮下的怪物，會吞噬你所愛的一切。" },
                { en: "His massive tongue can snatch enemies from a distance, and he can carry his allies across vast distances within his belly.", cn: "他巨大的舌頭能從遠處抓取敵人，他也能在腹中載著盟友跨越遙遠的距離。" },
                { en: "\"Call me King, call me Demon—water forgets the names of the drowned. But let’s discuss your little... problem,\" he chuckled deeply.", cn: "「叫我國王也好，惡魔也罷——河水會遺忘溺水者的名字。但讓我們來談談你那小小的……困擾吧，」他深沉地低笑。" }
            ]
        },
        {
            id: 169,
            region: "諾克薩斯",
            title: "Mel Medarda: The Soul's Reflection",
            titleCn: "梅爾：映魂祕使",
            content: [
                { en: "A brilliant stateswoman and a former councilor of Piltover, Mel was exiled from her powerful Noxian family but rose to dominate the city’s politics.", cn: "一位傑出的政治家，曾任皮爾托福議員，梅爾雖被強大的諾克薩斯家族流放，卻崛起並主導了這座城市的政治。" },
                { en: "She values diplomacy and progress, seeking to transform Piltover into a center of global influence through the power of Hextech.", cn: "她看重外交與進步，試圖透過海克斯科技的力量將皮爾托福轉化為全球影響力的中心。" },
                { en: "Despite her cold, calculating exterior, she carries a hidden longing for her mother’s approval and the safety of her people.", cn: "儘管外表冷靜精明，她內心深處卻隱藏著對母親認可的渴望，以及對人民安全的牽掛。" },
                { en: "She is a patron of the arts and sciences, believing that the future is built through vision and strategic alliances rather than just brute force.", cn: "她是藝術與科學的贊助者，堅信未來是建立在遠見與戰略聯盟之上，而非單純的武力。" },
                { en: "\"Power is not just in the blade; it is in the hands of those who shape the world's destiny,\" she declared, her golden armor reflecting her resolve.", cn: "「力量不只存在於刀刃中；它掌握在那些塑造世界命運的人手中，」她宣告著，金色盔甲映照出她的決心。" }
            ]
        },
        {
            id: 170,
            region: "符文大地",
            title: "Zaahen: The Warden of Ancient Stones",
            titleCn: "薩亨：古石監護者",
            content: [
                { en: "A master of elemental stone magic, Saham wanders the world protecting ancient, sentient monoliths that predate recorded history.", cn: "薩亨是一位精通元素石之魔法的大師，他在世間遊蕩，守護著那些早於文字紀錄、具有自我意識的古老獨石。" },
                { en: "He was once a guardian in Ixtal but chose a life of isolation to ensure that the earth's deepest secrets remain undisturbed.", cn: "他曾是伊克斯塔爾的守護者，但選擇了孤立的生活，以確保大地最深處的秘密不被干擾。" },
                { en: "He can command the earth itself, raising mountains to block invaders or turning the ground beneath his feet into a lethal fortress.", cn: "他能命令大地本身，升起山脈阻擋入侵者，或將腳下的土地轉化為致命的堡壘。" },
                { en: "He is as stoic as the rocks he protects, possessing a patience that spans centuries and a will that cannot be broken.", cn: "他像他守護的岩石一樣堅毅，擁有橫跨數世紀的耐心與無法被擊碎的意志。" },
                { en: "\"The mountains do not forget, and neither do I. The earth speaks, and I am its voice,\" he rumbled, his presence as heavy as a landslide.", cn: "「山脈不會遺忘，我也一樣。大地在說話，而我就是它的聲音，」他低鳴道，其存在感如山崩般沈重。" }
            ]
        },
        {
            id: 171,
            region: "班德爾城",
            title: "Norra: The Realm's Wanderer",
            titleCn: "諾拉：領域流浪者",
            content: [
                { en: "The beloved master of the magical cat Yuumi, Norra is a powerful Yordle enchantress who vanished into the most dangerous corners of the spirit realm.", cn: "諾拉是魔法靈貓悠咪心愛的主人，她是一位強大的約德爾附魔師，曾消逝在靈界中最危險的角落。" },
                { en: "She travels through mystical portals using her \"Living Portal\" magic, searching for fragments of lost worlds and ancient artifacts.", cn: "她利用「活體傳送門」魔法穿梭於神祕的門戶之間，尋找失落世界的碎片與遠古遺物。" },
                { en: "Despite her whimsical appearance, she possesses a deep understanding of the unstable boundaries between reality and the spirit world.", cn: "儘管外表詼諧有趣，她對現實與靈界之間不穩定的邊界有著極其深刻的理解。" },
                { en: "Her tea-drinking, gentle demeanor hides a fierce protective streak for her friends and the balance of Bandle City's magic.", cn: "她那優雅喝茶、溫柔的舉止下，隱藏著對朋友以及班德爾城魔法平衡的強烈守護意志。" },
                { en: "\"The world is full of doors, my dear; you just have to know which ones are worth opening,\" she chuckled, adjusting her spectacles.", cn: "「親愛的，這世界到處都是門；你只需要知道哪些門值得被打開，」她調整了一下眼鏡，呵呵笑道。" }
            ]
        },
        {
            id: 172,
            region: "愛歐尼亞",
            title: "Yunara: The Warden of Sacred Peaks",
            titleCn: "尤娜拉：聖峰監護者",
            content: [
                { en: "A revered guardian of Ionia’s highest mountain peaks, Yunara is a vastayan warrior who protects the ancient shrines from those who would exploit their magic.", cn: "作為愛歐尼亞最高峰受人景仰的守望者，尤娜拉是一位瓦斯塔亞戰士，保護著遠古神龕免受那些企圖剝削魔法的人侵害。" },
                { en: "She wields the power of the high winds and the spirit of the mountain, using her agile combat style to dance around her foes.", cn: "她操控著高空的疾風與山嶽之靈，利用敏捷的戰鬥風格在敵人周圍輕盈起舞。" },
                { en: "Her life is dedicated to the \"Great Weaving,\" ensuring that the spiritual threads of her homeland remain untainted by foreign war or greed.", cn: "她的生命奉獻給了「大編織」，確保故土的靈魂絲線不被異國戰爭或貪婪所玷汙。" },
                { en: "She is a silent observer of the changing world below, stepping down from her heights only when the very soul of Ionia is in peril.", cn: "她是下方變幻莫測世界的沈默觀察者，唯有在愛歐尼亞的靈魂陷入危險時，才會從高處降臨。" },
                { en: "\"The mountain remembers its promise to the sky, and I remember my promise to the mountain,\" she declared, her spear gleaming in the starlight.", cn: "「山脈記得它對天空的諾言，而我也記得我對山脈的承諾，」她宣告著，長矛在星光下熠熠生輝。" }
            ]
        },
        {
            id: 173,
            region: "符文大地",
            title: "Nami: The Tidecaller",
            titleCn: "娜米：喚潮者",
            content: [
                { en: "A headstrong young Vastaya of the seas, Nami was the first of her Marai tribe to leave the ocean and venture onto land to save her people.", cn: "一位倔強的年輕海洋瓦斯塔亞人，娜米是馬雷族中第一位離開海洋、踏上陸地以拯救族人的勇士。" },
                { en: "She seeks the Moonstone, a sacred artifact needed to keep the terrors of the deep at bay, which can only be obtained through a ritual exchange on the surface.", cn: "她正在尋找月光石，這是一種守護深海恐怖所必需的神聖遺物，且只能透過與陸地上的選召者進行儀式交換來取得。" },
                { en: "Armed with a mystical staff that commands the primal power of the tides, she can summon crashing waves to crush enemies or healing mists to mend wounds.", cn: "她手持一根能操控原始潮汐力量的神祕長杖，能召喚巨浪衝擊敵人，或召喚治癒水霧來撫平傷口。" },
                { en: "Her journey is one of immense courage, as she navigates a dry, sun-scorched world that is entirely alien and dangerous to her kind.", cn: "她的旅程充滿驚人的勇氣，因為她必須在一個對她的族群而言完全陌生、乾旱且被烈日灼燒的危險世界中前行。" },
                { en: "\"The ocean lives in me, and the tide turns at my command. I will not return until the light of the moon restored to the depths,\" she declared solemnly.", cn: "「海洋存在於我心中，潮汐隨我命而轉動。在月光重回深海前，我絕不回頭，」她莊嚴地宣告。" }
            ]
        },
    ];

    let currentTheme = 'theme-light';
    let currentRegion = '符文大地';

    function initRegions() {
        const regionList = document.getElementById('region-list');
        regionList.innerHTML = '';
        regions.forEach(reg => {
            const card = document.createElement('div');
            card.className = 'region-card';
            card.innerText = reg.name;
            card.onclick = () => selectRegion(reg.id, reg.name);
            regionList.appendChild(card);
        });
        updateThemeButtons();
    }

    function selectRegion(id, name) {
        currentRegion = id;
        applyThemeAndRegion();
        document.getElementById('current-region-name').innerText = name;
        showList();
        initList(id);
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function applyThemeAndRegion() {
        document.body.className = (currentTheme === 'theme-dark' ? 'theme-dark ' : '') + 'region-' + currentRegion;
    }

    function showRegions() {
        currentRegion = '符文大地';
        document.getElementById('region-view').style.display = 'block';
        document.getElementById('list-view').style.display = 'none';
        document.getElementById('reader-view').style.display = 'none';
        applyThemeAndRegion();
    }

    function initList(regionId) {
        const listContainer = document.getElementById('story-list');
        listContainer.innerHTML = '';
        const filtered = stories.filter(s => s.region === regionId);
        if (filtered.length === 0) {
            listContainer.innerHTML = `<p style="text-align:center; opacity:0.6; padding: 40px;">「${regionId}」的故事正在編寫中...</p>`;
            return;
        }
        filtered.forEach(story => {
            const card = document.createElement('div');
            card.className = 'story-card';
            card.innerHTML = `<div class="story-title">${story.title}</div><div style="font-size:0.9rem; opacity:0.7; font-weight:700;">${story.titleCn}</div>`;
            card.onclick = () => readStory(story.id);
            listContainer.appendChild(card);
        });
    }

    function readStory(id) {
        const story = stories.find(s => s.id === id);
        document.getElementById('reader-title').innerText = story.title;
        const readerBody = document.getElementById('reader-body');
        readerBody.innerHTML = '';
        story.content.forEach(para => {
            const section = document.createElement('section');
            section.className = 'sentence';
            const enSpan = document.createElement('span');
            enSpan.className = 'en';
            
            const words = para.en.split(' ');
            words.forEach(word => {
                const cleanWord = word.replace(/[,.!?]/g, '').toLowerCase();
                const wordNode = document.createElement('span');
                wordNode.className = 'word';
                wordNode.innerText = word;
                wordNode.onclick = (e) => { e.stopPropagation(); lookup(cleanWord); };
                enSpan.appendChild(wordNode);
            });
            
            const cnSpan = document.createElement('span');
            cnSpan.className = 'cn';
            cnSpan.innerText = para.cn;
            section.appendChild(enSpan);
            section.appendChild(cnSpan);
            readerBody.appendChild(section);
        });
        document.getElementById('list-view').style.display = 'none';
        document.getElementById('reader-view').style.display = 'block';
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function showList() {
        document.getElementById('region-view').style.display = 'none';
        document.getElementById('list-view').style.display = 'block';
        document.getElementById('reader-view').style.display = 'none';
    }

    function lookup(word) {
        const popup = document.getElementById('dict-popup');
        const meaning = vocabulary[word];
        if (meaning) {
            popup.innerText = `${word}: ${meaning}`;
            popup.style.display = 'block';
            setTimeout(() => { popup.style.display = 'none'; }, 2500);
        }
    }

    function toggleTranslation() {
        document.body.classList.toggle('hide-cn');
    }

    function toggleTheme() {
        currentTheme = (currentTheme === 'theme-dark') ? 'theme-light' : 'theme-dark';
        applyThemeAndRegion();
        updateThemeButtons();
    }

    function updateThemeButtons() {
        const btns = document.querySelectorAll('.theme-toggle-btn');
        const label = (currentTheme === 'theme-dark') ? '🌞 Day' : '🌙 Night';
        btns.forEach(btn => {
            if (btn.id === 'theme-toggle-reader') {
                btn.innerText = (currentTheme === 'theme-dark') ? '🌞' : '🌙';
            } else {
                btn.innerText = label;
            }
        });
    }

    window.onload = initRegions;
</script>
