<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拾光故事集</title>
    
    <link rel="preload" href="./icon.png" as="image">
    
    <!-- PWA 核心設定：修正導覽列顏色控制 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- 設為 default 以確保在淺色背景下系統圖示變為深色 -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="拾光故事集">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- 設定初始主題色為您的米色背景 -->
    <meta name="theme-color" id="theme-meta" content="#f9f7f2">
    
    <link rel="manifest" href="./manifest_hub.json">
    <link rel="apple-touch-icon" href="./icon.png">
    <link rel="icon" type="image/png" href="./icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f9f7f2; 
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            -webkit-tap-highlight-color: transparent;
            position: fixed; 
        }

        .story-button {
            background-color: #ffffff;
            border: 1.5px solid #d1ccc0;
            border-radius: 20px;
            padding: 28px 20px;
            width: 100%;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(209, 204, 192, 0.2);
            text-decoration: none;
            color: inherit;
        }

        .story-button:active {
            transform: translateY(2px);
            box-shadow: 0 0 0 rgba(209, 204, 192, 0);
        }

        /* 溫潤感的安裝提示框 */
        #installPrompt {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 320px;
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border-radius: 32px;
            padding: 28px;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.18);
            z-index: 1000;
            display: none; 
            border: 1px solid rgba(255, 255, 255, 0.6);
            text-align: center;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: translate(-50%, -40%) scale(0.9); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center">

    <!-- 安裝提示框 -->
    <div id="installPrompt">
        <div class="flex flex-col items-center space-y-5">
            <img src="./icon.png" class="w-20 h-20 rounded-3xl shadow-sm object-cover border border-gray-100" alt="App Icon">
            <div class="space-y-1">
                <h3 class="text-xl font-bold text-[#5c5850]">帶走這份溫柔</h3>
                <p class="text-xs text-gray-500 leading-relaxed">
                    將「拾光故事集」收藏至主畫面<br>
                    讓月光與傳說陪伴您的每個夜晚
                </p>
            </div>
            <div class="flex w-full space-x-3 pt-3">
                <button onclick="closePrompt()" class="flex-1 text-sm text-gray-400 font-medium py-3.5 rounded-2xl hover:bg-black/5 transition-colors">
                    下次再說
                </button>
                <button id="installBtn" class="flex-1 bg-[#8c8578] text-white text-sm font-bold py-3.5 rounded-2xl shadow-sm active:scale-95 transition-transform">
                    立即收藏
                </button>
            </div>
        </div>
    </div>

    <main class="max-w-md mx-auto px-10 w-full flex flex-col items-center justify-center">
        <header class="text-center mb-16">
            <div class="mb-6">
                <img src="./icon.png" class="w-24 h-24 rounded-[32px] shadow-sm mx-auto border-4 border-white" alt="Logo">
            </div>
            <h1 class="text-3xl font-bold text-[#5c5850] tracking-[0.2em]">拾光故事集</h1>
        </header>

        <div class="flex flex-col space-y-6 w-full">
            <a href="./枕邊故事.html" class="story-button">
                <div class="flex flex-col items-center">
                    <span class="text-2xl mb-1">🌙</span>
                    <span class="text-xl font-bold text-[#5c5850]">枕邊故事</span>
                </div>
            </a>

            <a href="./符文大地故事館.html" class="story-button">
                <div class="flex flex-col items-center">
                    <span class="text-2xl mb-1">⚔️</span>
                    <span class="text-xl font-bold text-[#5c5850]">符文大地故事館</span>
                </div>
            </a>
        </div>
    </main>

    <script>
        // 1. 強制確保首頁導覽列顏色同步
        const themeMeta = document.getElementById('theme-meta');
        function syncStatusBar() {
            // 強制設定為頁面背景色
            themeMeta.setAttribute('content', '#f9f7f2');
        }
        syncStatusBar();

        // 2. Service Worker 註冊
        const isSecure = window.location.protocol === 'https:' || window.location.hostname === 'localhost';
        if ('serviceWorker' in navigator && isSecure) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Error:', err));
            });
        }

        // 3. PWA 安裝邏輯
        let deferredPrompt;
        const installPrompt = document.getElementById('installPrompt');
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            if (!sessionStorage.getItem('storyHubInstallShown')) {
                setTimeout(() => {
                    installPrompt.style.display = 'block';
                    sessionStorage.setItem('storyHubInstallShown', 'true');
                }, 1500);
            }
        });

        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            await deferredPrompt.userChoice;
            deferredPrompt = null;
            installPrompt.style.display = 'none';
        });

        function closePrompt() { installPrompt.style.display = 'none'; }
        window.addEventListener('appinstalled', () => { installPrompt.style.display = 'none'; });

        // 4. 防止頁面被回彈效果影響顏色顯示（針對 iOS）
        document.body.addEventListener('touchmove', function(e) {
            if (e.target.closest('main')) return;
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
